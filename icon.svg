<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0908"/>
  <!-- Outer halo ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#c89060" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#c89060" stroke-width="2" opacity="0.6"/>
  <!-- Sun disc (gold, inner) -->
  <circle cx="256" cy="256" r="68" fill="none" stroke="#c89060" stroke-width="4"/>
  <circle cx="256" cy="256" r="20" fill="#c89060"/>
  <!-- Sun rays -->
  <g stroke="#c89060" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="140" x2="256" y2="172"/>
    <line x1="256" y1="340" x2="256" y2="372"/>
    <line x1="140" y1="256" x2="172" y2="256"/>
    <line x1="340" y1="256" x2="372" y2="256"/>
    <line x1="174" y1="174" x2="196" y2="196"/>
    <line x1="316" y1="316" x2="338" y2="338"/>
    <line x1="338" y1="174" x2="316" y2="196"/>
    <line x1="196" y1="316" x2="174" y2="338"/>
  </g>
  <!-- Crescent moon (emerald, lower right offset) -->
  <g transform="translate(338,338)">
    <path d="M 0,-22 a 22,22 0 1,0 0,44 a 16,22 0 1,1 0,-44 z" fill="#3d7d63"/>
  </g>
</svg>
