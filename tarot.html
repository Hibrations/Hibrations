<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tarot — The Integration</title>
<style>
:root {
  --bg: #0a0908; --bg-elev: #14110f; --bg-card: #1a1614;
  --border: #2a2420; --border-soft: #1f1a17;
  --ink: #e8e1d4; --ink-dim: #9a8f80; --ink-faint: #5e554a;
  --mystic: #a86fc0; --mystic-dim: #6f4082; --mystic-faint: #3d2348;
  --gold: #c89060; --crimson: #c0584c;
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--ink); }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; line-height: 1.55;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  max-width: 680px; margin: 0 auto; min-height: 100vh; }
.wrap { padding: 18px 16px 80px; }
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.back-btn { font-size: 13px; color: var(--ink-dim); background: var(--bg-card); border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px; cursor: pointer; }
.back-btn:active { color: var(--ink); border-color: var(--ink-dim); }
.brand { text-align: right; }
.brand-name { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; background: linear-gradient(110deg, var(--mystic), var(--gold)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.brand-sub { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); }
.tabs { display: flex; gap: 8px; margin: 18px 0; }
.tab { flex: 1; text-align: center; font-size: 13px; padding: 9px 6px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-card); color: var(--ink-dim); cursor: pointer; }
.tab.active { color: var(--ink); border-color: var(--mystic-dim); background: var(--bg-elev); }
.eyebrow { font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); margin: 22px 0 10px; }
.eyebrow:first-child { margin-top: 2px; }
.hint { font-size: 12px; color: var(--ink-faint); font-style: italic; margin-top: 8px; }

.btn { width: 100%; padding: 13px; border-radius: var(--r-md); font-size: 14px; font-weight: 600; border: 1px solid var(--mystic-dim); background: var(--mystic-faint); color: var(--ink); cursor: pointer; margin-top: 8px; }
.btn:active { background: var(--mystic-dim); }
.btn.ghost { background: var(--bg-card); border-color: var(--border); color: var(--ink-dim); }

/* a drawn card */
.card-face { background: linear-gradient(180deg, var(--bg-card), #181320); border: 1px solid var(--mystic-dim); border-radius: var(--r-lg); padding: 22px 18px; text-align: center; margin-top: 6px; }
.card-face.integration { border-color: var(--gold); background: linear-gradient(180deg, #1c1712, #1a1320); }
.card-num { font-size: 12px; letter-spacing: 0.3em; color: var(--mystic); }
.card-name { font-size: 24px; font-weight: 700; margin: 6px 0 14px; }
.card-glyph { font-size: 40px; line-height: 1; margin-bottom: 12px; }
.card-up { font-size: 14.5px; color: var(--ink); line-height: 1.6; }
.card-shadow { font-size: 13px; color: var(--ink-dim); margin-top: 12px; }
.card-shadow b { color: var(--crimson); font-weight: 600; letter-spacing: 0.04em; }
.card-prompt { font-size: 14px; font-style: italic; color: var(--mystic); margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }

/* three-card spread */
.spread { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.spread-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px 15px; }
.spread-pos { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mystic); }
.spread-name { font-size: 16px; font-weight: 600; margin: 2px 0 4px; }
.spread-up { font-size: 13px; color: var(--ink-dim); }

/* deck list */
.deck-row { display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-bottom: 1px solid var(--border-soft); cursor: pointer; }
.deck-row:active { background: var(--bg-elev); }
.deck-num { font-size: 12px; color: var(--ink-faint); min-width: 34px; letter-spacing: 0.1em; }
.deck-name { font-size: 14.5px; font-weight: 500; }
.deck-name.integration { color: var(--gold); }
.deck-body { display: none; padding: 4px 4px 14px 50px; }
.deck-row-wrap.open .deck-body { display: block; }
.deck-up { font-size: 13.5px; color: var(--ink-dim); }
.deck-prompt { font-size: 13px; font-style: italic; color: var(--mystic); margin-top: 8px; }

/* card XIV page */
.xiv-hero { text-align: center; padding: 10px 0 4px; }
.xiv-flames { font-size: 44px; letter-spacing: 6px; }
.xiv-title { font-size: 22px; font-weight: 700; margin-top: 8px; background: linear-gradient(110deg, var(--gold), var(--crimson)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.xiv-sub { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); margin-top: 4px; }
.xiv-block { background: var(--bg-card); border-left: 2px solid var(--gold); border-radius: 0 var(--r-md) var(--r-md) 0; padding: 14px 16px; margin-top: 14px; }
.xiv-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
.xiv-text { font-size: 14px; color: var(--ink-dim); line-height: 1.62; }

.toast { position: fixed; left: 50%; bottom: calc(24px + env(safe-area-inset-bottom)); transform: translateX(-50%); background: var(--bg-elev); border: 1px solid var(--mystic-dim); color: var(--ink); padding: 10px 18px; border-radius: 999px; font-size: 13px; z-index: 80; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <button class="back-btn" id="back-btn">← portal</button>
    <div class="brand"><div class="brand-name">Tarot</div><div class="brand-sub">the major arcana · the integration</div></div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="draw">draw</div>
    <div class="tab" data-tab="deck">the deck</div>
    <div class="tab" data-tab="xiv">card XIV</div>
  </div>
  <div id="view"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  var DECK = [
    { n:0, name:'The Fool', g:'🌅', up:'The leap. Beginnings, innocence, the step off the cliff with the sun on your face — trust before proof.', sh:'recklessness; refusing to look down; the leap taken to escape rather than to begin.', q:'Where is life asking you to leap before you feel ready?' },
    { n:1, name:'The Magician', g:'🜍', up:'As above, so below. You already hold every tool. The will that turns intention into matter.', sh:'manipulation; scattered power; all talk, no transmutation.', q:'What could you begin right now with what you already have?' },
    { n:2, name:'The High Priestess', g:'🌙', up:'The veil and the inner knowing — the Pisces-moon depths. What you sense before you can prove it.', sh:'intuition ignored; secrets kept from yourself.', q:'What does your body already know that your mind won’t admit?' },
    { n:3, name:'The Empress', g:'🌿', up:'Venus, abundance, the sensual creative womb. Pleasure as generativity — let it grow.', sh:'smothering; creative block; neglect of the senses.', q:'What wants to be nurtured into form right now?' },
    { n:4, name:'The Emperor', g:'🜨', up:'Structure, the Capricorn builder, the throne. The order that protects the fire.', sh:'rigidity; domination; the tyrant father.', q:'Where do you need a firmer container, not more fire?' },
    { n:5, name:'The Hierophant', g:'🔑', up:'Lineage, the teacher, the tradition you study — the mystery school.', sh:'dogma; conformity; outsourcing your truth to an authority.', q:'Whose map are you following — and is it still yours?' },
    { n:6, name:'The Lovers', g:'🜔', up:'Union, the choice of the heart, two frequencies becoming a field. Sacred eros, alignment.', sh:'disharmony; choosing from fear; split values.', q:'What does love — not fear — actually choose here?' },
    { n:7, name:'The Chariot', g:'🜂', up:'Will harnessing opposing forces, the forward drive. Victory by holding the reins.', sh:'force without direction; burnout; the ego at the wheel.', q:'Are the horses pulling together, or against each other?' },
    { n:8, name:'Strength', g:'🦁', up:'The gentle hand on the lion. Power through softness — the primal led by love, not whipped by force.', sh:'self-doubt; suppression; brute force mistaken for strength.', q:'What in you needs taming with tenderness, not a whip?' },
    { n:9, name:'The Hermit', g:'🏮', up:'The sensual hermit’s lantern. Withdrawal to find the inner light — then the return to share it.', sh:'isolation; hiding; refusing to come back out.', q:'Is this solitude cultivation — or is it hiding?' },
    { n:10, name:'Wheel of Fortune', g:'🎡', up:'The turning. Fate and cycle, the moment shifting. Ride the wave; the calm follows.', sh:'resisting change; victimhood; clinging to the high point.', q:'What is turning that you’re trying to hold still?' },
    { n:11, name:'Justice', g:'⚖️', up:'The blade and the scales — truth, consequence, action aligned with value. Aletheia’s edge.', sh:'avoidance; dishonesty; the imbalance you won’t correct.', q:'Where is your life out of true with what you know?' },
    { n:12, name:'The Hanged Man', g:'🜄', up:'The willing surrender, the inverted view, the pause that reveals. Letting go to see anew.', sh:'stalling; martyrdom; suspension dressed up as patience.', q:'What would you see if you stopped struggling and hung still?' },
    { n:13, name:'Death', g:'💀', up:'Not the end — the dismemberment, the necessary ending, the Isis work. What dies so the new can be gathered.', sh:'clinging to the corpse; fear of the transformation that is already happening.', q:'What is already dead that you’re still carrying?' },
    { n:14, name:'The Integration', g:'🔥', up:'Temperance, reborn. The two flames in one body — gold sacred, red primal, halo and horns. The alchemy of opposites blended into a third thing. Artboy. The whole work, made image.', sh:'splitting; choosing one fire and exiling the other; balance faked instead of forged.', q:'Which flame are you exiling today — and how would it feel to hold both?', integration:true },
    { n:15, name:'The Devil', g:'⛓️', up:'The chain you could slip if you looked. Shadow, appetite, the primal disowned and so in control of you. The gold is in the dark.', sh:'bondage; shame; the cage mistaken for the self.', q:'What appetite owns you because you won’t look at it directly?' },
    { n:16, name:'The Tower', g:'🗼', up:'The lightning, the false structure collapsing. Sudden truth that frees by destroying. The shield falls.', sh:'clinging to the rubble; fearing the collapse that would free you.', q:'What false tower is asking to fall?' },
    { n:17, name:'The Star', g:'⭐', up:'After the Tower, the quiet hope. The water poured, the wound becoming the well. Renewal, faith, being seen.', sh:'despair; disconnection; faithlessness after the fall.', q:'Where is hope quietly returning, if you let it?' },
    { n:18, name:'The Moon', g:'🌕', up:'The Pisces depths, the dream, the not-yet-known. Intuition and illusion — the path through dark water.', sh:'deception; fear; losing the path in the fog.', q:'What feeling are you being asked to trust through the fog?' },
    { n:19, name:'The Sun', g:'☀️', up:'Joy, vitality, the radiant yes. The solar self uncovered — warmth that needs no permission.', sh:'ego inflation; forced positivity; a fire that burns others.', q:'Where can you simply shine without apology?' },
    { n:20, name:'Judgement', g:'🎺', up:'The call, the awakening, rising to answer your own name. The reckoning that resurrects.', sh:'self-condemnation; ignoring the call; staying in the grave.', q:'What are you being called to rise into?' },
    { n:21, name:'The World', g:'🌍', up:'Completion, wholeness, the dance at the centre. The journey integrated, the cosmos felt in the body.', sh:'incompletion; stuckness near the finish; fear of arrival.', q:'What cycle is ready to be honoured as complete?' },

    { n:22, name:'Ace of Wands', g:'🔥', lab:'Ace', suit:'wands', up:'The spark catching — raw creative fire, the red flame handed to you. Desire, drive, the yes in the gut and the cock.', sh:'impulse without aim; the fire lit then abandoned; potency wasted.', q:'What is lit in you right now that wants to be acted on, not just felt?' },
    { n:23, name:'Two of Wands', g:'🔥', lab:'2', suit:'wands', up:'The world held in the hand — the first plan, standing at the edge deciding how far the fire will travel.', sh:'fear of leaving the familiar; planning as a way to avoid the leap.', q:'What would you reach for if the size of the world didn’t scare you?' },
    { n:24, name:'Three of Wands', g:'🔥', lab:'3', suit:'wands', up:'The ships sent out — the first effort underway, expansion, watching for what you launched to return.', sh:'impatience; pulling the venture back before it can land.', q:'What did you set in motion that you now need to let sail?' },
    { n:25, name:'Four of Wands', g:'🔥', lab:'4', suit:'wands', up:'The threshold of celebration — home, harmony, the body at ease in its own fire. A milestone honoured.', sh:'skipping the celebration; never letting the work feel like enough.', q:'What completion deserves to be marked in the body, not just noted?' },
    { n:26, name:'Five of Wands', g:'🔥', lab:'5', suit:'wands', up:'The friendly clash — competition, sparring, the friction that sharpens. Many fires testing each other.', sh:'pointless conflict; ego scuffles; fighting yourself.', q:'Is this struggle forging you, or just burning you?' },
    { n:27, name:'Six of Wands', g:'🔥', lab:'6', suit:'wands', up:'The return in triumph — recognition, being seen for the fire you carried, the win acknowledged.', sh:'needing the applause; a win that only counts if witnessed.', q:'Can you let yourself be seen winning without shrinking?' },
    { n:28, name:'Seven of Wands', g:'🔥', lab:'7', suit:'wands', up:'Holding the high ground — defending your work, your yes, against the pull to back down.', sh:'defensiveness; fighting battles already won; rigidity.', q:'What is worth standing your ground for, even outnumbered?' },
    { n:29, name:'Eight of Wands', g:'🔥', lab:'8', suit:'wands', up:'The arrows in flight — swift movement, momentum, messages and energy moving fast. The fire travels.', sh:'haste; scattering energy; acting before aiming.', q:'Where is the momentum already moving that you just need to ride?' },
    { n:30, name:'Nine of Wands', g:'🔥', lab:'9', suit:'wands', up:'The last guard, wounded but standing — resilience, one more push, the fire that refuses to go out.', sh:'paranoia; exhaustion mistaken for strength; bracing when no threat remains.', q:'Are you still defending against a fight that’s already over?' },
    { n:31, name:'Ten of Wands', g:'🔥', lab:'10', suit:'wands', up:'The full load carried — responsibility, the weight of everything you took on. Almost home, but heavy.', sh:'martyrdom; refusing to set anything down; burnout dressed as duty.', q:'What are you carrying that was never yours to hold?' },
    { n:32, name:'Page of Wands', g:'🔥', lab:'Page', suit:'wands', up:'The young flame — curiosity, the first stir of a passion, the messenger of desire. Play before mastery.', sh:'flightiness; all spark, no follow-through.', q:'What are you curious about that you haven’t let yourself chase?' },
    { n:33, name:'Knight of Wands', g:'🔥', lab:'Knight', suit:'wands', up:'The charge — bold action, adventure, the primal yes on horseback. All-in heat and motion.', sh:'recklessness; burning hot then gone; passion with no roots.', q:'Where does the body want to charge, fully, without hedging?' },
    { n:34, name:'Queen of Wands', g:'🔥', lab:'Queen', suit:'wands', up:'The radiant one — magnetic warmth, confident sexuality, the fire that draws others without chasing them.', sh:'demanding the spotlight; warmth turned to a heat that scorches.', q:'Where could you simply radiate and let it pull, rather than push?' },
    { n:35, name:'King of Wands', g:'🔥', lab:'King', suit:'wands', up:'The visionary leader — mature fire, will in service of a vision, the primal mastered and directed.', sh:'domination; the tyrant of his own fire; vision that won’t listen.', q:'What vision is yours to lead — and are you leading it, or forcing it?' },

    { n:36, name:'Ace of Cups', g:'🌊', lab:'Ace', suit:'cups', up:'The overflowing cup — love offered, the heart opening, the feeling-water of your Pisces depths poured fresh.', sh:'blocked feeling; love refused at the door; the cup turned over.', q:'What feeling is asking to be received rather than managed?' },
    { n:37, name:'Two of Cups', g:'🌊', lab:'2', suit:'cups', up:'The sacred pair — union, two frequencies meeting, the eros of true connection. Cup meeting cup.', sh:'imbalance; merging that loses the self; love poured at the wrong altar.', q:'Where is real meeting available, if you let yourself be seen?' },
    { n:38, name:'Three of Cups', g:'🌊', lab:'3', suit:'cups', up:'The three raised cups — friendship, community, celebration, joy shared in the body.', sh:'excess; numbing in company; the party that avoids the depth.', q:'Who feeds your joy — and when did you last let them?' },
    { n:39, name:'Four of Cups', g:'🌊', lab:'4', suit:'cups', up:'The cup unnoticed — apathy, withdrawal, the gift you can’t yet see while you brood.', sh:'self-absorption; refusing what’s already here; the hermit gone stale.', q:'What is being offered that your discontent won’t let you see?' },
    { n:40, name:'Five of Cups', g:'🌊', lab:'5', suit:'cups', up:'The spilled cups — grief, loss, mourning what is gone. The water on the ground, the wound felt.', sh:'drowning in the loss; ignoring the two cups still standing.', q:'What still stands behind you while you grieve what fell?' },
    { n:41, name:'Six of Cups', g:'🌊', lab:'6', suit:'cups', up:'The cups of memory — sweetness from the past, innocence, the child self offered a flower.', sh:'living in the past; idealising what was; refusing to grow up.', q:'What from your younger self wants to come home to you now?' },
    { n:42, name:'Seven of Cups', g:'🌊', lab:'7', suit:'cups', up:'The seven visions — imagination, possibility, the dreamy fog of choice. So many cups, only one real.', sh:'illusion; fantasy as escape; paralysis among options.', q:'Which of these dreams is real, and which is a beautiful fog?' },
    { n:43, name:'Eight of Cups', g:'🌊', lab:'8', suit:'cups', up:'Walking away from the full cups — leaving what no longer feeds the soul, the deeper journey calling.', sh:'leaving too soon; abandoning what could still heal; restlessness as avoidance.', q:'What are you called to walk away from, even though it looks full?' },
    { n:44, name:'Nine of Cups', g:'🌊', lab:'9', suit:'cups', up:'The wish granted — contentment, emotional satisfaction, the body sated and pleased. The cup of fulfilment.', sh:'smugness; pleasure as the whole goal; the wish that was too small.', q:'What would genuine satisfaction feel like in your body right now?' },
    { n:45, name:'Ten of Cups', g:'🌊', lab:'10', suit:'cups', up:'The rainbow of cups — emotional wholeness, love made home, the heart fully expressed.', sh:'performing the happy picture; harmony faked for show.', q:'Where does your heart already have its home, if you let it land?' },
    { n:46, name:'Page of Cups', g:'🌊', lab:'Page', suit:'cups', up:'The fish in the cup — the surprising feeling, the intuitive message, creative tenderness, the heart’s first art.', sh:'oversensitivity; emotional immaturity; small feelings drowned in drama.', q:'What tender, odd feeling is trying to tell you something?' },
    { n:47, name:'Knight of Cups', g:'🌊', lab:'Knight', suit:'cups', up:'The romantic on the white horse — following the heart, the lover, beauty pursued, devotion in motion.', sh:'moodiness; idealised love; chasing the feeling instead of the person.', q:'Where is your heart leading — and are you brave enough to follow it well?' },
    { n:48, name:'Queen of Cups', g:'🌊', lab:'Queen', suit:'cups', up:'The keeper of the deep cup — intuition, compassion, the Sophia who feels everything and stays whole.', sh:'over-merging; martyred caretaking; drowning in others’ feelings.', q:'Can you feel it all and still keep your own shore?' },
    { n:49, name:'King of Cups', g:'🌊', lab:'King', suit:'cups', up:'The calm sea-king — emotional sovereignty, the man who holds the depths without being pulled under.', sh:'suppression; a calm that is really numb; feeling walled off as control.', q:'Where can you stay open and steady at once — neither flooded nor frozen?' },

    { n:50, name:'Ace of Swords', g:'🗡️', lab:'Ace', suit:'swords', up:'The blade of truth raised — clarity breaking through, the cut that reveals. Aletheia’s edge, a new understanding.', sh:'truth used to wound; clarity weaponised; the cut that severs more than needed.', q:'What truth, named cleanly, would cut you free?' },
    { n:51, name:'Two of Swords', g:'🗡️', lab:'2', suit:'swords', up:'The blindfolded balance — a decision avoided, stalemate, the mind held in careful suspension.', sh:'refusing to choose; using fairness to dodge the cut; head over body.', q:'What does your body already know that the blindfold won’t let you choose?' },
    { n:52, name:'Three of Swords', g:'🗡️', lab:'3', suit:'swords', up:'The pierced heart — heartbreak, painful truth, the grief that comes from seeing clearly. Necessary sorrow.', sh:'wallowing; rehearsing the wound; mistaking the pain for identity.', q:'What hurt needs to be felt fully so it can finish?' },
    { n:53, name:'Four of Swords', g:'🗡️', lab:'4', suit:'swords', up:'The knight at rest — recovery, retreat, the mind laid down. Stillness after the battle, the hermit’s pause.', sh:'avoidance dressed as rest; hiding out; never re-entering.', q:'What needs true rest before you pick the sword back up?' },
    { n:54, name:'Five of Swords', g:'🗡️', lab:'5', suit:'swords', up:'The hollow victory — conflict won at a cost, ego over connection, the win that loses something.', sh:'winning to be right; scorched bridges; a fight not worth its prize.', q:'Is being right here worth what it costs you?' },
    { n:55, name:'Six of Swords', g:'🗡️', lab:'6', suit:'swords', up:'The crossing to calmer water — transition, moving away from turbulence, the mind finding smoother passage.', sh:'fleeing without learning; carrying the same trouble to the new shore.', q:'What are you ready to leave on the far bank as you cross?' },
    { n:56, name:'Seven of Swords', g:'🗡️', lab:'7', suit:'swords', up:'The cunning move — strategy, stealth, acting alone, wits over force. Sometimes the truth slipped around.', sh:'self-deception; sneaking; the dishonesty you justify.', q:'Where are you being clever to avoid being honest?' },
    { n:57, name:'Eight of Swords', g:'🗡️', lab:'8', suit:'swords', up:'The bound figure among blades — feeling trapped, the cage built of thought, the prison whose door is open.', sh:'victimhood; not seeing the gap in the swords; thought mistaken for fact.', q:'Which of these walls is real, and which did your mind build?' },
    { n:58, name:'Nine of Swords', g:'🗡️', lab:'9', suit:'swords', up:'The night of dread — anxiety, the 3am mind, fear magnified in the dark. The mind turned against itself.', sh:'catastrophising; mistaking the nightmare for the day; suffering rehearsed.', q:'What fear loses its size the moment you say it out loud?' },
    { n:59, name:'Ten of Swords', g:'🗡️', lab:'10', suit:'swords', up:'The final blades — rock bottom, the ending that is total, the death of a story so a new dawn can rise.', sh:'melodrama; clinging to the role of the wounded; refusing the dawn behind the hill.', q:'What thought-story has died so completely it can’t hurt you anymore?' },
    { n:60, name:'Page of Swords', g:'🗡️', lab:'Page', suit:'swords', up:'The watchful youth — curiosity, mental energy, the eager truth-seeking mind. Vigilance and questions.', sh:'scattered thoughts; sharp words; spying instead of seeing.', q:'What are you itching to understand — and how could you do it cleanly?' },
    { n:61, name:'Knight of Swords', g:'🗡️', lab:'Knight', suit:'swords', up:'The charging mind — fast thought, direct truth, the headlong drive of an idea. Decisive, blade-first.', sh:'recklessness; cutting words; charging in without the body.', q:'Where does a clear idea want decisive action, and where would it just wound?' },
    { n:62, name:'Queen of Swords', g:'🗡️', lab:'Queen', suit:'swords', up:'The clear-eyed queen — independent perception, honest discernment, truth without cruelty, boundaries that hold.', sh:'coldness; bitterness; the blade turned to ice.', q:'Where can you be clear and kind at once — neither soft nor cold?' },
    { n:63, name:'King of Swords', g:'🗡️', lab:'King', suit:'swords', up:'The sovereign mind — intellectual authority, truth in service of justice, the word that orders the world.', sh:'tyranny of logic; truth without heart; the judge who forgot the body.', q:'Where does your clarity need to serve life, not just be correct?' },

    { n:64, name:'Ace of Pentacles', g:'🪙', lab:'Ace', suit:'pentacles', up:'The seed of gold — a tangible beginning, opportunity made of matter, the body and the work given new root. Capricorn’s soil.', sh:'hoarding the seed; security as the only good; potential left unplanted.', q:'What real, plantable opportunity is in your hand right now?' },
    { n:65, name:'Two of Pentacles', g:'🪙', lab:'2', suit:'pentacles', up:'The juggler of coins — balance, adaptability, holding the demands of body, money, and work in flow.', sh:'overwhelm; dropping what matters; juggling to avoid choosing.', q:'What are you trying to hold that you could set down?' },
    { n:66, name:'Three of Pentacles', g:'🪙', lab:'3', suit:'pentacles', up:'The craftsman’s collaboration — skill recognised, the work taking form, mastery built with others. The platform under construction.', sh:'perfectionism; working alone when you need the guild; skill unshared.', q:'What part of the work needs other hands to come into form?' },
    { n:67, name:'Four of Pentacles', g:'🪙', lab:'4', suit:'pentacles', up:'The held coins — security, structure, keeping what you’ve built. Stability, sometimes a fist closed too tight.', sh:'clinging; scarcity; the shrink-to-fit grip on what you have.', q:'What are you gripping out of fear that wants to circulate?' },
    { n:68, name:'Five of Pentacles', g:'🪙', lab:'5', suit:'pentacles', up:'The cold outside the window — material hardship, feeling left out, the lean season. Warmth nearby if you look up.', sh:'isolation in the lack; not asking for help; refusing the lit window.', q:'What support is right there that your pride won’t let you enter?' },
    { n:69, name:'Six of Pentacles', g:'🪙', lab:'6', suit:'pentacles', up:'The scales and the giving hand — generosity, flow, balanced exchange, receiving and giving in right measure.', sh:'strings attached; power through giving; debt used as control.', q:'Where is your giving and receiving out of balance?' },
    { n:70, name:'Seven of Pentacles', g:'🪙', lab:'7', suit:'pentacles', up:'The gardener pausing — patience, the long view, assessing the slow harvest. The body’s practice maturing.', sh:'impatience; pulling up the roots to check; quitting before harvest.', q:'What slow-growing work needs your patience, not your panic?' },
    { n:71, name:'Eight of Pentacles', g:'🪙', lab:'8', suit:'pentacles', up:'The devoted craftsman — mastery through repetition, the practice, skill built coin by coin. The daily reps.', sh:'drudgery; perfectionism; craft with no soul left in it.', q:'What practice is asking for your devoted, repeated hands?' },
    { n:72, name:'Nine of Pentacles', g:'🪙', lab:'9', suit:'pentacles', up:'The garden of self-sufficiency — earned abundance, refined pleasure, the body at ease in a life it built. Sensual independence.', sh:'gilded isolation; success enjoyed alone; comfort built as a wall.', q:'Can you fully enjoy what you’ve built, without apology?' },
    { n:73, name:'Ten of Pentacles', g:'🪙', lab:'10', suit:'pentacles', up:'The full estate — legacy, lasting wealth, the work rooted across generations. The platform become a house.', sh:'wealth without meaning; tradition as a cage; counting coins, missing life.', q:'What are you building that you want to outlast you?' },
    { n:74, name:'Page of Pentacles', g:'🪙', lab:'Page', suit:'pentacles', up:'The student of the real — the apprentice, curiosity about craft and body and money, the first earnest study.', sh:'all study, no practice; dreaming the goal, skipping the reps.', q:'What skill is asking you to become its humble student?' },
    { n:75, name:'Knight of Pentacles', g:'🪙', lab:'Knight', suit:'pentacles', up:'The steady plough — reliability, method, the unglamorous consistency that actually builds. Capricorn’s patient ride.', sh:'stagnation; rigidity; so cautious that nothing moves.', q:'Where does the slow, reliable path want you to commit?' },
    { n:76, name:'Queen of Pentacles', g:'🪙', lab:'Queen', suit:'pentacles', up:'The nurturing provider — embodied abundance, the one who tends body, home, and resources with sensual care. Practical magic.', sh:'overwork; smothering; self-neglect while tending everyone else.', q:'Are you tending your own garden as well as everyone else’s?' },
    { n:77, name:'King of Pentacles', g:'🪙', lab:'King', suit:'pentacles', up:'The lord of the manifest — material mastery, the spiritual-millionaire’s ground, abundance held with ease and generosity. Body, money, and power integrated.', sh:'greed; status as identity; body and soul sold for the holdings.', q:'What would it mean to be wealthy and still wholly yourself?' }
  ];

  var ROMAN = ['0','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI'];

  function cardBadge(c){ return c.lab || ROMAN[c.n]; }
  function cardKind(c){ return c.suit || 'major arcana'; }

  var KEY = 'tarot_v1';
  var state = load();
  var tab = state.lastTab || 'draw';
  var openCard = null;
  function load(){ try{ var r=localStorage.getItem(KEY); if(r)return JSON.parse(r); }catch(e){} return { lastTab:'draw' }; }
  function save(){ state.lastTab=tab; try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
  function el(t,c,h){ var n=document.createElement(t); if(c)n.className=c; if(h!=null)n.innerHTML=h; return n; }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms);}catch(e){} }
  var toastTimer; function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove('show');},1500); }
  function todayKey(){ var d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
  function draw(){ return DECK[Math.floor(Math.random()*DECK.length)]; }
  function cardByNum(n){ for(var i=0;i<DECK.length;i++) if(DECK[i].n===n) return DECK[i]; return null; }

  function render(){
    var v=document.getElementById('view'); v.innerHTML='';
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab===tab); });
    if(tab==='draw') renderDraw(v);
    else if(tab==='deck') renderDeck(v);
    else renderXIV(v);
    window.scrollTo(0,0);
  }

  function cardFace(c){
    var f=el('div','card-face'+(c.integration?' integration':''));
    f.appendChild(el('div','card-num', cardBadge(c) + ' · ' + cardKind(c)));
    f.appendChild(el('div','card-glyph', c.g));
    f.appendChild(el('div','card-name', esc(c.name)));
    f.appendChild(el('div','card-up', esc(c.up)));
    f.appendChild(el('div','card-shadow', '<b>shadow</b> &middot; ' + esc(c.sh)));
    f.appendChild(el('div','card-prompt', esc(c.q)));
    return f;
  }

  function renderDraw(v){
    // daily card
    v.appendChild(el('div','eyebrow','today’s card'));
    if(state.dailyDate!==todayKey()){
      var prompt=el('div','hint','One card for the day. Breathe, hold a question, and draw.');
      v.appendChild(prompt);
      var b=el('button','btn','draw the day’s card');
      b.addEventListener('click', function(){ state.dailyDate=todayKey(); state.dailyCardN=draw().n; save(); buzz(20); render(); });
      v.appendChild(b);
    } else {
      v.appendChild(cardFace(cardByNum(state.dailyCardN)));
    }
    // three-card spread
    v.appendChild(el('div','eyebrow','three cards — past · present · what’s emerging'));
    var sb=el('button','btn ghost','draw a three-card spread');
    sb.addEventListener('click', function(){
      var picks=[]; var used={};
      while(picks.length<3){ var c=draw(); if(!used[c.n]){ used[c.n]=1; picks.push(c); } }
      state.spread=picks.map(function(c){return c.n;}); save(); buzz([20,30,20]); render();
    });
    v.appendChild(sb);
    if(state.spread && state.spread.length===3){
      var labels=['past','present','emerging'];
      var sp=el('div','spread');
      state.spread.forEach(function(n,i){
        var c=cardByNum(n);
        var sc=el('div','spread-card'+(c.integration?'':''));
        sc.appendChild(el('div','spread-pos', labels[i]));
        sc.appendChild(el('div','spread-name', cardBadge(c)+' · '+esc(c.name)));
        sc.appendChild(el('div','spread-up', esc(c.up)));
        sp.appendChild(sc);
      });
      v.appendChild(sp);
    }
  }

  function renderDeck(v){
    var sections=[
      ['the 22 major arcana — the soul’s journey', function(c){return !c.suit;}],
      ['wands — fire · the primal will, the red flame', function(c){return c.suit==='wands';}],
      ['cups — water · the heart’s depths', function(c){return c.suit==='cups';}],
      ['swords — air · the blade of truth', function(c){return c.suit==='swords';}],
      ['pentacles — earth · the body & the work', function(c){return c.suit==='pentacles';}]
    ];
    sections.forEach(function(sec){
      v.appendChild(el('div','eyebrow', sec[0]));
      DECK.filter(sec[1]).forEach(function(c){
        var wrap=el('div','deck-row-wrap'+(openCard===c.n?' open':''));
        var row=el('div','deck-row');
        row.appendChild(el('div','deck-num', cardBadge(c)));
        row.appendChild(el('div','deck-name'+(c.integration?' integration':''), c.g+' '+esc(c.name)));
        row.addEventListener('click', function(){ openCard=(openCard===c.n?null:c.n); render(); });
        wrap.appendChild(row);
        var body=el('div','deck-body');
        body.appendChild(el('div','deck-up', esc(c.up)));
        body.appendChild(el('div','card-shadow', '<b>shadow</b> &middot; '+esc(c.sh)));
        body.appendChild(el('div','deck-prompt', esc(c.q)));
        wrap.appendChild(body);
        v.appendChild(wrap);
      });
    });
  }

  function renderXIV(v){
    var hero=el('div','xiv-hero');
    hero.appendChild(el('div','xiv-flames','🔥 ✦ 🔥'));
    hero.appendChild(el('div','xiv-title','Card XIV — The Integration'));
    hero.appendChild(el('div','xiv-sub','temperance, reborn'));
    v.appendChild(hero);

    var blocks=[
      ['the image','Artboy stands holding two flames — the gold sacred flame in one hand, the red primal flame in the other. Halo and horns in one body. He is not choosing between them; he is the vessel that holds both without being torn.'],
      ['the meaning','Temperance is the alchemist’s card: the blending of opposites into a third thing that neither could be alone. Sacred and primal. Joey and Sophia. The fire that eats and the fire that sings — proven to be the same fire. The whole HaloHorns work, compressed into one glyph.'],
      ['the practice','Integration is not transcendence. You do not rise above the primal; you metabolise it until the spark inside it is free. The Beast Temple feeds one flame, the Inner Temple tends the other, and Card XIV is the state where they stop being two.'],
      ['the shadow','Splitting. Choosing one fire and exiling the other — the spiritual bypass that starves the body, or the appetite that drowns the spirit. Faking balance instead of forging it. The card asks, always: which flame are you exiling today?'],
      ['the body question','Read the two flames and feel your chest. Which one are you holding fully, and which one are you holding at arm’s length? What would it cost — and what would it free — to hold both at once?']
    ];
    blocks.forEach(function(b){
      var d=el('div','xiv-block');
      d.appendChild(el('div','xiv-label', b[0]));
      d.appendChild(el('div','xiv-text', b[1]));
      v.appendChild(d);
    });
  }

  document.getElementById('tabs').addEventListener('click', function(e){ var t=e.target.closest('.tab'); if(!t)return; tab=t.dataset.tab; save(); render(); });
  document.getElementById('back-btn').addEventListener('click', function(){ try{ window.parent.postMessage('close-temple','*'); }catch(e){} try{ window.location.href='index.html'; }catch(e){} });
  render();
})();
</script>
