  function moonPhase(date) {
    const refMs = Date.UTC(2000, 0, 6, 18, 14);
    const period = 29.530588;
    const dayUTC = (date.getTime() - refMs) / 86400000;
    const age = ((dayUTC % period) + period) % period;
    const frac = age / period;
    if (frac < 0.03 || frac >= 0.97) return { key: 'new', name: 'new moon', glyph: '🌑', hint: true };
    if (frac < 0.22) return { key: 'waxing_crescent', name: 'waxing crescent', glyph: '🌒', hint: false };
    if (frac < 0.28) return { key: 'first_quarter', name: 'first quarter', glyph: '🌓', hint: false };
    if (frac < 0.47) return { key: 'waxing_gibbous', name: 'waxing gibbous', glyph: '🌔', hint: false };
    if (frac < 0.53) return { key: 'full', name: 'full moon', glyph: '🌕', hint: true };
    if (frac < 0.72) return { key: 'waning_gibbous', name: 'waning gibbous', glyph: '🌖', hint: false };
    if (frac < 0.78) return { key: 'last_quarter', name: 'last quarter', glyph: '🌗', hint: false };
    return { key: 'waning_crescent', name: 'waning crescent', glyph: '🌘', hint: false };
  }

  const SCHEDULE_KEY = 'portal_flow_schedule_v1';
  const DEFAULT_MORNING = { name: 'Solar Gate', source: 'inner', durationLabel: '~30 min', meta: '6 steps', id: 'solar_gate' };
  const DEFAULT_EVENING = { name: 'Wind-Down', source: 'inner', durationLabel: '~15 min', meta: '4 steps', id: 'evening_winddown' };

  function loadSchedule() {
    try { return JSON.parse(localStorage.getItem(SCHEDULE_KEY)) || {}; }
    catch(e) { return {}; }
  }
  function saveSchedule(s) { try { localStorage.setItem(SCHEDULE_KEY, JSON.stringify(s)); } catch(e) {} }
  function getSlot(weekday, slot) {
    const sched = loadSchedule();
    if (sched[weekday] && sched[weekday][slot] !== undefined) return sched[weekday][slot];
    return slot === 'morning' ? DEFAULT_MORNING : DEFAULT_EVENING;
  }
  function setSlot(weekday, slot, value) {
    const sched = loadSchedule();
    if (!sched[weekday]) sched[weekday] = {};
    sched[weekday][slot] = value;
    saveSchedule(sched);
  }
  function resetSchedule() { try { localStorage.removeItem(SCHEDULE_KEY); } catch(e) {} }
  // Daytime band — recurring practices between morning and evening, per weekday.
  function getMid(weekday) {
    const s = loadSchedule();
    return (s[weekday] && Array.isArray(s[weekday].mid)) ? s[weekday].mid : [];
  }
  function addMid(weekday, ref) {
    const s = loadSchedule();
    if (!s[weekday]) s[weekday] = {};
    if (!Array.isArray(s[weekday].mid)) s[weekday].mid = [];
    s[weekday].mid.push(ref);
    saveSchedule(s);
  }
  function removeMid(weekday, idx) {
    const s = loadSchedule();
    if (s[weekday] && Array.isArray(s[weekday].mid)) { s[weekday].mid.splice(idx, 1); saveSchedule(s); }
  }

  function sourceToRoute(src) {
    if (src === 'inner') return 'inner';
    if (src === 'body') return 'body';
    if (src === 'beast') return 'beast';
    if (src === 'magnetic') return 'magnetic';
    return null;
  }

  function render() {
    const mount = document.getElementById('app-mount');

      mount.appendChild(view);

    const now = new Date();
    const dayIdx = now.getDay();
    const day = DAYS[dayIdx];
    // Read from Body Temple's actual schedule (source of truth), fall back to hardcoded defaults.
    const train = readBodyTempleSchedule(day) || TRAINING_SCHEDULE[day];

    const moon = moonPhase(now);
    hero.innerHTML = `
      <div class="portal-date-big">${escapeHtml(now.toLocaleDateString(undefined, { month: 'long', day: 'numeric' }).toLowerCase())}</div>

    const lunarGuide = MOON_GUIDE[moon.key];
    if (lunarGuide) {

    // Morning slot — from schedule (default: Solar Gate)
    const morningVal = getSlot(day, 'morning');
    if (morningVal !== null) {
      const mRoute = sourceToRoute(morningVal.source);
      const mMeta = [morningVal.durationLabel, morningVal.meta, morningVal.source ? morningVal.source + ' temple' : ''].filter(Boolean);
      timeline.appendChild(makeBlock({
        icon: '☉', iconClass: 'gold', cardClass: 'gold',
        cardId: 'morning',
        steps: lookupStepsFor(morningVal.id),
        onBegin: mRoute ? () => executeBegin(mRoute, morningVal.id, morningVal.name) : null,
        beginLabel: mRoute ? 'begin' : null,
        eyebrow: 'morning', name: morningVal.name,
        sub: morningVal.id === 'solar_gate' ? 'foundation layer — phone stays away, body comes first' : '',
        meta: mMeta
      }));
    }

    timeline.appendChild(makeBlock({
      icon: train.kind === 'training' ? '☼' : train.kind === 'cardio' ? '◐' : '◯',
      iconClass: train.kind === 'training' ? 'emerald' : 'dim',
      cardClass: train.kind === 'training' ? 'emerald' : 'dim',
      cardId: 'training',
      onBegin: () => executeBegin('body', train.planId, train.name),
      beginLabel: 'begin in body temple',
      eyebrow: train.kind === 'training' ? 'training' : (train.kind === 'cardio' ? 'cardio / recovery' : 'rest'),
      name: train.name, sub: train.sub,
      meta: [train.duration, train.meta, 'body temple']
    }));

    const cross = CROSSLINKS[train.planId];
    if (cross && (cross.before || cross.after)) {
      const cl = document.createElement('div');
      cl.className = 'crosslink';
      let html = `<div class="crosslink-label">${escapeHtml(cross.label)}</div>`;
      if (cross.before) html += `<div class="crosslink-text"><strong>before</strong> — ${escapeHtml(cross.before)}</div>`;
      if (cross.before && cross.after) html += `<div style="height:8px"></div>`;
      if (cross.after) html += `<div class="crosslink-text"><strong>after</strong> — ${escapeHtml(cross.after)}</div>`;
      cl.innerHTML = html;
      timeline.appendChild(cl);
    }

    // Daytime band — recurring practices scheduled between morning and evening
    getMid(day).forEach((ref, i) => {
      const rRoute = sourceToRoute(ref.source);
      timeline.appendChild(makeBlock({
        icon: '◇', iconClass: 'gold', cardClass: 'gold',
        cardId: 'mid-' + i,
        steps: lookupStepsFor(ref.id),
        onBegin: rRoute ? () => executeBegin(rRoute, ref.id, ref.name) : null,
        beginLabel: rRoute ? 'begin' : null,
        eyebrow: 'daytime', name: ref.name, sub: '',
        meta: [ref.durationLabel, ref.source ? ref.source + ' temple' : ''].filter(Boolean)
      }));
    });

    // Evening slot — from schedule (default: Wind-Down)
    const eveningVal = getSlot(day, 'evening');
    if (eveningVal !== null) {
      const eRoute = sourceToRoute(eveningVal.source);
      const eMeta = [eveningVal.durationLabel, eveningVal.meta, eveningVal.source ? eveningVal.source + ' temple' : ''].filter(Boolean);
      timeline.appendChild(makeBlock({
        icon: '☽', iconClass: 'gold', cardClass: 'gold',
        cardId: 'evening',
        steps: lookupStepsFor(eveningVal.id),
        onBegin: eRoute ? () => executeBegin(eRoute, eveningVal.id, eveningVal.name) : null,
        beginLabel: eRoute ? 'begin' : null,
        eyebrow: 'evening', name: eveningVal.name,
        sub: eveningVal.id === 'evening_winddown' ? "drop the day. long exhales. give the system the signal that it's safe to sleep." : '',
        meta: eMeta
      }));
    }

    // render today's added flow extras after the defaults
    renderFlowExtras(timeline);
    view.appendChild(timeline);

    // "+ add to today's flow" button
    const flowAddBtn = el('button', 'flow-add-btn', '+ add to today’s flow');
    flowAddBtn.addEventListener('click', openAddToFlow);
    view.appendChild(flowAddBtn);

    renderStackPulse(view);
    renderNextPractice(view);

    view.appendChild(el('div', 'section-eyebrow', 'jump in'));
    const grid = document.createElement('div');
    grid.className = 'temples-grid';
    const mkCard = (color, chakra, name, sub, route) => {
      const c = el('button', 'temple-card ' + color);
      c.innerHTML = '<div class="temple-name ' + color + '"><span class="temple-chakra">' + chakra + '</span>' + name + '</div><div class="temple-sub">' + sub + '</div>';
      c.addEventListener('click', () => Shell.goTo(route));
      grid.appendChild(c);
    };
    mkCard('c-brow',   '🌌', 'Inner Temple',       'breath · meditation · daily', 'inner');
    mkCard('breath',   '🌬️', 'Breath &amp; Energy',    'orbit · prana · cultivation', 'breath');
    mkCard('c-root',   '🏋️', 'Body Temple',        'training · vessel', 'body');
    mkCard('c-crown',  '🌿', 'Healing Temple',   'qi · reiki · prana', 'grimoire');
    mkCard('azure',    '🎙️', 'Vocal Temple',       'breath · voice · range', 'vocal');
    mkCard('c-sacral', '🔥', 'Lover Temple',       'primal · lover · sacred bodywork', 'beast');
    mkCard('c-throat', '🎨', 'Hibrations',         'capture · craft · ship', 'hibrations');
    mkCard('c-heart',  '🎸', 'Strings &amp; Soul', 'ukulele · guitar', 'strings');
    mkCard('mystic',   '🔮', 'Tarot',              'draw · deck · card XIV', 'tarot');
    mkCard('pewter',   '🪞', 'The Weekly Mirror',  'the week, reflected', 'mirror');
    view.appendChild(grid);

    mount.appendChild(view);
  }

  Shell.setDateTitle();
  render();

  return { render };
})();
</script>
</body>
</html>
