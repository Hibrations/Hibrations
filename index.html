<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0908">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>Daily Practice</title>
<style>
:root {
  --bg: #0a0908;
  --bg-elev: #14110f;
  --bg-card: #1a1614;
  --border: #2a2420;
  --border-soft: #1f1a17;
  --ink: #e8e1d4;
  --ink-dim: #9a8f80;
  --ink-faint: #5e554a;
  --emerald: #3d7d63;
  --emerald-dim: #2a5847;
  --gold: #c89060;
  --gold-dim: #8a6543;
  --crimson: #9a4435;
  --crimson-dim: #6e2d22;
  --warning: #c89060;
  --bronze: #a87b50;
  --bronze-dim: #6f5536;
  --amethyst: #9a7bc8;
  --amethyst-dim: #6f5092;
  --teal: #46a3a8;
  --teal-dim: #2f6e70;
  --indigo: #7d8fd0;
  --indigo-dim: #4a5494;
  /* chakra system — surface identity colors (root → crown) */
  --c-root:   #c75a4d;  --c-root-dim:   #7e3a32;
  --c-sacral: #cf8447;  --c-sacral-dim: #82522c;
  --c-solar:  #ccae50;  --c-solar-dim:  #847035;
  --c-heart:  #5aa96f;  --c-heart-dim:  #356b46;
  --c-throat: #5b91cc;  --c-throat-dim: #395d84;
  --c-brow:   #8f7bd4;  --c-brow-dim:   #574a8c;
  --c-crown:  #c2c8d8;  --c-crown-dim:  #767c8e;
  /* additional surface accents */
  --azure: #6fa8d8;  --azure-dim: #3f6e98;
  --mystic: #a86fc0; --mystic-dim: #6f4082;
  --pewter: #9aa2b4; --pewter-dim: #5e6473;
  --pull: #7d8fc7;
  --push: #c78f8f;
  --hinge: #a89b6b;
  --squat: #6ba879;
  --core: #b08fc7;
  --mobility: #8fb8c7;
  --breath: #8fb8c7;
  --meditation: #b08fc7;
  --movement: #6ba879;
  --vocal: #c78f8f;
  --ritual: #c89060;
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg); color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 16px; line-height: 1.55; min-height: 100vh;
  overscroll-behavior-y: contain; -webkit-font-smoothing: antialiased;
}
body {
  padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 80px) env(safe-area-inset-left);
  max-width: 720px; margin: 0 auto;
}
button, a.button-link { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; text-decoration: none; }
input, textarea, select {
  font: inherit; color: inherit;
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 12px 14px; width: 100%;
  outline: none; transition: border-color 0.15s ease;
}
input:focus, textarea:focus, select:focus { border-color: var(--emerald); }
.app-inner input:focus, .app-inner textarea:focus, .app-inner select:focus { border-color: var(--gold); }
textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
::placeholder { color: var(--ink-faint); }

/* ====== SHELL HEADER ====== */
header.shell-header {
  padding: 28px 22px 18px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border-soft);
}
.shell-back {
  font-size: 12px; letter-spacing: 0.1em; text-transform: lowercase;
  color: var(--ink-dim); padding: 8px 12px;
  border: 1px solid var(--border); border-radius: 999px;
  transition: all 0.15s;
}
.shell-back:active { color: var(--ink); border-color: var(--ink-dim); }
.shell-back[hidden] { display: none; }
.shell-titleblock { flex: 1; }
.shell-title { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); }
.shell-date { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.05em; margin-top: 2px; }

main { padding: 0 22px; }
.view { display: none; padding-top: 24px; padding-bottom: 32px; }
.view.active { display: block; animation: fade 0.25s ease-out; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ====== TAB BAR ====== */
nav.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10, 9, 8, 0.92);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--border-soft);
  padding: 12px max(env(safe-area-inset-left), 0px) calc(env(safe-area-inset-bottom) + 12px) max(env(safe-area-inset-right), 0px);
  display: flex; justify-content: space-around; z-index: 50;
}
.tab-bar:empty { display: none; }
.tab-btn {
  flex: 1; padding: 8px 6px; font-size: 10px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-faint); text-align: center; transition: color 0.15s;
}
.tab-btn.active { color: var(--ink); }
.app-inner .tab-btn.active { color: var(--ink); }

/* ====== PORTAL VIEW ====== */
.portal-hero { text-align: center; padding: 8px 0 24px; }
.portal-date-big { font-size: 28px; font-weight: 300; letter-spacing: -0.01em; color: var(--ink); margin-bottom: 4px; }
.portal-day-name { font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 12px; }
.portal-arc { font-size: 12px; color: var(--ink-faint); font-style: italic; line-height: 1.5; }

.section-eyebrow { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); margin: 26px 0 12px; }

.timeline { position: relative; padding-left: 36px; }
.timeline::before {
  content: ''; position: absolute; left: 13px; top: 24px; bottom: 24px;
  width: 1px;
  background: linear-gradient(to bottom, var(--gold-dim) 0%, var(--emerald-dim) 50%, var(--gold-dim) 100%);
  opacity: 0.5;
}
.timeline-block { position: relative; margin-bottom: 18px; }
.timeline-block:last-child { margin-bottom: 0; }
.timeline-icon {
  position: absolute; left: -36px; top: 22px;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg); border: 1.5px solid var(--ink-faint);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; z-index: 2;
}
.timeline-icon.gold { border-color: var(--gold); color: var(--gold); }
.timeline-icon.emerald { border-color: var(--emerald); color: var(--emerald); }
.timeline-icon.dim { border-color: var(--ink-faint); color: var(--ink-faint); }
.day-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-md);
  position: relative; overflow: hidden;
  transition: border-color 0.15s;
}
.day-card.open { border-color: var(--gold-dim); }
.day-card.dim { opacity: 0.7; }
.day-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--ink-faint); opacity: 0.6; }
.day-card.gold::before { background: var(--gold); }
.day-card.emerald::before { background: var(--emerald); }
.day-card-summary {
  display: block; width: 100%; text-align: left;
  padding: 18px 20px;
  background: transparent; border: none;
  color: inherit; font: inherit;
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
}
.day-card-summary:active { transform: scale(0.99); }
.day-card-eyebrow { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 4px; }
.day-card-name { font-size: 19px; font-weight: 400; letter-spacing: -0.005em; color: var(--ink); margin-bottom: 4px; }
.day-card-sub { font-size: 13px; color: var(--ink-dim); line-height: 1.5; margin-bottom: 10px; }
.day-card-meta { display: flex; gap: 14px; font-size: 11px; color: var(--ink-faint); letter-spacing: 0.04em; text-transform: lowercase; }
.day-card-arrow { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); font-size: 14px; pointer-events: none; transition: transform 0.2s, color 0.2s; }
.day-card.open .day-card-arrow { transform: translateY(-50%) rotate(90deg); color: var(--gold); }

/* Flow card expansion — steps + begin (Round 13) */
.day-card-expansion {
  display: none;
  padding: 4px 20px 18px;
  border-top: 1px solid var(--border-soft);
}
.day-card.open .day-card-expansion { display: block; }
.day-card-steps {
  margin: 14px 0 18px;
  padding-left: 22px;
  font-size: 13px; color: var(--ink-dim); line-height: 1.6;
}
.day-card-steps li { margin-bottom: 6px; }
.day-card-steps li:last-child { margin-bottom: 0; }
.day-card-begin {
  display: block; width: 100%; padding: 13px;
  background: transparent; border: 1px solid var(--gold);
  color: var(--gold); border-radius: var(--r-md);
  font-family: inherit; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.day-card-begin:active { background: var(--gold); color: var(--bg); }

.crosslink {
  background: var(--bg-elev); border-left: 2px solid var(--bronze);
  border-radius: 0 var(--r-md) var(--r-md) 0;
  padding: 14px 18px; margin: 8px 0 18px; margin-left: 14px;
}
.crosslink-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bronze); margin-bottom: 8px; }
.crosslink-text { font-size: 13px; color: var(--ink-dim); line-height: 1.6; font-style: italic; }
.crosslink-text strong { font-style: normal; font-weight: 500; color: var(--ink); }

.temples-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.temple-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 18px 12px; text-align: center;
  transition: border-color 0.15s, transform 0.15s;
  display: block; cursor: pointer; width: 100%;
}
.temple-card:active { transform: scale(0.98); }
.temple-card.gold { border-color: var(--gold-dim); }
.temple-card.gold:active { border-color: var(--gold); }
.temple-card.emerald { border-color: var(--emerald-dim); }
.temple-card.emerald:active { border-color: var(--emerald); }
.temple-card.crimson { border-color: var(--crimson-dim); }
.temple-card.crimson:active { border-color: var(--crimson); }
.temple-card.bronze { border-color: var(--bronze-dim); }
.temple-card.bronze:active { border-color: var(--bronze); }
.temple-card.amethyst { border-color: var(--amethyst-dim); }
.temple-card.amethyst:active { border-color: var(--amethyst); }
.temple-name.amethyst { color: var(--amethyst); }
.temple-card.teal { border-color: var(--teal-dim); }
.temple-card.teal:active { border-color: var(--teal); }
.temple-name.teal { color: var(--teal); }
.temple-card.indigo { border-color: var(--indigo-dim); }
.temple-card.indigo:active { border-color: var(--indigo); }
.temple-name.indigo { color: var(--indigo); }
/* chakra surface variants */
.temple-card.c-root   { border-color: var(--c-root-dim); }   .temple-card.c-root:active   { border-color: var(--c-root); }   .temple-name.c-root   { color: var(--c-root); }
.temple-card.c-sacral { border-color: var(--c-sacral-dim); } .temple-card.c-sacral:active { border-color: var(--c-sacral); } .temple-name.c-sacral { color: var(--c-sacral); }
.temple-card.c-solar  { border-color: var(--c-solar-dim); }  .temple-card.c-solar:active  { border-color: var(--c-solar); }  .temple-name.c-solar  { color: var(--c-solar); }
.temple-card.c-heart  { border-color: var(--c-heart-dim); }  .temple-card.c-heart:active  { border-color: var(--c-heart); }  .temple-name.c-heart  { color: var(--c-heart); }
.temple-card.c-throat { border-color: var(--c-throat-dim); } .temple-card.c-throat:active { border-color: var(--c-throat); } .temple-name.c-throat { color: var(--c-throat); }
.temple-card.c-brow   { border-color: var(--c-brow-dim); }   .temple-card.c-brow:active   { border-color: var(--c-brow); }   .temple-name.c-brow   { color: var(--c-brow); }
.temple-card.c-crown  { border-color: var(--c-crown-dim); }  .temple-card.c-crown:active  { border-color: var(--c-crown); }  .temple-name.c-crown  { color: var(--c-crown); }
.temple-card.azure  { border-color: var(--azure-dim); }  .temple-card.azure:active  { border-color: var(--azure); }  .temple-name.azure  { color: var(--azure); }
.temple-card.mystic { border-color: var(--mystic-dim); } .temple-card.mystic:active { border-color: var(--mystic); } .temple-name.mystic { color: var(--mystic); }
.temple-card.pewter { border-color: var(--pewter-dim); } .temple-card.pewter:active { border-color: var(--pewter); } .temple-name.pewter { color: var(--pewter); }
.temple-chakra { font-size: 11px; margin-right: 5px; opacity: 0.9; }
.temple-name { font-size: 14px; font-weight: 500; letter-spacing: 0.02em; margin-bottom: 4px; }
.temple-name.gold { color: var(--gold); }
.temple-name.emerald { color: var(--emerald); }
.temple-name.crimson { color: var(--crimson); }
.temple-name.bronze { color: var(--bronze); }
.temple-sub { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.04em; }

.heart-note {
  margin-top: 36px; padding: 20px 22px;
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  border-radius: var(--r-md); text-align: center;
}
.heart-note-text { font-size: 13.5px; color: var(--ink-dim); font-style: italic; line-height: 1.7; }

/* ====== SHARED CARDS / BUTTONS ====== */
.today-eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 10px; }
.today-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 28px 24px; margin-bottom: 18px;
  position: relative; overflow: hidden;
}
.today-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--emerald); opacity: 0.7; }
.app-inner .today-card::before { background: var(--gold); }
.today-card.alt-mode::before { background: var(--warning); }
.today-card.zen::before { background: var(--crimson); }
.today-name { font-size: 32px; font-weight: 300; letter-spacing: -0.01em; margin-bottom: 4px; line-height: 1.15; }
.today-sub { color: var(--ink-dim); font-size: 14px; margin-bottom: 18px; }
.today-meta { display: flex; gap: 16px; font-size: 12px; color: var(--ink-faint); letter-spacing: 0.05em; margin-bottom: 24px; }

.btn-primary {
  width: 100%; background: var(--emerald); color: var(--bg);
  font-weight: 500; padding: 16px 20px; border-radius: var(--r-md);
  font-size: 15px; letter-spacing: 0.04em; transition: background 0.15s;
}
.btn-primary:active { background: var(--emerald-dim); }
.app-inner .btn-primary { background: var(--gold); }
.app-inner .btn-primary:active { background: var(--gold-dim); }
.btn-secondary {
  width: 100%; background: transparent; color: var(--ink);
  border: 1px solid var(--border); padding: 14px 20px; border-radius: var(--r-md);
  font-size: 14px; letter-spacing: 0.03em; transition: border-color 0.15s, background 0.15s;
}
.btn-secondary:active { border-color: var(--ink-dim); background: var(--bg-elev); }
.btn-danger { color: var(--crimson); background: transparent; border: 1px solid var(--crimson-dim); padding: 14px 20px; border-radius: var(--r-md); font-size: 13px; letter-spacing: 0.05em; }
.btn-danger:active { background: rgba(154, 68, 53, 0.08); }

.escape-hatch { margin-top: 22px; text-align: center; }
.escape-hatch-prompt { color: var(--ink-faint); font-size: 13px; font-style: italic; margin-bottom: 12px; }
.alt-modes-grid, .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.alt-mode-card, .quick-card {
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  border-radius: var(--r-md); padding: 16px 14px;
  text-align: left; transition: border-color 0.15s; cursor: pointer; width: 100%;
}
.alt-mode-card:active, .quick-card:active { border-color: var(--ink-dim); }
.alt-mode-name, .quick-card-name { font-size: 15px; margin-bottom: 4px; }
.alt-mode-sub, .quick-card-sub { font-size: 12px; color: var(--ink-faint); line-height: 1.4; }

/* ====== SESSION (shared by both apps) ====== */
.session-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.session-title { font-size: 26px; font-weight: 300; letter-spacing: -0.01em; }
.session-progress { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.08em; }
.session-sub { color: var(--ink-dim); font-size: 13px; margin-bottom: 22px; }
.warmup-block, .cooldown-block, .intro-block, .closing-block {
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  border-radius: var(--r-md); padding: 16px 18px; margin-bottom: 18px;
}
.warmup-block summary, .cooldown-block summary, .intro-block summary, .closing-block summary {
  font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-dim); cursor: pointer; outline: none; list-style: none;
  display: flex; justify-content: space-between; align-items: center;
}
.warmup-block summary::-webkit-details-marker, .cooldown-block summary::-webkit-details-marker,
.intro-block summary::-webkit-details-marker, .closing-block summary::-webkit-details-marker { display: none; }
.warmup-block summary::after, .cooldown-block summary::after, .intro-block summary::after, .closing-block summary::after { content: '+'; font-size: 18px; color: var(--ink-faint); font-weight: 300; }
.warmup-block[open] summary::after, .cooldown-block[open] summary::after, .intro-block[open] summary::after, .closing-block[open] summary::after { content: '−'; }
.warmup-block ul, .cooldown-block ul { list-style: none; padding: 0; margin-top: 12px; }
.warmup-block li, .cooldown-block li { padding: 6px 0; color: var(--ink-dim); font-size: 14px; border-top: 1px solid var(--border-soft); }
.warmup-block li:first-child, .cooldown-block li:first-child { border-top: none; }
.intro-block .text, .closing-block .text { margin-top: 12px; color: var(--ink-dim); font-size: 14px; font-style: italic; line-height: 1.6; }

.exercise-card, .step-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 18px 18px 14px;
  margin-bottom: 12px; transition: opacity 0.2s;
}
.exercise-card.done, .step-card.done { opacity: 0.45; }
.exercise-card.done .ex-name, .step-card.done .step-name { text-decoration: line-through; text-decoration-color: var(--ink-faint); }
.step-card.active { border-color: var(--gold); }
.ex-row, .step-row { display: flex; align-items: flex-start; gap: 14px; }
.ex-check, .step-check {
  flex: 0 0 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--border); background: transparent;
  margin-top: 2px; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.ex-check.checked { background: var(--emerald); border-color: var(--emerald); }
.step-check.checked { background: var(--gold); border-color: var(--gold); }
.ex-check.checked::after, .step-check.checked::after { content: '✓'; color: var(--bg); font-size: 14px; font-weight: 600; }
.ex-body, .step-body { flex: 1; min-width: 0; }
.ex-letter, .step-letter { display: inline-block; font-size: 11px; letter-spacing: 0.12em; color: var(--ink-faint); text-transform: uppercase; margin-bottom: 2px; }
.ex-name, .step-name { font-size: 17px; font-weight: 400; margin-bottom: 4px; line-height: 1.3; }
.ex-alt { font-size: 12px; color: var(--ink-faint); font-style: italic; margin-bottom: 8px; }
.ex-prescription, .step-prescription { display: flex; gap: 14px; font-size: 13px; color: var(--ink-dim); margin-bottom: 10px; flex-wrap: wrap; }
.ex-prescription span strong, .step-prescription span strong { color: var(--ink); font-weight: 500; }
.ex-cues, .step-cues { font-size: 12px; color: var(--ink-faint); font-style: italic; margin-bottom: 10px; line-height: 1.5; }
.ex-actions, .step-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.ex-action-btn, .step-action-btn {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-dim); padding: 7px 12px;
  border: 1px solid var(--border); border-radius: 999px;
  transition: border-color 0.15s, color 0.15s;
}
.ex-action-btn:active, .step-action-btn:active { border-color: var(--ink); color: var(--ink); }
.ex-action-btn.accent { color: var(--emerald); border-color: var(--emerald-dim); }
.step-action-btn.accent { color: var(--gold); border-color: var(--gold-dim); }
.ex-notes, .step-notes, .ex-form, .step-form { margin-top: 12px; display: none; }
.ex-notes.open, .step-notes.open, .ex-form.open, .step-form.open { display: block; }
.ex-notes textarea, .step-notes textarea { font-size: 14px; background: var(--bg); min-height: 70px; margin-bottom: 6px; }
.ex-notes-prompt, .step-notes-prompt { font-size: 11px; color: var(--ink-faint); font-style: italic; margin-bottom: 6px; }
.ex-form, .step-form { background: var(--bg-elev); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 14px 16px; }
.form-section { margin-bottom: 12px; }
.form-section:last-child { margin-bottom: 0; }
.form-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 4px; }
.form-text { font-size: 13.5px; color: var(--ink); line-height: 1.55; }
.form-text.muted { color: var(--ink-dim); }
.form-image-wrap { margin: 12px 0; border-radius: var(--r-sm); overflow: hidden; background: var(--bg); text-align: center; }
.form-image-wrap img { max-width: 100%; max-height: 240px; display: block; margin: 0 auto; }

/* TIMER */
#timer-overlay {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: var(--bg-card); border: 1px solid var(--emerald);
  border-radius: 999px; padding: 12px 22px;
  display: none; align-items: center; gap: 14px; z-index: 40;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
#timer-overlay.active { display: flex; }
#timer-overlay.gold { border-color: var(--gold); }
.timer-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }
.timer-display { font-variant-numeric: tabular-nums; font-size: 22px; font-weight: 300; color: var(--ink); min-width: 56px; text-align: center; }
.timer-display.flash { color: var(--crimson); }
.timer-stop { font-size: 11px; color: var(--ink-dim); letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 8px; }

.session-complete {
  background: var(--bg-card); border: 1px solid var(--emerald-dim);
  border-radius: var(--r-lg); padding: 28px 24px; text-align: center; margin-top: 24px;
}
.app-inner .session-complete { border-color: var(--gold-dim); }
.session-complete-msg { font-size: 17px; color: var(--ink); margin-bottom: 8px; font-weight: 300; letter-spacing: 0.02em; }
.session-complete-sub { font-size: 13px; color: var(--ink-dim); font-style: italic; margin-bottom: 22px; }
.session-final-notes textarea { background: var(--bg); }

/* PLAN ROWS / EDITOR */
.plans-list { display: flex; flex-direction: column; gap: 10px; }
.plan-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.plan-row-info { flex: 1; min-width: 0; }
.plan-row-name { font-size: 16px; margin-bottom: 2px; }
.plan-row-sub { font-size: 12px; color: var(--ink-faint); }
.plan-row-actions { display: flex; gap: 6px; }
.icon-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-dim); font-size: 14px; transition: border-color 0.15s, color 0.15s; }
.icon-btn:active { border-color: var(--ink); color: var(--ink); }
.section-header { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin: 24px 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border-soft); }
.editor-field { margin-bottom: 16px; }
.editor-label { display: block; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 6px; }
.editor-list-block { background: var(--bg-elev); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 14px; margin-bottom: 14px; }
.editor-list-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.editor-list-item input { flex: 1; padding: 10px 12px; font-size: 14px; }
.editor-exercise, .editor-step { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; margin-bottom: 10px; }
.editor-exercise.linked { border-left: 3px solid var(--emerald); }
.editor-step.linked { border-left: 3px solid var(--gold); }
.editor-ex-link-info, .editor-link-info { font-size: 11px; margin-bottom: 8px; letter-spacing: 0.05em; }
.editor-ex-link-info { color: var(--emerald); }
.editor-link-info { color: var(--gold); }
.editor-ex-grid { display: grid; grid-template-columns: 1fr 80px 90px 80px; gap: 8px; margin-bottom: 8px; }
.editor-step-grid { display: grid; grid-template-columns: 1fr 100px; gap: 8px; margin-bottom: 8px; }
.editor-ex-grid input, .editor-step-grid input { padding: 10px 10px; font-size: 13px; }
.editor-ex-controls, .editor-step-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; padding-top: 8px; border-top: 1px solid var(--border-soft); }
.move-btns { display: flex; gap: 4px; }
.editor-add-btn { width: 100%; padding: 12px; border: 1px dashed var(--border); border-radius: var(--r-md); color: var(--ink-dim); font-size: 13px; letter-spacing: 0.05em; transition: border-color 0.15s, color 0.15s; margin-bottom: 8px; }
.editor-add-btn:active { border-color: var(--ink); color: var(--ink); border-style: solid; }
.editor-add-btn.accent { color: var(--emerald); border-color: var(--emerald-dim); }
.app-inner .editor-add-btn.accent { color: var(--gold); border-color: var(--gold-dim); }
.editor-actions { display: flex; gap: 10px; margin-top: 24px; }
.editor-actions button { flex: 1; }

/* HISTORY */
.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px 16px; }
.history-date { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.05em; margin-bottom: 4px; }
.history-name { font-size: 15px; margin-bottom: 6px; }
.history-stats { font-size: 12px; color: var(--ink-dim); letter-spacing: 0.04em; }
.history-notes { font-size: 13px; color: var(--ink-dim); font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-soft); line-height: 1.5; }

/* ALT MODE / LIBRARY / DETAIL */
.alt-view-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 26px 22px; }
.alt-view-name { font-size: 28px; font-weight: 300; letter-spacing: -0.01em; margin-bottom: 6px; }
.alt-view-sub { color: var(--ink-dim); font-size: 14px; margin-bottom: 20px; }
.alt-view-desc { color: var(--ink); font-size: 15px; line-height: 1.65; margin-bottom: 20px; }
.alt-view-prompts { background: var(--bg-elev); border-left: 2px solid var(--emerald-dim); padding: 14px 18px; border-radius: 0 var(--r-md) var(--r-md) 0; margin-bottom: 20px; }
.alt-view-prompts li { list-style: none; font-size: 14px; color: var(--ink-dim); font-style: italic; padding: 4px 0; }

.library-search-wrap { margin-bottom: 14px; position: relative; }
.library-search-wrap input { padding-left: 40px; font-size: 14px; }
.library-search-wrap::before { content: '⌕'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); font-size: 18px; pointer-events: none; }
.lib-filter-row { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.lib-filter-pill { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); color: var(--ink-faint); transition: all 0.15s; }
.lib-filter-pill.active { color: var(--ink); border-color: var(--ink-dim); background: var(--bg-elev); }
.lib-grid { display: flex; flex-direction: column; gap: 8px; }
.lib-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px 16px; display: flex; align-items: center; gap: 12px; text-align: left; transition: border-color 0.15s; cursor: pointer; width: 100%; }
.lib-card:active { border-color: var(--ink-dim); }
.lib-mech-tag, .lib-cat-tag { flex: 0 0 auto; padding: 4px 8px; border-radius: var(--r-sm); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
.lib-mech-pull { background: rgba(125,143,199,0.15); color: var(--pull); }
.lib-mech-push { background: rgba(199,143,143,0.15); color: var(--push); }
.lib-mech-hinge { background: rgba(168,155,107,0.15); color: var(--hinge); }
.lib-mech-squat { background: rgba(107,168,121,0.15); color: var(--squat); }
.lib-mech-core { background: rgba(176,143,199,0.15); color: var(--core); }
.lib-mech-mobility { background: rgba(143,184,199,0.15); color: var(--mobility); }
.lib-cat-breath { background: rgba(143,184,199,0.15); color: var(--breath); }
.lib-cat-meditation { background: rgba(176,143,199,0.15); color: var(--meditation); }
.lib-cat-movement { background: rgba(107,168,121,0.15); color: var(--movement); }
.lib-cat-vocal { background: rgba(199,143,143,0.15); color: var(--vocal); }
.lib-cat-ritual { background: rgba(200,144,96,0.15); color: var(--ritual); }
.lib-card-info { flex: 1; min-width: 0; }
.lib-card-name { font-size: 15px; margin-bottom: 2px; }
.lib-card-muscles, .lib-card-meta { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.03em; text-transform: lowercase; }
.lib-empty { padding: 40px 0; text-align: center; color: var(--ink-faint); font-size: 14px; }

.detail-back { background: none; color: var(--ink-faint); font-size: 13px; margin-bottom: 14px; cursor: pointer; padding: 8px 0; }
.detail-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 24px; }
.detail-name { font-size: 28px; font-weight: 300; letter-spacing: -0.01em; margin-bottom: 6px; }
.detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.detail-meta-row { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border-soft); }
.detail-meta-row .form-section { margin: 0; }
.detail-image { margin: 14px 0 18px; border-radius: var(--r-md); overflow: hidden; background: var(--bg); text-align: center; }
.detail-image img { max-width: 100%; max-height: 320px; display: block; margin: 0 auto; }
.detail-image-empty { padding: 32px 18px; border: 1px dashed var(--border); border-radius: var(--r-md); color: var(--ink-faint); font-size: 13px; text-align: center; line-height: 1.6; }
.detail-image-paste { display: block; margin-top: 8px; font-size: 12px; color: var(--ink-dim); }
.detail-section { margin-bottom: 18px; }
.detail-section h3 { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; margin-bottom: 6px; }
.detail-section p { font-size: 14px; color: var(--ink); line-height: 1.6; }
.detail-actions { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
.detail-actions button { flex: 1; min-width: 130px; }

.empty { text-align: center; padding: 48px 20px; color: var(--ink-faint); }
.empty-msg { font-size: 15px; font-style: italic; margin-bottom: 8px; }
.empty-sub { font-size: 13px; }
.subtle { color: var(--ink-faint); font-size: 12px; }
.row-spread { display: flex; justify-content: space-between; align-items: center; }

#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg-card); border: 1px solid var(--border); color: var(--ink); padding: 12px 20px; border-radius: 999px; font-size: 13px; letter-spacing: 0.04em; opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 100; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: flex-end; justify-content: center; z-index: 200; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg-card); border-top: 1px solid var(--border); border-radius: var(--r-lg) var(--r-lg) 0 0; width: 100%; max-width: 720px; max-height: 85vh; overflow-y: auto; padding: 20px 22px calc(env(safe-area-inset-bottom) + 20px); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 18px; font-weight: 400; }
.modal-close { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-elev); display: flex; align-items: center; justify-content: center; color: var(--ink-dim); }

/* ====== DAY PLANNER ====== */
.portal-toggle { display: flex; gap: 6px; justify-content: center; margin: 0 0 22px; }
.portal-toggle-pill {
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  padding: 7px 20px; border-radius: 999px; border: 1px solid var(--border);
  color: var(--ink-faint); transition: all 0.15s;
}
.portal-toggle-pill.active { color: var(--ink); border-color: var(--ink-dim); background: var(--bg-elev); }
.plan-intro { text-align: center; font-size: 13px; color: var(--ink-faint); font-style: italic; margin: 4px 0 20px; line-height: 1.6; }
.plan-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.plan-activity {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 14px 14px 14px 16px;
  display: flex; align-items: flex-start; gap: 12px; transition: opacity 0.2s;
}
.plan-activity.done { opacity: 0.5; }
.plan-activity.done .plan-activity-name { text-decoration: line-through; text-decoration-color: var(--ink-faint); }
.plan-check {
  flex: 0 0 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid var(--border); background: transparent;
  margin-top: 1px; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.plan-check.checked { background: var(--gold); border-color: var(--gold); }
.plan-check.checked::after { content: '\2713'; color: var(--bg); font-size: 13px; font-weight: 600; }
.plan-activity-body { flex: 1; min-width: 0; }
.plan-activity-name { font-size: 16px; font-weight: 400; line-height: 1.3; margin-bottom: 7px; }
.plan-stack { display: flex; gap: 5px; flex-wrap: wrap; }
.plan-stack-chip {
  font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 999px; font-weight: 500;
}
.plan-stack-empty { font-size: 11px; color: var(--ink-faint); font-style: italic; }

/* Stack Pulse — fuel-line recency glance (Round 7) */
.hrv-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px 15px; margin-bottom: 16px; }
.hrv-card.hrv-gentle { border-color: var(--c-throat-dim); }
.hrv-card.hrv-balanced { border-color: var(--c-heart-dim); }
.hrv-card.hrv-strong { border-color: var(--c-solar-dim); }
.hrv-eyebrow { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
.hrv-reading { font-size: 13.5px; color: var(--ink-dim); line-height: 1.55; }
.hrv-reading b { color: var(--ink); font-weight: 600; }
.hrv-trend { font-size: 11px; color: var(--ink-faint); margin-top: 9px; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
.hrv-input-row { display: flex; gap: 8px; }
.hrv-input { flex: 1; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--ink); font-size: 16px; padding: 10px 12px; }
.hrv-input:focus { outline: none; border-color: var(--c-throat-dim); }
.hrv-save { padding: 10px 20px; border-radius: var(--r-sm); border: 1px solid var(--c-throat-dim); background: var(--bg-elev); color: var(--ink); font-size: 14px; cursor: pointer; }
.hrv-hint { font-size: 11.5px; color: var(--ink-faint); font-style: italic; margin-top: 9px; }
.stack-pulse { padding: 0 0 22px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.stack-pulse-eyebrow { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); opacity: 0.55; }
.stack-pulse-chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 340px; }
.stack-pulse-chip {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 999px; font-weight: 500;
  transition: opacity 0.4s, filter 0.4s; cursor: default;
}
.stack-pulse-chip.bright { opacity: 1; }
.stack-pulse-chip.mid    { opacity: 0.55; filter: saturate(0.7); }
.stack-pulse-chip.dim    { opacity: 0.22; filter: saturate(0.35) brightness(0.85); }

/* Coherent Next-Practice — suggestions for unwatered stacks (Round 8) */
.next-practice { padding: 0 0 22px; }
.next-practice-eyebrow {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-faint); opacity: 0.6;
  margin: 0 0 12px; text-align: center;
}
.next-practice-card {
  display: block; width: 100%; text-align: left;
  padding: 14px 16px; margin-bottom: 8px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--bg-elev);
  cursor: pointer;
  transition: transform 0.18s, border-color 0.18s;
  font-family: inherit;
  color: inherit;
}
.next-practice-card:hover  { transform: translateY(-1px); border-color: var(--ink-dim); }
.next-practice-card:active { transform: translateY(0); }
.next-practice-card.next-inner    { border-left: 3px solid var(--c-brow); }
.next-practice-card.next-beast    { border-left: 3px solid var(--c-sacral); }
.next-practice-card.next-magnetic { border-left: 3px solid var(--c-solar); }
.next-practice-card.next-grimoire { border-left: 3px solid var(--c-crown); }
.next-practice-name { font-size: 14px; font-weight: 500; color: var(--ink); margin: 0 0 6px; line-height: 1.3; }
.next-practice-meta { display: flex; gap: 12px; font-size: 11px; color: var(--ink-faint); margin: 0 0 6px; }
.next-practice-source { text-transform: lowercase; letter-spacing: 0.05em; }
.next-practice-duration { color: var(--ink-dim); }
.next-practice-stack { display: flex; gap: 4px; flex-wrap: wrap; }
.next-practice-target-hint { font-size: 10px; color: var(--ink-faint); opacity: 0.7; margin-top: 6px; font-style: italic; }

/* Daily Container — evening completions + closing ritual (Round 9; intention strip removed Round 13) */

/* Evening completions panel */
.completions {
  margin-top: 28px;
  padding: 16px 18px;
  border-radius: var(--r-md);
  background: var(--bg-elev);
  border: 1px solid var(--border);
}
.completions-eyebrow {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-faint); opacity: 0.6;
  margin-bottom: 12px;
}
.completions-row {
  display: flex; gap: 10px; align-items: baseline;
  padding: 7px 0; font-size: 12px;
  border-bottom: 1px solid var(--border-soft);
}
.completions-row:last-child { border-bottom: none; }
.completions-time { color: var(--ink-faint); font-size: 10px; min-width: 54px; }
.completions-name { flex: 1; color: var(--ink); }
.completions-source {
  font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 999px;
  opacity: 0.85;
}
.completions-body  { color: var(--c-root); background: rgba(199,90,77,0.18); }
.completions-inner { color: var(--c-brow); background: rgba(143,123,212,0.18); }
.completions-beast { color: var(--c-sacral); background: rgba(207,132,71,0.18); }
.completions-magnetic { color: var(--c-solar); background: rgba(204,174,80,0.18); }
.completions-grimoire { color: var(--c-crown); background: rgba(194,200,216,0.16); }
.completions-vocal { color: var(--azure); background: rgba(111,168,216,0.16); }

/* Evening closing card */
.closing-card {
  margin-top: 22px; padding: 22px 20px;
  border-radius: var(--r-md);
  background: linear-gradient(180deg, var(--bg-elev) 0%, var(--bg) 100%);
  border: 1px solid var(--border);
}
.closing-eyebrow {
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); opacity: 0.9;
  text-align: center;
  margin-bottom: 14px;
}
.closing-intro {
  font-size: 12px; color: var(--ink-faint); font-style: italic;
  text-align: center; line-height: 1.5;
  margin: 0 auto 18px;
  max-width: 320px;
}
.closing-steps {
  margin: 0 0 20px;
  padding-left: 24px;
  font-size: 13px; color: var(--ink-dim); line-height: 1.6;
}
.closing-steps li { margin-bottom: 6px; }
.closing-steps li:last-child { margin-bottom: 0; }
.closing-done-btn {
  display: block; width: 100%;
  padding: 13px;
  background: var(--bg);
  border: 1px solid var(--gold);
  color: var(--gold);
  border-radius: var(--r-md);
  font-family: inherit; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.closing-done-btn:hover { background: var(--gold); color: var(--bg); }

/* History Pulse — 4th subview, last 7 days grouped by day (Round 10) */
.history-eyebrow {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-faint); opacity: 0.6;
  text-align: center; margin: 0 0 22px;
}
.history-empty {
  text-align: center; color: var(--ink-faint);
  font-size: 12px; font-style: italic;
  padding: 32px 20px;
}
.history-day { margin-bottom: 24px; }
.history-day-header {
  font-size: 11px; color: var(--ink-faint);
  letter-spacing: 0.1em; text-transform: lowercase;
  opacity: 0.75;
  padding: 0 0 8px;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 10px;
}
.history-row {
  padding: 10px 14px;

<script>
// ============================================================
// SHARED HELPERS
// ============================================================
const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_LABELS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TODAY = () => new Date().toISOString().slice(0, 10);
const todayDayName = () => DAYS[new Date().getDay()];

function el(tag, cls, txt) { const e = document.createElement(tag); if (cls) e.className = cls; if (txt !== undefined) e.textContent = txt; return e; }
function escapeHtml(s) { if (s === null || s === undefined) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function uid(p) { return (p || 'x') + '-' + Math.random().toString(36).slice(2, 9); }
function formatDate(iso) { const d = new Date(iso + 'T00:00'); return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }); }
function formatRest(sec) { if (sec < 60) return sec + 's'; if (sec % 60 === 0) return (sec / 60) + 'm'; return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0'); }
function formatDuration(sec) { if (!sec) return 'open'; if (sec < 60) return sec + 's'; if (sec % 60 === 0) return (sec / 60) + ' min'; return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0'); }
function ytSearch(q) { return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q + ' form demonstration'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// SHARED TIMER
// ============================================================
const Timer = {
  interval: null,
  endAt: 0,
  start(seconds, label, soft) {
    this.stop();
    this.endAt = Date.now() + seconds * 1000;
    document.getElementById('timer-label').textContent = label || 'timer';
    const overlay = document.getElementById('timer-overlay');
    overlay.classList.add('active');
    overlay.classList.toggle('gold', !!soft);
    this.tick(soft);
    this.interval = setInterval(() => this.tick(soft), 250);
    if (window.__audioCtx === undefined) {
      try { window.__audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
  },
  tick(soft) {
    const remaining = Math.max(0, Math.ceil((this.endAt - Date.now()) / 1000));
    const m = Math.floor(remaining / 60), s = remaining % 60;
    const display = document.getElementById('timer-display');
    display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    display.classList.toggle('flash', remaining <= 5 && remaining > 0);
    if (remaining === 0) { soft ? this.bell() : this.beep(); setTimeout(() => this.stop(), 1000); }
  },
  stop() {
    clearInterval(this.interval); this.interval = null;
    document.getElementById('timer-overlay').classList.remove('active');
    document.getElementById('timer-display').classList.remove('flash');
  },
  beep() {
    try {
      const ctx = window.__audioCtx; if (!ctx) return;
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 660; o.type = 'sine';
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
      o.start(); o.stop(ctx.currentTime + 0.45);
    } catch (e) {}
  },
  bell() {
    try {
      const ctx = window.__audioCtx; if (!ctx) return;
      [528, 792].forEach(freq => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = freq; o.type = 'sine';
        g.gain.setValueAtTime(0.0001, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.05);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.4);
        o.start(); o.stop(ctx.currentTime + 1.5);
      });
    } catch (e) {}
  }
};
document.getElementById('timer-stop').addEventListener('click', () => Timer.stop());

// ============================================================
// PORTAL
// ============================================================
const Portal = (function() {
  const TRAINING_SCHEDULE = {
    monday:    { kind: 'training', name: 'Pull',                sub: 'back + biceps — V-taper foundation',  duration: '55–70 min', meta: '7 movements' },
    tuesday:   { kind: 'cardio',   name: 'Walk',                sub: 'recovery — the floor under everything', duration: '30+ min',   meta: 'zone 1' },
    wednesday: { kind: 'training', name: 'Push',                sub: 'chest + shoulders + triceps',          duration: '55–70 min', meta: '7 movements' },
    thursday:  { kind: 'cardio',   name: 'Walk',                sub: 'recovery + zone 2 if the body asks',  duration: '30–45 min', meta: 'zone 1–2' },
    friday:    { kind: 'training', name: 'Legs + Core',         sub: 'the most important day — do not skip', duration: '60–75 min', meta: '8 movements' },
    saturday:  { kind: 'training', name: 'Upper Hypertrophy',   sub: 'sculpt day — supersets, the pump',     duration: '45–55 min', meta: '9 movements' },
    sunday:    { kind: 'zen',      name: 'Zen Day',             sub: 'sauna, light walk, mobility — no minimums', duration: 'unscheduled', meta: 'rest' }
  };

  // CROSSLINKS now keyed by plan id, so the breath pairing always matches what you're training,
  // regardless of which day of the week the plan lands on (Body Temple's schedule is editable).
  const CROSSLINKS = {
    pull:      { label: 'breath pairings — pull day',            before: 'Box breath (3–4 min) — primes the nervous system for pulling. Steady focus before the big lifts.', after: '4-7-8 breath (4 rounds) — drops you back into parasympathetic. Helps lats and biceps recover.' },
    push:      { label: 'breath pairings — push day',            before: 'Breath of fire or Wim Hof (1 round) — activation, drives blood and intent into the chest.', after: 'Long exhales (4-4-8) — settles the front-body, releases jaw and shoulder tension that push days build up.' },
    legs:      { label: 'breath pairings — leg day',             before: 'Box breath (4-4-4-4) — focus and bracing for the squat. Establishes intra-abdominal pressure rhythm.', after: 'Microcosmic orbit (5–10 min) — pulls the spent energy back up and circulates it. Specifically good after legs.' },
    upper_hyp: { label: 'breath pairings — upper hypertrophy',   before: 'Quick breath reset (3 min, box) — light-load day, just need to be present.', after: 'Light evening wind-down ratio — let the system idle.' },
    walk:      { label: 'breath pairing — walk',                 before: '', after: 'Let the walk be the breath practice. Long inhale through the nose, slow exhale, repeat as you move.' },
    zone2:     { label: 'breath pairing — zone 2',               before: '', after: 'Alternate-nostril breath after to balance the hemispheres. The cardio took ida; nadi shodhana settles it.' },
    mobility:  { label: 'breath pairing — mobility',             before: '', after: 'Long exhales throughout. Let the breath be longer than the stretch is uncomfortable.' },
    zen:       { label: 'pairing — zen day',                     before: '', after: 'Microcosmic orbit fits zen day perfectly — no exertion, just energy moving. Or extend Solar Gate to a longer sit. The point is to NOT optimize.' },
    recovery:  { label: 'pairing — recovery',                    before: '', after: 'Coherent breathing (5-in/5-out) for 10 min. Nothing fancy. Let the parasympathetic do its work.' }
  };

  // HEART_NOTES keyed by plan id — the note tracks what you're doing, not what day it is.
  const HEART_NOTES = {
    pull:      "back day is V-taper day. drive the elbows down, not the chin up.",
    push:      "press the bar past the face. the glutes brace, the ribs stay down.",
    legs:      "legs are the systemic gate. the testosterone is downstream of the squat.",
    upper_hyp: "lighter today. mind-muscle, not load. the pump is the medicine.",
    walk:      "the walk is the floor. don't make it a workout.",
    zone2:     "find the breath where conversation is just barely possible.",
    mobility:  "let the breath get longer than the stretch is uncomfortable.",
    zen:       "the practice today is rest. trust the wave.",
    recovery:  "what is the body telling you? listen first, then move."
  };

  // Reads Body Temple's editable schedule from shared localStorage so the Portal
  // always reflects what Body Temple actually has scheduled (Body Temple is source of truth).
  // Falls back to TRAINING_SCHEDULE hardcoded defaults for fresh installs.
  function readBodyTempleSchedule(dayName) {
    try {
      const raw = localStorage.getItem('body_temple_v1');
      if (!raw) return null;
      const state = JSON.parse(raw);
      if (!state || !state.schedule) return null;
      const planId = state.schedule[dayName];
      if (!planId) return null;
      const plan = (state.plans || []).find(p => p.id === planId);
      if (plan) {
        return {
          kind: 'training',
          planId: planId,
          name: plan.name,
          sub: plan.subtitle || '',
          duration: plan.duration || '',
          meta: (plan.exercises && plan.exercises.length) ? plan.exercises.length + ' movements' : ''
        };
      }
      const alt = (state.altModes || []).find(m => m.id === planId);
      if (alt) {
        let kind = 'training';
        if (planId === 'zen') kind = 'zen';
        else if (planId === 'walk' || planId === 'zone2') kind = 'cardio';
        else if (planId === 'recovery') kind = 'rest';
        return {
          kind: kind,
          planId: planId,
          name: alt.name,
          sub: alt.subtitle || '',
          duration: alt.duration || '',
          meta: planId === 'zen' ? 'rest' : (planId === 'walk' ? 'zone 1' : (planId === 'zone2' ? 'zone 2' : ''))
        };
      }
      return null;
    } catch (e) { return null; }
  }

  // Hardcoded fallback adds planId so the new CROSSLINKS/HEART_NOTES keying still works
  // even when Body Temple's localStorage hasn't been populated yet.
  TRAINING_SCHEDULE.monday.planId    = 'pull';
  TRAINING_SCHEDULE.tuesday.planId   = 'walk';
  TRAINING_SCHEDULE.wednesday.planId = 'push';
  TRAINING_SCHEDULE.thursday.planId  = 'walk';
  TRAINING_SCHEDULE.friday.planId    = 'legs';
  TRAINING_SCHEDULE.saturday.planId  = 'upper_hyp';
  TRAINING_SCHEDULE.sunday.planId    = 'zen';

  // ============================================================
  // Portal-level inline timer (Round 14) — runs short single-step drills
  // without leaving the portal. Saves the session to the right temple.
  // ============================================================

  // Multi-step Inner Temple practices that should never use portal timer —
  // they have rich step-by-step flows that live in the temple.
  const MULTI_STEP_INNER = new Set([
    'solar_gate', 'evening_winddown', 'evening_wind_down',
    'microcosmic_orbit_practice', 'vocal_warmup_practice', 'quick_reset'
  ]);

  function findPracticeData(practiceId, source) {
    if (!practiceId || !source) return null;
    if (source === 'beast') {
      const p = BEAST_PRACTICES.find(x => x.id === practiceId);
      return p ? { id: p.id, name: p.name, source: 'beast', stack: p.stack, durationSec: parseDurationSec(p.durationLabel), durationLabel: p.durationLabel } : null;
    }
    if (source === 'magnetic') {
      const p = MAGNETIC_PRACTICES.find(x => x.id === practiceId);
      return p ? { id: p.id, name: p.name, source: 'magnetic', stack: p.stack, durationSec: parseDurationSec(p.durationLabel), durationLabel: p.durationLabel } : null;
    }
    if (source === 'inner') {
      try {
        const s = JSON.parse(localStorage.getItem('inner_temple_v1') || '{}');
        const entry = (s.library || []).find(e => e.id === practiceId);
        if (entry) {
          const INNER_CAT_STACK = {
            breath: ['breath'], meditation: ['energy'],
            movement: ['body', 'breath'], vocal: ['body', 'breath'],
            ritual: ['energy', 'healing']
          };
          return {
            id: entry.id, name: entry.name, source: 'inner',
            stack: INNER_CAT_STACK[entry.category] || ['energy'],
            durationSec: entry.defaultDuration || 0,
            durationLabel: entry.defaultDuration ? Math.round(entry.defaultDuration / 60) + ' min' : ''
          };
        }
      } catch (e) {}
    }
    return null;
  }

  // Portal timer state
  let portalTimerInterval = null;
  let portalTimerEnd = 0;
  let portalTimerStart = 0;
  let portalTimerDuration = 0;
  let portalActiveSession = null;
  let portalMidpointFired = false;
  let portalLastMinute = 0;

  // Audio
  let portalAudioCtx = null;
  function portalEnsureAudio() {
    if (!portalAudioCtx) {
      try { portalAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
  }
  function portalBell() {
    try { if (navigator.vibrate) navigator.vibrate([200, 100, 300, 100, 400]); } catch (e) {}
    if (!portalAudioCtx) return;
    const o = portalAudioCtx.createOscillator();
    const g = portalAudioCtx.createGain();
    o.connect(g); g.connect(portalAudioCtx.destination);
    o.frequency.value = 528; o.type = 'sine';
    g.gain.setValueAtTime(0.0001, portalAudioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18, portalAudioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, portalAudioCtx.currentTime + 1.6);
    o.start(); o.stop(portalAudioCtx.currentTime + 1.8);
    const o2 = portalAudioCtx.createOscillator();
    const g2 = portalAudioCtx.createGain();
    o2.connect(g2); g2.connect(portalAudioCtx.destination);
    o2.frequency.value = 792; o2.type = 'sine';
    g2.gain.setValueAtTime(0.0001, portalAudioCtx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.08, portalAudioCtx.currentTime + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.0001, portalAudioCtx.currentTime + 1.4);
    o2.start(); o2.stop(portalAudioCtx.currentTime + 1.6);
  }
  function portalSoftChime() {
    try { if (navigator.vibrate) navigator.vibrate(100); } catch (e) {}
    if (!portalAudioCtx) return;
    const o = portalAudioCtx.createOscillator();
    const g = portalAudioCtx.createGain();
    o.connect(g); g.connect(portalAudioCtx.destination);
    o.frequency.value = 660; o.type = 'sine';
    g.gain.setValueAtTime(0.0001, portalAudioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.08, portalAudioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, portalAudioCtx.currentTime + 0.7);
    o.start(); o.stop(portalAudioCtx.currentTime + 0.8);
  }
  function portalMinuteTick() {
    try { if (navigator.vibrate) navigator.vibrate(30); } catch (e) {}
    if (!portalAudioCtx) return;
    const o = portalAudioCtx.createOscillator();
    const g = portalAudioCtx.createGain();
    o.connect(g); g.connect(portalAudioCtx.destination);
    o.frequency.value = 880; o.type = 'sine';
    g.gain.setValueAtTime(0.0001, portalAudioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.04, portalAudioCtx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, portalAudioCtx.currentTime + 0.18);
    o.start(); o.stop(portalAudioCtx.currentTime + 0.2);
  }

  function fmtTimerTime(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function startPortalTimer(practice) {
    portalEnsureAudio();
    portalActiveSession = practice;
    portalTimerStart = Date.now();
    portalTimerDuration = practice.durationSec || 0;
    portalTimerEnd = portalTimerStart + portalTimerDuration * 1000;
    portalMidpointFired = false;
    portalLastMinute = 0;
    document.getElementById('portal-timer-label').textContent = practice.name;
    document.getElementById('portal-timer-overlay').hidden = false;
    tickPortalTimer();
    portalTimerInterval = setInterval(tickPortalTimer, 250);
  }

  function tickPortalTimer() {
    const remaining = Math.max(0, Math.ceil((portalTimerEnd - Date.now()) / 1000));
    const display = document.getElementById('portal-timer-display');
    display.textContent = fmtTimerTime(remaining);
    display.classList.toggle('flash', remaining <= 5 && remaining > 0);

    if (portalTimerDuration > 0) {
      const elapsed = (Date.now() - portalTimerStart) / 1000;
      if (portalTimerDuration > 60 && !portalMidpointFired && elapsed >= portalTimerDuration / 2 && remaining > 5) {
        portalMidpointFired = true;
        portalSoftChime();
      }
      if (portalTimerDuration > 180) {
        const minute = Math.floor(elapsed / 60);
        const totalMinutes = Math.floor(portalTimerDuration / 60);
        if (minute > portalLastMinute && minute < totalMinutes && remaining > 5) {
          portalLastMinute = minute;
          portalMinuteTick();
        }
      }
    }

    if (remaining === 0) {
      portalBell();
      clearInterval(portalTimerInterval); portalTimerInterval = null;
      setTimeout(() => stopPortalTimer(true), 600);
    }
  }

  function stopPortalTimer(finished) {
    if (portalTimerInterval) { clearInterval(portalTimerInterval); portalTimerInterval = null; }
    document.getElementById('portal-timer-overlay').hidden = true;
    document.getElementById('portal-timer-display').classList.remove('flash');
    if (finished && portalActiveSession) {
      savePortalSession(portalActiveSession);
      toast('saved · ' + portalActiveSession.source);
    }
    portalActiveSession = null;
  }

  function cancelPortalTimer() {
    if (portalTimerInterval) { clearInterval(portalTimerInterval); portalTimerInterval = null; }
    document.getElementById('portal-timer-overlay').hidden = true;
    document.getElementById('portal-timer-display').classList.remove('flash');
    portalActiveSession = null;
  }

  function savePortalSession(practice) {
    const key = practice.source + '_temple_v1';
    const now = new Date();
    const isoAt = now.toISOString();
    const dateStr = now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0');
    let entry;
    if (practice.source === 'inner') {
      entry = {
        id: 'p-' + Date.now(),
        date: dateStr,
        practiceId: practice.id,
        practiceName: practice.name,
        stepStates: [],
        finalNotes: 'completed from portal'
      };
    } else {
      entry = {
        id: 'p-' + Date.now(),
        practiceId: practice.id,
        name: practice.name,
        stack: practice.stack || [],
        at: isoAt,
        notes: 'completed from portal'
      };
    }
    try {
      const state = JSON.parse(localStorage.getItem(key) || '{}');
      if (!state.sessions) state.sessions = [];
      state.sessions.unshift(entry);
      if (state.sessions.length > 200) state.sessions = state.sessions.slice(0, 200);
      localStorage.setItem(key, JSON.stringify(state));
    } catch (e) {}
  }

  // Auto-start flag for temple-side handlers (consumed on temple boot)
  function setPortalAutoStart(temple, practiceId) {
    try {
      localStorage.setItem('portal_auto_start_v1', JSON.stringify({
        temple: temple,
        practiceId: practiceId,
        timestamp: Date.now()
      }));
    } catch (e) {}
  }

  // Dispatch begin: portal timer for short single-step drills,
  // deep-link + auto-start for multi-step practices, body training, or longer practices.
  function executeBegin(temple, practiceId, displayName) {
    if (!temple) return;
    if (temple === 'body') {
      Shell.goTo('body');
      return;
    }
    if (temple === 'inner' && MULTI_STEP_INNER.has(practiceId)) {
      setPortalAutoStart(temple, practiceId);
      Shell.goTo(temple);
      return;
    }
    const data = findPracticeData(practiceId, temple);
    if (data && data.durationSec > 0 && data.durationSec < 1800) {
      data.name = displayName || data.name;
      startPortalTimer(data);
      return;
    }
    setPortalAutoStart(temple, practiceId);
    Shell.goTo(temple);
  }

  // Round 13 — flow card expansion data
  let openFlowCardId = null;
  const FLOW_PRACTICE_STEPS = {
    solar_gate: [
      'A · Glass of water — slow sips, feel it land',
      'B · Theta wake window — no phone, just be here',
      'C · Breath — box or 4-7-8, what the body wants',
      'D · Movement — qigong or sun salutation, breath leads',
      'E · Silent sit — nothing to do',
      'F · Intention — what does this day ask?'
    ],
    evening_winddown: [
      'A · Light mobility — gentle, nothing intense',
      'B · 4-7-8 breath — let the exhale carry you down',
      'C · Gratitude — three things, feel each',
      'D · Body scan — top to toe, release the tension'
    ],
    off_switch: [
      '15 sec — identify where the charge is sitting (sacral, chest, eyes, field)',
      '30 sec — inhale, draw the field inward toward the dantian',
      '30 sec — seal, hands over dantian, iridescent sphere closing at the skin',
      '15 sec — reorient, name three objects in the room silently'
    ],
    closing_ritual: [
      'one hand over the heart, one hand over the lower belly',
      'three slow breaths',
      'speak one line aloud — what was received, what was appreciated, what will be carried forward',
      'speak your own name once',
      'at least three minutes of silence'
    ]
  };
  function lookupStepsFor(practiceId) {
    return practiceId ? (FLOW_PRACTICE_STEPS[practiceId] || null) : null;
  }

  function makeBlock({ icon, iconClass, cardClass, onClick, onBegin, beginLabel, cardId, steps, eyebrow, name, sub, meta }) {
    const block = document.createElement('div');
    block.className = 'timeline-block';
    const iconEl = document.createElement('div');
    iconEl.className = 'timeline-icon ' + (iconClass || '');
    iconEl.textContent = icon;
    block.appendChild(iconEl);

    const isOpen = cardId && openFlowCardId === cardId;
    const cardWrap = document.createElement('div');
    cardWrap.className = 'day-card ' + (cardClass || '') + (isOpen ? ' open' : '');

    const summary = document.createElement('button');
    summary.className = 'day-card-summary';
    summary.innerHTML = `
      ${eyebrow ? `<div class="day-card-eyebrow">${escapeHtml(eyebrow)}</div>` : ''}
      <div class="day-card-name">${escapeHtml(name)}</div>
      ${sub ? `<div class="day-card-sub">${escapeHtml(sub)}</div>` : ''}
      ${meta && meta.length ? `<div class="day-card-meta">${meta.filter(Boolean).map(m => `<span>${escapeHtml(m)}</span>`).join('')}</div>` : ''}
      <div class="day-card-arrow">→</div>`;

    if (cardId) {
      summary.addEventListener('click', () => {
        openFlowCardId = (openFlowCardId === cardId) ? null : cardId;
        render();
      });
    } else if (onClick) {
      summary.addEventListener('click', onClick);
    }
    cardWrap.appendChild(summary);

    // Expansion section appears when card is expandable (cardId provided)
    if (cardId) {
      const expansion = document.createElement('div');
      expansion.className = 'day-card-expansion';
      let expHtml = '';
      if (steps && steps.length) {

  function logHrv(date, v) {
    const d = loadHrv(); if (!d.entries) d.entries = [];
    d.entries = d.entries.filter(e => e.date !== date);
    d.entries.unshift({ date: date, hrv: v, at: Date.now() });

  function hrvReading(today, history) {
    const recent = (history || []).filter(n => n > 0).slice(0, 7);
    if (recent.length < 3) return { tier: 'baseline', text: 'Logged. A few more mornings and the app can read each day against your own baseline.' };
    const avg = Math.round(recent.reduce((a, b) => a + b, 0) / recent.length);
    const ratio = today / avg;
    if (ratio < 0.85) return { tier: 'gentle', text: '<b>Gentle day.</b> ' + today + ' ms is under your ~' + avg + ' ms baseline — the system reads under-recovered. Keep the morning soft: breath, orbit, rest over intensity. Honour the calm between the waves.' };

    return { tier: 'balanced', text: '<b>Balanced.</b> ' + today + ' ms sits around your ~' + avg + ' ms baseline. Practice as the day asks — nothing to push, nothing to guard against.' };

  function readStackPulse() {
    const now = Date.now();
    const dayMs = 24 * 60 * 60 * 1000;
    const last = { body: 0, breath: 0, energy: 0, field: 0, healing: 0, primal: 0 };

    const tsOf = s => {
      if (s.at) return Date.parse(s.at);
      if (s.date) return Date.parse(s.date + 'T12:00:00');
      return 0;
    };
    const touch = (k, ts) => { if (ts > (last[k] || 0)) last[k] = ts; };

    // Body Temple \u2014 every session touches body; training sessions also breath.
    try {
      const body = JSON.parse(localStorage.getItem('body_temple_v1') || '{}');
      (body.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts) return;
        touch('body', ts);
        if (s.type === 'training') touch('breath', ts);
      });
    } catch (e) {}

    // Inner Temple \u2014 map practiceId via library.category to stacks.
    const INNER_CAT_STACK = {
      breath:     ['breath'],
      meditation: ['energy'],
      movement:   ['body', 'breath'],
      vocal:      ['body', 'breath'],
      ritual:     ['energy', 'healing']
    };
    try {
      const inner = JSON.parse(localStorage.getItem('inner_temple_v1') || '{}');
      const libById = {};
      (inner.library || []).forEach(e => { libById[e.id] = e; });
      (inner.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts) return;
        const entry = libById[s.practiceId];
        const cat = entry && entry.category;
        const stacks = INNER_CAT_STACK[cat] || ['energy'];
        stacks.forEach(k => touch(k, ts));
      });
    } catch (e) {}

    // Beast Temple \u2014 stack array lives on the session itself.
    try {
      const beast = JSON.parse(localStorage.getItem('beast_temple_v1') || '{}');
      (beast.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts) return;
        (s.stack || []).forEach(k => touch(k, ts));
      });
    } catch (e) {}

    // Magnetic Temple \u2014 same session shape as Beast (stack array on each session).
    try {
      const mag = JSON.parse(localStorage.getItem('magnetic_temple_v1') || '{}');
      (mag.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts) return;
        (s.stack || []).forEach(k => touch(k, ts));
      });
    } catch (e) {}

    // Healing Grimoire \u2014 cultivation. Session stores the practice id; map id\u2192stack via the manifest.
    try {
      const grim = JSON.parse(localStorage.getItem('grimoire_v1') || '{}');
      (grim.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts) return;
        const p = GRIMOIRE_PRACTICES.find(x => x.id === s.id);
        (s.stack || (p && p.stack) || ['healing']).forEach(k => touch(k, ts));
      });
    } catch (e) {}

    // Vocal Temple \u2014 cultivation of the throat. Sessions carry a stack array (body/breath, +energy/healing for sacred voice).
    try {
      const vocal = JSON.parse(localStorage.getItem('vocal_v1') || '{}');
      (vocal.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts) return;
        (s.stack || ['body','breath']).forEach(k => touch(k, ts));
      });
    } catch (e) {}

    const brightness = {};
    Object.keys(last).forEach(k => {
      const ts = last[k];
      if (!ts) { brightness[k] = 'dim'; return; }
      const ageDays = (now - ts) / dayMs;
      if (ageDays < 2)      brightness[k] = 'bright';
      else if (ageDays < 7) brightness[k] = 'mid';
      else                  brightness[k] = 'dim';
    });
    return { brightness: brightness, last: last };
  }

  // this gives a single-tap reach into each line. Body sessions excluded (gym-dependent).
  function parseDurationSec(label) {
    if (!label) return 0;
    if (/integrated|all day|no timer|on demand/i.test(label)) return 9999;
    const m = label.match(/(\d+)/);
    if (!m) return 9999;
    const n = parseInt(m[1], 10);
    if (/sec/i.test(label)) return n;
    return n * 60;
  }

  function buildNextPractices() {
    const pulse = readStackPulse();
    const dim = []; const mid = [];
    Object.keys(pulse.brightness).forEach(k => {
      if (pulse.brightness[k] === 'dim') dim.push(k);
      else if (pulse.brightness[k] === 'mid') mid.push(k);
    });
    const targets = dim.length ? dim : mid;
    if (!targets.length) return [];

    const INNER_CAT_STACK = {
      breath:     ['breath'],
      meditation: ['energy'],
      movement:   ['body', 'breath'],
      vocal:      ['body', 'breath'],
      ritual:     ['energy', 'healing']
    };

    const pool = [];
    // Inner library (from localStorage — populated once Inner Temple is opened)
    try {
      const inner = JSON.parse(localStorage.getItem('inner_temple_v1') || '{}');
      (inner.library || []).forEach(e => {
        const sec = e.defaultDuration || 0;
        if (sec <= 0 || sec >= 9999) return;
        pool.push({
          id: e.id, name: e.name, source: 'inner',
          stack: INNER_CAT_STACK[e.category] || ['energy'],
          durationSec: sec,
          durationLabel: Math.round(sec / 60) + ' min'
        });
      });
    } catch (e) {}
    // Magnetic manifest — iterated BEFORE Beast so that shared-id practices
    // (off_switch, field_cultivation) resolve to the Magnetic surface where
    // Off-Switch is the prominent one-tap quick-action, not buried in Beast's library.
    MAGNETIC_PRACTICES.forEach(p => {
      const sec = parseDurationSec(p.durationLabel);
      if (sec <= 0 || sec >= 9999) return;
      pool.push({
        id: p.id, name: p.name, source: 'magnetic',
        stack: p.stack, durationSec: sec, durationLabel: p.durationLabel
      });
    });
    // Beast manifest (fused multi-stack practices)
    BEAST_PRACTICES.forEach(p => {
      const sec = parseDurationSec(p.durationLabel);
      if (sec <= 0 || sec >= 9999) return;
      pool.push({
        id: p.id, name: p.name, source: 'beast',
        stack: p.stack, durationSec: sec, durationLabel: p.durationLabel
      });
    });
    // Healing Grimoire manifest — qigong / reiki / pranic feed energy + healing + field.
    GRIMOIRE_PRACTICES.forEach(p => {
      const sec = parseDurationSec(p.durationLabel);
      if (sec <= 0 || sec >= 9999) return;
      pool.push({
        id: p.id, name: p.name, source: 'grimoire',
        stack: p.stack, durationSec: sec, durationLabel: p.durationLabel
      });
    });

    // For each target stack (dim first), pick the shortest unseen practice that touches it
    const seen = new Set();
    const out = [];
    targets.forEach(stackKey => {
      if (out.length >= 3) return;
      const cands = pool
        .filter(p => p.stack.indexOf(stackKey) >= 0 && !seen.has(p.id))
        .sort((a, b) => a.durationSec - b.durationSec);
      if (cands.length) {
        const pick = cands[0];
        seen.add(pick.id);
        out.push(Object.assign({}, pick, { targetStack: stackKey }));
      }
    });
    return out;
  }

  function readHistoryWeek() {
    const cutoff = Date.now() - HISTORY_DAYS * 24 * 3600 * 1000;
    const out = [];
    const tsOf = s => {
      if (s.at) return Date.parse(s.at);
      if (s.date) return Date.parse(s.date + 'T12:00:00');
      return 0;
    };

    // Body
    try {
      const body = JSON.parse(localStorage.getItem('body_temple_v1') || '{}');
      (body.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts || ts < cutoff) return;
        out.push({
          ts: ts,
          source: 'body',
          name: s.planName || s.name || (s.type === 'training' ? 'training' : 'session'),
          stack: s.type === 'training' ? ['body', 'breath'] : ['body']
        });
      });
    } catch (e) {}

    // Inner
    const INNER_CAT_STACK = {
      breath:     ['breath'],
      meditation: ['energy'],
      movement:   ['body', 'breath'],
      vocal:      ['body', 'breath'],
      ritual:     ['energy', 'healing']
    };
    try {
      const inner = JSON.parse(localStorage.getItem('inner_temple_v1') || '{}');
      const libById = {};
      (inner.library || []).forEach(e => { libById[e.id] = e; });
      (inner.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts || ts < cutoff) return;
        const entry = libById[s.practiceId];
        out.push({
          ts: ts,
          source: 'inner',
          name: s.practiceName || (entry && entry.name) || s.practiceId,
          stack: entry ? (INNER_CAT_STACK[entry.category] || ['energy']) : ['energy']
        });
      });
    } catch (e) {}

    // Beast
    try {
      const beast = JSON.parse(localStorage.getItem('beast_temple_v1') || '{}');
      (beast.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts || ts < cutoff) return;
        out.push({
          ts: ts,
          source: 'beast',
          name: s.name || 'beast practice',
          stack: s.stack || ['primal']
        });
      });
    } catch (e) {}

    // Magnetic
    try {
      const mag = JSON.parse(localStorage.getItem('magnetic_temple_v1') || '{}');
      (mag.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts || ts < cutoff) return;
        out.push({
          ts: ts,
          source: 'magnetic',
          name: s.name || 'magnetic drill',
          stack: s.stack || ['field']
        });
      });
    } catch (e) {}

    // Healing Grimoire
    try {
      const grim = JSON.parse(localStorage.getItem('grimoire_v1') || '{}');
      (grim.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts || ts < cutoff) return;
        const p = GRIMOIRE_PRACTICES.find(x => x.id === s.id);
        out.push({
          ts: ts,
          source: 'grimoire',
          name: s.name || 'healing practice',
          stack: s.stack || (p && p.stack) || ['healing']
        });
      });
    } catch (e) {}

    // Vocal Temple
    try {
      const vocal = JSON.parse(localStorage.getItem('vocal_v1') || '{}');
      (vocal.sessions || []).forEach(s => {
        const ts = tsOf(s); if (!ts || ts < cutoff) return;
        out.push({
          ts: ts,
          source: 'vocal',
          name: s.name || 'vocal practice',
          stack: s.stack || ['body','breath']
        });
      });
    } catch (e) {}

    return out.sort((a, b) => b.ts - a.ts);
  }

  function dayKeyFromTs(ts) {
    const d = new Date(ts);
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function dayLabelFor(dateKey) {
    const today = dailyTodayKey();
    if (dateKey === today) return 'today';
    const yesterdayDate = new Date(Date.now() - 24 * 3600 * 1000);
    const yKey = yesterdayDate.getFullYear() + '-' +
      String(yesterdayDate.getMonth() + 1).padStart(2, '0') + '-' +
      String(yesterdayDate.getDate()).padStart(2, '0');
    if (dateKey === yKey) return 'yesterday';
    const d = new Date(dateKey + 'T12:00:00');
    const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    const monthNames = ['january','february','march','april','may','june','july','august','september','october','november','december'];
    return dayNames[d.getDay()] + ' · ' + monthNames[d.getMonth()] + ' ' + d.getDate();
  }

      empty.textContent = 'no practices logged in the last 7 days. open a temple to begin.';
      view.appendChild(empty);
      return;
    }

    // Group by day key
    const groups = {};
    items.forEach(item => {
      const key = dayKeyFromTs(item.ts);
      if (!groups[key]) groups[key] = [];
      groups[key].push(item);
    });
    const dayKeysDesc = Object.keys(groups).sort().reverse();

    dayKeysDesc.forEach(dayKey => {
      const daySection = el('div', 'history-day');
      daySection.appendChild(el('div', 'history-day-header', dayLabelFor(dayKey)));
      groups[dayKey].forEach(item => {
        const row = el('div', 'history-row');
        const time = item.ts
          ? new Date(item.ts).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' }).toLowerCase().replace(/\s/g, '')
          : '';
        row.innerHTML =
          '<div class="history-row-line">' +

            '<span class="history-name">' + escapeHtml(item.name) + '</span>' +

          '</div>' +

        daySection.appendChild(row);
      });
      view.appendChild(daySection);
    });
  }

  function readInnerLib() {
    try {
      const s = JSON.parse(localStorage.getItem('inner_temple_v1') || '{}');
      return (s.library || []).map(e => {
        const cat = e.category || '';
        let stack = ['energy'];
        if (cat === 'breath') stack = ['breath'];
        else if (cat === 'meditation') stack = ['energy'];
        else if (cat === 'movement') stack = ['body','breath'];
        else if (cat === 'vocal') stack = ['body','breath'];
        else if (cat === 'ritual') stack = ['energy','healing'];
        return {
          id: e.id, name: e.name, source: 'inner', stack,
          durationLabel: e.defaultDuration ? Math.round(e.defaultDuration/60) + ' min' : ''
        };
      });
    } catch(e) { return []; }
