<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vocal Temple</title>
<style>
:root {
  --bg: #0a0908; --bg-elev: #14110f; --bg-card: #1a1614;
  --border: #2a2420; --border-soft: #1f1a17;
  --ink: #e8e1d4; --ink-dim: #9a8f80; --ink-faint: #5e554a;
  --azure: #6fa8d8; --azure-dim: #3f6e98; --azure-faint: #243d54;
  --gold: #c89060; --crimson: #c78f8f;
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--ink); }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; line-height: 1.55;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  max-width: 680px; margin: 0 auto; min-height: 100vh; }
.wrap { padding: 18px 16px 80px; }
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.back-btn { font-size: 13px; color: var(--ink-dim); background: var(--bg-card); border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px; cursor: pointer; }
.back-btn:active { color: var(--ink); border-color: var(--ink-dim); }
.brand { text-align: right; }
.brand-name { font-size: 20px; font-weight: 700; color: var(--azure); letter-spacing: -0.01em; }
.brand-sub { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); }
.tabs { display: flex; gap: 8px; margin: 18px 0; }
.tab { flex: 1; text-align: center; font-size: 13px; padding: 9px 6px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-card); color: var(--ink-dim); cursor: pointer; }
.tab.active { color: var(--ink); border-color: var(--azure-dim); background: var(--bg-elev); }
.eyebrow { font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); margin: 22px 0 10px; }
.eyebrow:first-child { margin-top: 2px; }
.cat { color: var(--azure); }
.hint { font-size: 12px; color: var(--ink-faint); font-style: italic; margin-top: 8px; }

.pcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); margin-bottom: 9px; overflow: hidden; }
.pcard-head { padding: 13px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.pcard-head:active { background: var(--bg-elev); }
.pc-name { font-size: 15px; font-weight: 600; }
.pc-dur { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
.pcard-body { display: none; padding: 0 14px 14px; }
.pcard.open .pcard-body { display: block; }
.pc-section { margin-top: 12px; }
.pc-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--azure); margin-bottom: 4px; }
.pc-text { font-size: 13.5px; color: var(--ink-dim); }
.pcard-inner { padding: 13px 14px; }
.pcard-inner .pc-name { margin-bottom: 3px; }
.pcard-inner .pc-dur { margin-bottom: 2px; }
.step-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.step-action-btn { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-dim); padding: 7px 12px; border: 1px solid var(--border); border-radius: 999px; background: none; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
.step-action-btn:active { border-color: var(--ink); color: var(--ink); }
.step-action-btn.accent { color: var(--azure); border-color: var(--azure); }
.step-notes, .step-form { margin-top: 12px; display: none; }
.step-notes.open, .step-form.open { display: block; }
.step-notes textarea { width: 100%; box-sizing: border-box; font-size: 14px; background: var(--bg); color: var(--ink); border: 1px solid var(--border); border-radius: var(--r-md); padding: 8px 10px; min-height: 70px; }
.step-notes-prompt { font-size: 11px; color: var(--ink-faint); font-style: italic; margin-bottom: 6px; }
.step-form { background: var(--bg-elev); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 14px 16px; }
.form-section { margin-bottom: 12px; }
.form-section:last-child { margin-bottom: 0; }
.form-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--azure); margin-bottom: 4px; }
.form-text { font-size: 13.5px; color: var(--ink); line-height: 1.55; }
.form-text.muted { color: var(--ink-dim); }
.pc-actions { display: flex; gap: 9px; margin-top: 16px; }
.btn { flex: 1; padding: 11px; border-radius: var(--r-md); font-size: 13px; font-weight: 600; border: 1px solid var(--azure-dim); background: var(--azure-faint); color: var(--ink); cursor: pointer; }
.btn:active { background: var(--azure-dim); }
.btn.ghost { background: var(--bg-card); border-color: var(--border); color: var(--ink-dim); }

.tov { position: fixed; inset: 0; background: var(--bg); z-index: 60; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
.tov.show { display: flex; }
.tov-name { font-size: 18px; color: var(--azure); margin-bottom: 8px; }
.tov-time { font-size: 68px; font-weight: 700; font-variant-numeric: tabular-nums; }
.tov-btns { display: flex; gap: 12px; margin-top: 28px; }
.tov-btn { padding: 12px 22px; border-radius: var(--r-md); font-size: 14px; border: 1px solid var(--border); background: var(--bg-card); color: var(--ink); cursor: pointer; }
.tov-btn.done { border-color: var(--azure-dim); background: var(--azure-faint); }

.row-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 12px 14px; margin-bottom: 9px; }
.row-card .t { font-size: 14px; font-weight: 600; }
.row-card .p { font-size: 13px; color: var(--ink-dim); margin-top: 3px; }

/* voice tab */
.pitch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
.pitch-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 14px 4px; text-align: center; cursor: pointer; }
.pitch-btn:active { border-color: var(--azure); background: var(--bg-elev); }
.pitch-note { font-size: 16px; font-weight: 700; }
.pitch-hz { font-size: 9px; color: var(--ink-faint); margin-top: 2px; }
.drone-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px; text-align: center; margin-top: 8px; }
.drone-now { font-size: 30px; font-weight: 700; color: var(--azure); font-variant-numeric: tabular-nums; }
.drone-label { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 10px; }
.drone-pick { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 12px 0; }
.drone-opt { font-size: 13px; padding: 7px 13px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--ink-dim); cursor: pointer; }
.drone-opt.on { border-color: var(--azure-dim); color: var(--ink); background: var(--azure-faint); }

/* resonance — chakra sound map */
.ch-row { display: flex; align-items: center; gap: 12px; background: var(--bg-card); border: 1px solid var(--border); border-left-width: 3px; border-radius: var(--r-md); padding: 11px 13px; margin-bottom: 8px; }
.ch-info { flex: 1; }
.ch-name { font-size: 15px; font-weight: 600; }
.ch-bija { font-size: 12.5px; color: var(--ink-dim); margin-top: 2px; letter-spacing: 0.02em; }
.ch-gathers { font-size: 11.5px; color: var(--ink-faint); margin-top: 3px; }
.ch-tone-btn { width: 46px; height: 46px; flex: 0 0 auto; border-radius: 50%; background: var(--bg-elev); border: 1px solid var(--border); font-size: 18px; cursor: pointer; }
.ch-tone-btn:active { background: var(--bg-card); }

.toast { position: fixed; left: 50%; bottom: calc(24px + env(safe-area-inset-bottom)); transform: translateX(-50%); background: var(--bg-elev); border: 1px solid var(--azure-dim); color: var(--ink); padding: 10px 18px; border-radius: 999px; font-size: 13px; z-index: 80; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <button class="back-btn" id="back-btn">← portal</button>
    <div class="brand"><div class="brand-name">Vocal Temple</div><div class="brand-sub">throat · breath · the voice finding coherence</div></div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="warmups">warmups</div>
    <div class="tab" data-tab="daily">daily</div>
    <div class="tab" data-tab="voice">pitch</div>
    <div class="tab" data-tab="resonance">resonance</div>
  </div>
  <div id="view"></div>
</div>

<div class="tov" id="tov">
  <div class="tov-name" id="tov-name"></div>
  <div class="tov-time" id="tov-time">0:00</div>
  <div class="tov-btns">
    <button class="tov-btn" id="tov-cancel">cancel</button>
    <button class="tov-btn done" id="tov-done">mark done</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  var PRACTICES = [
    // Breath foundation
    { id:'diaphragm', cat:'Breath', name:'Diaphragmatic Breath', dur:300, stack:['breath','body'],
      setup:'Stand tall or sit upright, one hand on the belly, one on the chest. Shoulders soft and down, jaw loose. The voice rides on breath — an unsupported voice strains the throat, so this is the engine everything else rests on.',
      execution:'Inhale silently through the nose and let the breath drop low — the belly hand moves out, the chest hand stays still. Do not pull the air in; let it fall in as the belly releases. Exhale slow and even through softly pursed lips, the belly drawing gently back. The throat does nothing; the belly does the work. Several minutes, until low breathing feels like the default.',
      mistakes:'Lifting the shoulders or chest on the inhale (shallow, clavicular breathing). Forcing the belly out instead of letting it release. Tensing the throat to meter the air.',
      breath:'This IS the breath practice — silent low inhale, long even exhale. Build toward a 1:2 inhale-to-exhale ratio.',
      integrations:'The foundation under every other vocal exercise, and a vagal down-regulator in its own right. Pairs with the Inner Temple breathwork and opens every singing session.',
      progressions:'Add the hiss for airflow control; lengthen the exhale; lie down with a book on the belly to feel the movement clearly.',
      regressions:'One hand on the belly, three slow low breaths — 60 seconds.' },
    { id:'hiss', cat:'Breath', name:'The Hiss — Airflow Control', dur:240, stack:['breath','body'],
      setup:'Stand tall, hand on the belly, low diaphragmatic support already found. This trains steady, controlled airflow — the foundation of sustained notes and long phrases.',
      execution:'Inhale low and silent. Exhale on a steady, level "sss" — even and unwavering, as long as you comfortably can. The belly draws slowly inward to keep the air pressure constant as the lungs empty. Rest, then repeat, extending the length a little each round.',
      mistakes:'The hiss wobbling, surging, or fading — the support collapsed. Emptying in a rush. Tightening the throat to control the air instead of using the belly.',
      breath:'Pure breath management: constant pressure metered by the belly, not the throat. Keep the "sss" dead level start to finish.',
      integrations:'Builds the sustain behind long phrases and held notes — the bridge from breath work to phonation. Feeds messa di voce later.',
      progressions:'Extend the hiss; vary to "sh" and "fff"; then transfer the same steadiness to a sustained voiced note.',
      regressions:'One short, level hiss of 5–8 seconds, feeling the belly meter the air.' },
    // SOVT warmup
    { id:'lip_trill', cat:'Warmup (SOVT)', name:'Lip Trills', dur:240, stack:['breath','body'],
      setup:'Face and lips loose, breath low. The gentlest, safest warmup there is — semi-occluded vocal tract work that wakes the cords with almost zero strain.',
      execution:'Let the lips go loose and blow a steady stream of air through them so they flutter — "brrrr," like a motorboat. Add voice underneath the flutter. Then glide that buzzing sound smoothly up and down your range like a slow siren. Keep it easy and continuous.',
      mistakes:'Lips too tense or airflow too weak, so the trill keeps stalling. Pushing for volume. Tightening the throat as the pitch rises.',
      breath:'Steady, generous airflow from the belly keeps the lips fluttering — the breath does the work, the lips just ride it.',
      integrations:'The classic safe wake-up before real singing; the semi-occlusion balances cord closure against breath pressure. Leads straight into straw phonation and sirens.',
      progressions:'Trill through wider glides; add five-note scales on the trill; switch to tongue trills ("rrrr").',
      regressions:'Sustain the trill on one comfortable note for a few seconds, no gliding.' },
    { id:'straw', cat:'Warmup (SOVT)', name:'Straw Phonation', dur:300, stack:['breath','body'],
      setup:'Have a thin straw ready (or just purse the lips). Sit or stand tall, breath low. Straw phonation is the vocal coach’s secret weapon — phonating through a narrow channel balances the cords and resonance with almost no risk.',
      execution:'Hum a "voo" through the straw, gentle and continuous, feeling the soft back-pressure build at the lips. Sustain comfortable notes, then glide slow sirens up and down the range. Five minutes of this genuinely transforms the warmth and freedom of the voice.',
      mistakes:'Tension in the jaw, tongue, or throat — the entire point is ease. Blowing too hard. Treating it as effortful; let the straw’s back-pressure do the balancing.',
      breath:'Smooth, moderate airflow — enough to keep the tone steady against the resistance, never forced.',
      integrations:'The fastest route to a warm, free, balanced voice; safe even on tired or sick days. The bridge from lip trills into open singing.',
      progressions:'Glide wider; sing a melody through the straw; then remove it and keep the same easy placement on an open vowel.',
      regressions:'A few sustained "voo" notes through the straw, no gliding, 60–90 seconds.' },
    { id:'humming', cat:'Warmup (SOVT)', name:'Humming', dur:240, stack:['breath','body','energy'],
      setup:'Lips together but jaw and face soft, teeth slightly apart inside. Humming gives resonance, gentle onset, and vagus-nerve tone — it settles the nervous system as it wakes the voice.',
      execution:'On a soft "mmm," let an easy hum begin. Feel the buzz on the lips and across the mask of the face (nose, cheekbones). Glide gently up and down, keeping the sound forward and bright, never stuck back in the throat. A few minutes, savouring the vibration.',
      mistakes:'A hum felt only in the throat — placed too far back. Clamping the jaw. Pushing for volume instead of seeking the forward buzz.',
      breath:'Easy low breath; the hum should feel almost effortless, the buzz doing the work.',
      integrations:'Wakes forward placement and soothes the nervous system at once (sustained humming is a simple vagal toner). Pairs with the "ng" and "nay".',
      progressions:'Hum into "ng," then open to "mee–may–mah" keeping the buzz forward; glide wider.',
      regressions:'A few seconds of easy humming on one note, feeling for the lip buzz.' },
    // Resonance / placement
    { id:'ng', cat:'Resonance', name:'The "Ng" — Forward Placement', dur:240, stack:['breath','body'],
      setup:'Find the "ng" of "sing" — tongue back and up against the soft palate, mouth relaxed. This finds the bright, forward placement that lets the voice carry without force.',
      execution:'Sing "ng" on a comfortable note and feel the buzz high and forward in the face. Hold it, then slowly open into "ee" and "ah" while keeping that exact forward resonance. Climb gently through a few notes, returning to "ng" whenever the brightness slips back.',
      mistakes:'Losing the forward brightness the moment the vowel opens. Letting the sound fall back into the throat. Tightening the tongue root.',
      breath:'Steady low support; the resonance, not raw air pressure, gives the carrying power.',
      integrations:'Teaches the bright "ping" that lets a voice cut through without shouting. Pairs with mask placement and vowel shaping.',
      progressions:'Carry the placement into full words and phrases; five-note scales on "ng→ah."',
      regressions:'Sustain "ng" on one note, finding the high facial buzz.' },
    { id:'mask', cat:'Resonance', name:'Mask Placement — "Nay Nay"', dur:180, stack:['breath','body'],
      setup:'Sit or stand tall, face forward. A bright, slightly nasal "nay" drives the sound into the mask — cheekbones and nose — the resonance that gives a voice ping and reach.',
      execution:'On a single comfortable note, sing "nay nay nay" with a bright, almost bratty, forward tone, feeling it buzz in the cheekbones. Then carry that placement straight into open singing without losing the brightness. Climb five-note scales on "nay," keeping every note forward.',
      mistakes:'Pushing from the throat for volume — brightness comes from placement, not effort. Going fully nasal (air down the nose) instead of forward-resonant. Tensing the neck on the climb.',
      breath:'Consistent low support; let the bright placement carry the note rather than forcing more air.',
      integrations:'The "twang"/mask resonance that gives a voice projection and edge. Pairs with "ng" and feeds confident open singing.',
      progressions:'Move "nay" scales higher; blend the brightness into a rounder tone so it carries without sounding harsh.',
      regressions:'A few "nay"s on one note, just finding the cheekbone buzz.' },
    { id:'vowels', cat:'Resonance', name:'Vowel Shaping', dur:240, stack:['breath','body'],
      setup:'One comfortable sustained note, breath supported. The goal is even tone across all vowels — the difference between a voice that sounds consistent and one that wobbles between sounds.',
      execution:'On one held note, move slowly through "ee – eh – ah – oh – oo," keeping volume, placement, and support identical as the vowel shape changes. Listen for any vowel that thins, darkens, or jumps. Then reverse the order, smoothing the transitions until the colour is even.',
      mistakes:'The "ee" going thin and pinched, the "oo" going dark and swallowed. Changing volume or placement with the vowel. Moving too fast to hear the seams.',
      breath:'Constant, even support throughout — the breath does not change as the vowel does.',
      integrations:'Evens out the instrument so lyrics sit on one consistent tone. Pairs with scales and any song work.',
      progressions:'Do it on scales and across the passaggio; match vowels on moving melodies.',
      regressions:'Just "ee–ah–oo" on one note, aiming for the same brightness on each.' },
    // Range / agility
    { id:'sirens', cat:'Range', name:'Sirens — Range Glides', dur:240, stack:['breath','body'],
      setup:'On an "oo" or a lip trill, breath low and easy. Sirens stretch the full range and smooth the break between chest and head voice (the passaggio).',
      execution:'Glide from your lowest comfortable note up to your highest and back down — one long, smooth, connected siren, no gear-changes or cracks. Let the sound thin and lighten as it rises rather than dragging weight up. Repeat, letting the top open a little more each time without forcing.',
      mistakes:'A crack or hard jump at the passaggio. Forcing chest voice too high. Holding the breath at the top instead of keeping it flowing.',
      breath:'Continuous flow throughout the glide; slightly more support as you ascend, never a held breath.',
      integrations:'The single best tool for connecting registers into one seamless voice. Do them on the lip trill first, then open vowels.',
      progressions:'Widen the range over weeks; siren on open vowels; add octave-and-a-half glides.',
      regressions:'Small sirens within a comfortable fifth, smoothing just the easy middle.' },
    { id:'scales', cat:'Range', name:'Five-Note Scales', dur:300, stack:['breath','body'],
      setup:'Pick a vowel or "nay," and have the Pitch tab’s drone or scale ready to check tuning. This builds pitch accuracy and agility — five notes up and down, climbing by half-steps.',
      execution:'Sing a five-note scale (do-re-mi-fa-sol and back) up and down, landing each note cleanly in its centre. Then move the whole pattern up a half-step and repeat, climbing as high as stays easy, then descend. Use the drone to hear yourself against true pitch.',
      mistakes:'Sliding or scooping into notes instead of landing them. Speeding up and blurring the pitches. Pushing the top of the climb past easy.',
      breath:'Steady support per phrase; reset the low breath between scale patterns.',
      integrations:'Trains the ear and the agility behind melodies. Pairs with the Pitch tab and vowel work.',
      progressions:'Faster runs, wider patterns (octave scales, arpeggios), a different vowel each climb.',
      regressions:'A single five-note scale up and down on one comfortable key, slowly.' },
    { id:'messa', cat:'Range', name:'Messa di Voce — Dynamic Control', dur:240, stack:['breath','body'],
      setup:'One comfortable sustained note, full breath, total focus. Messa di voce is the master’s exercise: swell a single held note from soft to loud and back to soft, perfectly in tune.',
      execution:'Begin the note barely audible (pianissimo), swell it smoothly and continuously up to full volume, then taper it back down to nothing — all on one breath, the pitch held dead steady throughout. The crescendo and decrescendo should be even arcs, with no lurches.',
      mistakes:'The pitch rising as you get louder and sagging as you soften. Lurching the volume instead of a smooth arc. Running out of breath before the taper.',
      breath:'Exquisite control — the belly meters a slowly rising and falling pressure while pitch stays constant.',
      integrations:'The ultimate integration of breath, cord control, and pitch; the foundation of expressive dynamics. Pairs with the hiss and sustained toning.',
      progressions:'Longer swells, higher notes, then apply dynamic shaping to phrases in real songs.',
      regressions:'A short swell — soft to medium and back — on one easy note, pitch steady.' },
    // Throat / de-armor
    { id:'jaw_release', cat:'Throat de-armor', name:'Jaw & Tongue Release', dur:180, stack:['body','healing'],
      setup:'Sit or stand, hands free to touch the face. A clenched jaw and tight tongue strangle the voice — this is throat-chakra de-armoring, releasing the held tension that keeps the voice small.',
      execution:'Massage the jaw hinge (just in front of the ears) in slow circles. Let the jaw hang loose and waggle it gently side to side. Stick the tongue all the way out, hold, then let it flop back soft. Yawn wide several times, feeling the whole throat and face open.',
      mistakes:'Holding tension you did not know was there and singing through it anyway. Forcing the jaw open instead of letting it hang. Rushing past the release to get to the singing.',
      breath:'Slow, easy breaths; let each exhale soften the jaw and tongue further.',
      integrations:'Releases the physical armor over the throat chakra — the voice cannot open through a locked jaw. Pairs with the yawn-sigh and emotional-release work.',
      progressions:'Add neck and shoulder release; sigh on the release; map where you habitually clench.',
      regressions:'Three slow jaw waggles and one big yawn — 30 seconds before singing.' },
    { id:'yawn_sigh', cat:'Throat de-armor', name:'Yawn-Sigh — Larynx Release', dur:180, stack:['body','breath','healing'],
      setup:'Comfortable stance, throat relaxed. This drops a high, squeezed larynx into a relaxed, open position — the open throat that lets sound pour instead of pinch.',
      execution:'Begin a real yawn and feel the throat open wide and the larynx drop low. At the peak, release a relaxed "haaah" sigh that falls freely from a high pitch down to a low one — no control, just a falling sigh on the open throat. Repeat, savouring the spacious feeling each time.',
      mistakes:'Re-tightening the throat the instant you make a real, pitched sound. Forcing the sigh. Raising the larynx (a swallowed, strained feeling).',
      breath:'A full, relaxed breath into the yawn; the sigh rides a free, unforced exhale.',
      integrations:'Resets a high, tense larynx to the open-throat feeling you want to keep while singing. Pairs with jaw release and straw phonation.',
      progressions:'Keep the yawn-space while singing actual notes and phrases; catch and undo larynx-rise in songs.',
      regressions:'One yawn and one falling sigh, just feeling the throat open.' },
    // Sacred / energetic
    { id:'toning', cat:'Sacred voice', name:'Toning — Sustained Vowel', dur:300, stack:['breath','energy','healing'],
      setup:'Sit upright and undisturbed, eyes soft or closed. Toning is a single sustained vowel held as pure vibration — not a song, a tuning. Sustained tone raises vagal tone and floods the body with its own resonance.',
      execution:'Inhale low. On the exhale, release one open vowel — "ah" or "oh" — long, even, and felt through the whole chest and skull. Do not aim for a pretty sound; aim for vibration you can feel. Let the pitch settle wherever the body wants it. Repeat for several minutes, sinking into the resonance.',
      mistakes:'Performing it — there is no audience. Controlling the pitch instead of letting the body choose. Too quiet to actually vibrate the bones.',
      breath:'Low inhale, long even toned exhale; let the breath fully empty before the next.',
      integrations:'Voice as vibrational medicine — settles the nervous system and clears the throat centre. Pairs with bija chant and the Inner Temple energy work.',
      progressions:'Tone into specific body regions; find pitches that resonate different cavities; extend the session.',
      regressions:'Three long "ah" tones, eyes closed, feeling the chest buzz.' },
    { id:'bija_om', cat:'Sacred voice', name:'OM / Bija Chant', dur:300, stack:['breath','energy','healing'],
      setup:'Sit upright, spine long, eyes closed. Seed-sound chanting — OM, or the chakra bijas (LAM VAM RAM YAM HAM OM) — uses the voice as an instrument of energy, not just words.',
      execution:'For OM: chant slowly, the "ooo" resonating in the belly, the "mmm" buzzing up to the crown, each round long and felt. For the bijas: climb centre by centre — LAM root, VAM sacrum, RAM solar plexus, YAM heart, HAM throat, OM third eye — feeling each light up as you sound it. Three rounds.',
      mistakes:'Rushing — the power is in the sustain and the felt vibration, not the repetition count. Chanting from the throat only. Treating it as rote.',
      breath:'A full low breath before each seed sound; let the tone last the whole exhale.',
      integrations:'Tunes the energy centres through sound; sustained toning also raises vagal tone. Pairs with the microcosmic orbit and the Healing Temple practices.',
      progressions:'Hold each bija longer; add the felt sense of each chakra opening; combine with colour and light visualisation.',
      regressions:'Three slow OMs, feeling belly-to-crown.' },
    { id:'overtone', cat:'Sacred voice', name:'Overtone Singing', dur:300, stack:['breath','energy','healing'],
      setup:'Quiet space, patient mind. Overtone singing is advanced — shaping the mouth to amplify a single harmonic above a sustained drone, so two notes sound from one throat. The deepest listening the voice can do.',
      execution:'Sustain a low, steady "ahh" drone. Very slowly shape the mouth from "ah" toward "ee," then toward "oo," moving the tongue forward and back and changing the lip opening. Listen for a faint whistling harmonic riding above the drone. When you catch it, make tiny adjustments to brighten and isolate it. Chase it by listening, not pushing.',
      mistakes:'Forcing it — the overtone is found by listening and tiny mouth changes, never by pushing harder. Impatience; this takes weeks to months. Letting the drone waver.',
      breath:'A rock-steady drone needs steady support; the harmonic only emerges over an unwavering fundamental.',
      integrations:'Trains exquisite listening and mouth-resonance control. Pairs with toning and deep sound-healing work.',
      progressions:'Stabilise and move the overtone melodically; explore different fundamentals; layer in throat-singing over time.',
      regressions:'Sustain the slow "ah→ee" morph and listen for any shimmer above the tone — no pressure to "get" it.' },
    { id:'free_song', cat:'Sacred voice', name:'Vocal Devotion — Free Singing', dur:600, stack:['body','breath','healing'],
      setup:'Put on a track you love, or sit in silence. This is the point of all of it — no exercise, no judge, just the voice, free, singing whatever wants out. Where the throat work becomes the man who is willing to be heard.',
      execution:'Sing. Out loud, fully. Let it be off-key, let it crack, let it be too loud. Follow the song or improvise into the silence — no rules, no critique. When the inner critic appears and tries to shrink the voice, notice it and sing straight through it. The unconcealment is the medicine; being heard, even by yourself, is the practice.',
      mistakes:'The inner critic that shrinks the voice back down — the whole work is to sing through it anyway. Stopping the moment it sounds imperfect. Keeping it quiet and safe.',
      breath:'Everything the warmups built — low support, open throat, forward placement — now in service of free expression. Do not police it; let the body sing.',
      integrations:'The destination of the whole Vocal Temple — the voice as unconcealment, the shrink-to-fit reflex undone in real time. Pairs with the Hibrations being-seen work.',
      progressions:'Sing for others; record yourself; bring written songs and your own lyrics into it.',
      regressions:'One song, alone, door closed — just let it out for two minutes.' }
  ];
  var CAT_ORDER = ['Breath','Warmup (SOVT)','Resonance','Range','Throat de-armor','Sacred voice'];

  var DAILY = [
    { t:'Release', d:'Jaw, tongue, neck. Yawn-sigh a few times. Open the instrument before you play it.', secs:120 },
    { t:'Breath', d:'Diaphragmatic breath + a few hisses. Find the low support.', secs:120 },
    { t:'SOVT warmup', d:'Lip trills or straw phonation, gliding the range. The safe wake-up.', secs:300 },
    { t:'Resonance', d:'Humming → "ng" → "nay". Bring the sound forward into the mask.', secs:180 },
    { t:'Range', d:'Sirens, then five-note scales climbing by half-steps. Use the Pitch tab.', secs:300 },
    { t:'Sing', d:'A song, or free devotion. Carry the warm, open, forward voice into real singing.', secs:300 }
  ];

  // pitch reference — C major across the comfortable male range
  var PITCHES = [
    {n:'C3',f:130.81},{n:'D3',f:146.83},{n:'E3',f:164.81},{n:'F3',f:174.61},
    {n:'G3',f:196.00},{n:'A3',f:220.00},{n:'B3',f:246.94},{n:'C4',f:261.63}
  ];

  // The weave — vocal sounds for gathering energy. Seed syllable (bija) + vowel tone per centre,
  // ascending C-major (root→crown) so chanting up the list rises the charge up the spine.
  var CHAKRA_SOUNDS = [
    { name:'Root · Muladhara',        color:'#c75a4d', bija:'LAM', vowel:'UH',  freq:130.81, gathers:'grounding, safety, the body',           where:'Earth Rooting · Zhan Zhuang' },
    { name:'Sacral · Svadhisthana',   color:'#cf8447', bija:'VAM', vowel:'OO',  freq:146.83, gathers:'desire, creativity, the primal waters', where:'Beast cultivation · Water Qigong' },
    { name:'Solar Plexus · Manipura', color:'#ccae50', bija:'RAM', vowel:'OH',  freq:164.81, gathers:'power, confidence, the inner sun',      where:'Magnetic field work · summoning' },
    { name:'Heart · Anahata',         color:'#5aa96f', bija:'YAM', vowel:'AH',  freq:174.61, gathers:'love, devotion, connection',           where:'Worship · loving-kindness · free song' },
    { name:'Throat · Vishuddha',      color:'#5b91cc', bija:'HAM', vowel:'EYE', freq:196.00, gathers:'voice, truth, expression',             where:'all of this temple · toning' },
    { name:'Third Eye · Ajna',        color:'#8f7bd4', bija:'OM',  vowel:'AYE', freq:220.00, gathers:'intuition, insight, vision',           where:'meditation · microcosmic orbit' },
    { name:'Crown · Sahasrara',       color:'#c2c8d8', bija:'silence / NG', vowel:'EEE', freq:246.94, gathers:'presence, the divine, unity', where:'the silent sit · the crown' }
  ];

  var KEY = 'vocal_v1';
  var state = load();
  var tab = state.lastTab || 'warmups';
  var formOpenId = null;
  var noteOpenId = null;
  function load(){ try{ var r=localStorage.getItem(KEY); if(r){var p=JSON.parse(r); if(!p.sessions)p.sessions=[]; return p;} }catch(e){} return { sessions:[], lastTab:'warmups' }; }
  function save(){ state.lastTab=tab; try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
  function el(t,c,h){ var n=document.createElement(t); if(c)n.className=c; if(h!=null)n.innerHTML=h; return n; }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  var toastTimer; function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove('show');},1600); }
  function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms);}catch(e){} }
  function find(id){ for(var i=0;i<PRACTICES.length;i++) if(PRACTICES[i].id===id) return PRACTICES[i]; return null; }
  function relDate(ts){ var d=Math.floor((Date.now()-ts)/86400000); if(d<=0)return 'today'; if(d===1)return 'yesterday'; if(d<7)return d+'d ago'; return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }

  // ---- web audio ----
  var actx=null, drone=null, droneNote=null;
  function audio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended')actx.resume(); return actx; }
  function tone(freq, dur){ var a=audio(); if(!a)return; var o=a.createOscillator(),g=a.createGain(); o.type='sine'; o.frequency.value=freq; o.connect(g); g.connect(a.destination); var t=a.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.4,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||2)); o.start(t); o.stop(t+(dur||2)+0.05); }
  function bell(){ tone(528,1.2); }
  function startDrone(p){ var a=audio(); if(!a)return; stopDrone(); var o=a.createOscillator(),g=a.createGain(); o.type='triangle'; o.frequency.value=p.f; o.connect(g); g.connect(a.destination); var t=a.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.28,t+0.4); o.start(t); drone={o:o,g:g}; droneNote=p.n; }
  function stopDrone(){ if(drone){ try{ var t=actx.currentTime; drone.g.gain.exponentialRampToValueAtTime(0.0001,t+0.2); drone.o.stop(t+0.25); }catch(e){} drone=null; droneNote=null; } }

  // ---- render ----
  function render(){
    var v=document.getElementById('view'); v.innerHTML='';
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab===tab); });
    if(tab==='warmups') renderWarmups(v);
    else if(tab==='daily') renderDaily(v);
    else if(tab==='voice') renderVoice(v);
    else renderResonance(v);
    window.scrollTo(0,0);
  }

  function renderWarmups(v){
    CAT_ORDER.forEach(function(cat){
      var group=PRACTICES.filter(function(p){return p.cat===cat;});
      if(!group.length) return;
      v.appendChild(el('div','eyebrow cat', cat));
      group.forEach(function(p){ v.appendChild(card(p)); });
    });
    if(state.sessions.length){
      v.appendChild(el('div','eyebrow','recently sung'));
      state.sessions.slice(0,6).forEach(function(s){ var r=el('div','hint', s.name+' · '+relDate(s.at)); r.style.marginTop='2px'; v.appendChild(r); });
    }
  }

  function ytSearch(name){ return 'https://www.youtube.com/results?search_query='+encodeURIComponent(name+' vocal exercise'); }
  function vWikiText(p){ return p.name+'. '+(p.setup?p.setup+' ':'')+(p.execution||'')+(p.breath?' Breath: '+p.breath:''); }
  function vSpeak(t){ try{ if(!('speechSynthesis' in window)||!t) return; speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(t); u.rate=0.9; u.lang='en-US'; var vs=speechSynthesis.getVoices()||[]; var en=vs.filter(function(v){return /^en[-_]?/i.test(v.lang);}); var male=en.filter(function(v){return /male/i.test(v.name)&&!/female/i.test(v.name);}); var voice=male[0]||en[0]; if(voice){u.voice=voice;u.lang=voice.lang;} speechSynthesis.speak(u); }catch(e){} }
  function card(p){
    var open=(formOpenId===p.id), noteOpen=(noteOpenId===p.id);
    var c=el('div','pcard');
    var inner=el('div','pcard-inner');
    inner.appendChild(el('div','pc-name', esc(p.name)));
    inner.appendChild(el('div','pc-dur', Math.round(p.dur/60)+' min'));
    var acts=el('div','step-actions');
    var formBtn=el('button','step-action-btn accent', open?'hide form':'form');
    formBtn.addEventListener('click', function(){ formOpenId = open?null:p.id; render(); });
    acts.appendChild(formBtn);
    var watch=el('button','step-action-btn','watch \u25b6');
    watch.addEventListener('click', function(){ window.open(ytSearch(p.name),'_blank','noopener'); });
    acts.appendChild(watch);
    var t=el('button','step-action-btn','begin timer'); t.addEventListener('click', function(){ startTimer(p); }); acts.appendChild(t);
    var note=el('button','step-action-btn', noteOpen?'hide note':'note'); note.addEventListener('click', function(){ noteOpenId = noteOpen?null:p.id; render(); }); acts.appendChild(note);
    var wiki=el('button','step-action-btn','wiki \u2192'); wiki.addEventListener('click', function(){ vSpeak(vWikiText(p)); }); acts.appendChild(wiki);
    var log=el('button','step-action-btn','log'); log.addEventListener('click', function(){ logSession(p); }); acts.appendChild(log);
    inner.appendChild(acts);
    if(open){
      var html='';
      function fs(label,val,muted){ if(val) html+='<div class="form-section"><div class="form-label">'+label+'</div><div class="form-text'+(muted?' muted':'')+'">'+esc(val)+'</div></div>'; }
      fs('setup',p.setup); fs('execution',p.execution); fs('common mistakes',p.mistakes,true); fs('breath',p.breath,true); fs('integration',p.integrations); fs('progressions',p.progressions); fs('regressions',p.regressions);
      var fp=el('div','step-form open'); fp.innerHTML=html; inner.appendChild(fp);
    }
    if(noteOpen){
      var np=el('div','step-notes open');
      np.appendChild(el('div','step-notes-prompt','what landed in the voice'));
      var ta=document.createElement('textarea'); ta.value=(state.notes&&state.notes[p.id])||''; ta.placeholder='\u2026';
      ta.addEventListener('input', function(e){ if(!state.notes)state.notes={}; state.notes[p.id]=e.target.value; save(); });
      np.appendChild(ta); inner.appendChild(np);
    }
    c.appendChild(inner);
    return c;
  }
  function sec(label,text){ var s=el('div','pc-section'); s.appendChild(el('div','pc-label',label)); s.appendChild(el('div','pc-text', esc(text))); return s; }

  function logSession(p){ state.sessions.unshift({ id:p.id, name:p.name, stack:p.stack||['body','breath'], at:Date.now() }); if(state.sessions.length>60)state.sessions.length=60; save(); buzz(20); toast('logged — '+p.name); render(); }

  function renderDaily(v){
    v.appendChild(el('div','hint','The warm-up sequence — body first, always. ~20 minutes from cold voice to free singing.'));
    DAILY.forEach(function(f,i){
      var rc=el('div','row-card');
      rc.appendChild(el('div','t', (i+1)+'. '+esc(f.t)+' · '+Math.round(f.secs/60)+' min'));
      rc.appendChild(el('div','p', esc(f.d)));
      v.appendChild(rc);
    });
    v.appendChild(el('div','hint','The voice is the last instrument to warm and the first to betray a cold start. Never skip the release.'));
  }

  function renderVoice(v){
    v.appendChild(el('div','eyebrow','reference pitch — tap to hear, match by ear'));
    var grid=el('div','pitch-grid');
    PITCHES.forEach(function(p){
      var b=el('div','pitch-btn');
      b.innerHTML='<div class="pitch-note">'+esc(p.n)+'</div><div class="pitch-hz">'+p.f.toFixed(0)+' Hz</div>';
      b.addEventListener('click', function(){ tone(p.f, 2.4); buzz(10); });
      grid.appendChild(b);
    });
    v.appendChild(grid);
    var scaleBtn=el('button','btn','▶ play C major scale');
    scaleBtn.style.marginTop='10px';
    scaleBtn.addEventListener('click', function(){ audio(); PITCHES.forEach(function(p,i){ setTimeout(function(){ tone(p.f,0.5); }, i*420); }); });
    v.appendChild(scaleBtn);

    v.appendChild(el('div','eyebrow','drone — hold a root to sing over'));
    var dc=el('div','drone-card');
    dc.appendChild(el('div','drone-now', droneNote ? droneNote+' droning' : '—'));
    dc.appendChild(el('div','drone-label', droneNote ? 'tap the note again to stop' : 'pick a root note'));
    var pick=el('div','drone-pick');
    PITCHES.forEach(function(p){
      var o=el('div','drone-opt'+(droneNote===p.n?' on':''), esc(p.n));
      o.addEventListener('click', function(){ if(droneNote===p.n){ stopDrone(); } else { startDrone(p); } renderVoice(v); });
      pick.appendChild(o);
    });
    dc.appendChild(pick);
    v.appendChild(dc);
    v.appendChild(el('div','hint','Sing scales and intervals against the drone — your ear learns the centre of each pitch by holding it against a fixed root.'));
  }

  function renderResonance(v){
    v.appendChild(el('div','hint','Sound gathers energy. Each centre has a seed syllable (bija) and a vowel tone — chant along with the pitch and the charge draws to that centre. Tap a centre to hear its note; chant from root to crown to feel it rise.'));
    v.appendChild(el('div','eyebrow cat','the seven centres'));
    CHAKRA_SOUNDS.forEach(function(c){
      var row=el('div','ch-row'); row.style.borderLeftColor=c.color;
      var info=el('div','ch-info');
      info.innerHTML='<div class="ch-name" style="color:'+c.color+'">'+esc(c.name)+'</div>'+
        '<div class="ch-bija">chant <b>'+esc(c.bija)+'</b> &middot; vowel &ldquo;'+esc(c.vowel)+'&rdquo;</div>'+
        '<div class="ch-gathers">gathers '+esc(c.gathers)+' &middot; '+esc(c.where)+'</div>';
      row.appendChild(info);
      var btn=el('button','ch-tone-btn','♪'); btn.style.borderColor=c.color; btn.style.color=c.color;
      btn.addEventListener('click', function(){ tone(c.freq, 2.6); buzz(12); });
      row.appendChild(btn);
      v.appendChild(row);
    });
    var rise=el('button','btn','▶ chant the rising sequence — root to crown');
    rise.style.marginTop='8px';
    rise.addEventListener('click', function(){ audio(); CHAKRA_SOUNDS.forEach(function(c,i){ setTimeout(function(){ tone(c.freq, 0.95); }, i*1000); }); buzz(20); });
    v.appendChild(rise);
    v.appendChild(el('div','hint','This is the microcosmic orbit sung — the charge climbing the spine, centre by centre. Pair it with breath: the inhale draws up, the tone releases on the exhale. The colours are the same ones the portal wears.'));
  }

  // ---- timer ----
  var tIvl=null, tLeft=0, tP=null;
  function startTimer(p){
    tP=p; tLeft=p.dur;
    document.getElementById('tov-name').textContent=p.name; paint();
    document.getElementById('tov').classList.add('show'); audio();
    clearInterval(tIvl);
    tIvl=setInterval(function(){ tLeft--; paint();
      if(tLeft>5 && p.dur>120 && tLeft===Math.floor(p.dur/2)){ tone(660,0.25); buzz(30); }
      if(tLeft<=0){ clearInterval(tIvl); bell(); buzz([60,40,80]); finish(true); }
    },1000);
  }
  function paint(){ var m=Math.floor(Math.max(tLeft,0)/60),s=Math.max(tLeft,0)%60; document.getElementById('tov-time').textContent=m+':'+(s<10?'0':'')+s; }
  function finish(done){ document.getElementById('tov').classList.remove('show'); clearInterval(tIvl); if(done&&tP)logSession(tP); tP=null; }
  document.getElementById('tov-cancel').addEventListener('click', function(){ finish(false); });
  document.getElementById('tov-done').addEventListener('click', function(){ finish(true); });

  document.getElementById('tabs').addEventListener('click', function(e){ var t=e.target.closest('.tab'); if(!t)return; if(tab!=='voice') stopDrone(); tab=t.dataset.tab; save(); render(); });
  document.getElementById('back-btn').addEventListener('click', function(){ stopDrone(); try{ window.parent.postMessage('close-temple','*'); }catch(e){} try{ window.location.href='index.html'; }catch(e){} });
  render();
})();
</script>
</body>
</html>
