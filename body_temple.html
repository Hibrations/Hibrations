<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0908">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>Body Temple</title>
<style>
:root {
  --bg: #0a0908;
  --bg-elev: #14110f;
  --bg-card: #1a1614;
  --border: #2a2420;
  --border-soft: #1f1a17;
  --ink: #e8e1d4;
  --ink-dim: #9a8f80;
  --ink-faint: #5e554a;
  --emerald: #3d7d63;
  --emerald-dim: #2a5847;
  --crimson: #9a4435;
  --crimson-dim: #6e2d22;
  --warning: #c89060;
  --pull: #7d8fc7;
  --push: #c78f8f;
  --hinge: #a89b6b;
  --squat: #6ba879;
  --core: #b08fc7;
  --mobility: #8fb8c7;
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --shadow: 0 1px 0 rgba(255,255,255,0.02), 0 8px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  min-height: 100vh;
  overscroll-behavior-y: contain;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 80px) env(safe-area-inset-left);
  max-width: 720px;
  margin: 0 auto;
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }

input, textarea, select {
  font: inherit;
  color: inherit;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s ease;
}
input:focus, textarea:focus, select:focus { border-color: var(--emerald); }
textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
::placeholder { color: var(--ink-faint); }

header.app-header {
  padding: 28px 22px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-soft);
}
.app-back {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: lowercase;
  color: var(--ink-dim);
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.app-back:active { color: var(--ink); border-color: var(--ink-dim); }
.app-titleblock { flex: 1; text-align: center; }
.app-title {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-dim);
}
.app-date { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.05em; }

nav.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 9, 8, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--border-soft);
  padding: 12px max(env(safe-area-inset-left), 0px) calc(env(safe-area-inset-bottom) + 12px) max(env(safe-area-inset-right), 0px);
  display: flex;
  justify-content: space-around;
  z-index: 50;
}
.tab-btn {
  flex: 1;
  padding: 8px 6px;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-align: center;
  transition: color 0.15s;
}
.tab-btn.active { color: var(--ink); }

main { padding: 0 22px; }
.view { display: none; padding-top: 24px; padding-bottom: 32px; }
.view.active { display: block; animation: fade 0.25s ease-out; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* HOME */
.today-eyebrow {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 10px;
}
.today-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px 24px;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
}
.today-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--emerald);
  opacity: 0.7;
}
.today-card.alt-mode::before { background: var(--warning); }
.today-card.zen::before { background: var(--crimson); }
.today-name {
  font-size: 32px;
  font-weight: 300;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  line-height: 1.15;
}
.today-sub { color: var(--ink-dim); font-size: 14px; margin-bottom: 18px; }
.today-meta {
  display: flex; gap: 16px;
  font-size: 12px;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
  margin-bottom: 24px;
}
.btn-primary {
  width: 100%;
  background: var(--emerald);
  color: var(--bg);
  font-weight: 500;
  padding: 16px 20px;
  border-radius: var(--r-md);
  font-size: 15px;
  letter-spacing: 0.04em;
  transition: background 0.15s;
}
.btn-primary:active { background: var(--emerald-dim); }
.btn-secondary {
  width: 100%;
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--border);
  padding: 14px 20px;
  border-radius: var(--r-md);
  font-size: 14px;
  letter-spacing: 0.03em;
  transition: border-color 0.15s, background 0.15s;
}
.btn-secondary:active { border-color: var(--ink-dim); background: var(--bg-elev); }

.escape-hatch { margin-top: 22px; text-align: center; }
.escape-hatch-prompt {
  color: var(--ink-faint);
  font-size: 13px;
  font-style: italic;
  margin-bottom: 12px;
}
.alt-modes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.alt-mode-card {
  background: var(--bg-elev);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 16px 14px;
  text-align: left;
  transition: border-color 0.15s;
}
.alt-mode-card:active { border-color: var(--ink-dim); }
.alt-mode-name { font-size: 15px; margin-bottom: 4px; }
.alt-mode-sub { font-size: 12px; color: var(--ink-faint); line-height: 1.4; }

/* SESSION */
.session-header {
  display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;
}
.session-title { font-size: 26px; font-weight: 300; letter-spacing: -0.01em; }
.session-progress { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.08em; }
.session-sub { color: var(--ink-dim); font-size: 13px; margin-bottom: 22px; }

.warmup-block, .cooldown-block {
  background: var(--bg-elev);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 16px 18px;
  margin-bottom: 18px;
}
.warmup-block summary, .cooldown-block summary {
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-dim);
  cursor: pointer;
  outline: none;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.warmup-block summary::-webkit-details-marker,
.cooldown-block summary::-webkit-details-marker { display: none; }
.warmup-block summary::after, .cooldown-block summary::after {
  content: '+'; font-size: 18px; color: var(--ink-faint); font-weight: 300;
}
.warmup-block[open] summary::after, .cooldown-block[open] summary::after { content: '−'; }
.warmup-block ul, .cooldown-block ul { list-style: none; padding: 0; margin-top: 12px; }
.warmup-block li, .cooldown-block li {
  padding: 6px 0; color: var(--ink-dim); font-size: 14px;
  border-top: 1px solid var(--border-soft);
}
.warmup-block li:first-child, .cooldown-block li:first-child { border-top: none; }

.exercise-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 18px 18px 14px;
  margin-bottom: 12px;
  transition: opacity 0.2s;
}
.exercise-card.done { opacity: 0.45; }
.exercise-card.done .ex-name { text-decoration: line-through; text-decoration-color: var(--ink-faint); }

.ex-row { display: flex; align-items: flex-start; gap: 14px; }
.ex-check {
  flex: 0 0 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: transparent;
  margin-top: 2px;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.ex-check.checked { background: var(--emerald); border-color: var(--emerald); }
.ex-check.checked::after { content: '✓'; color: var(--bg); font-size: 14px; font-weight: 600; }
.ex-body { flex: 1; min-width: 0; }
.ex-letter {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.ex-name { font-size: 17px; font-weight: 400; margin-bottom: 4px; line-height: 1.3; }
.ex-alt { font-size: 12px; color: var(--ink-faint); font-style: italic; margin-bottom: 8px; }
.ex-prescription {
  display: flex; gap: 14px;
  font-size: 13px;
  color: var(--ink-dim);
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.ex-prescription span strong { color: var(--ink); font-weight: 500; }
/* Round 19 — last-session progress surface */
.ex-last-session {
  font-size: 11px;
  color: var(--ink-faint);
  margin: 0 0 8px;
  line-height: 1.45;
  letter-spacing: 0.02em;
}
.ex-last-session .ex-last-eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 9px;
  color: var(--ink-faint);
  opacity: 0.7;
  margin-right: 8px;
}
.ex-last-session .ex-last-note {
  color: var(--ink-dim);
  font-style: italic;
}
.ex-last-session.ex-last-plateau .ex-last-note { color: #c89060; }
.ex-last-session.ex-last-plateau::before { content: '⚐ '; color: #c89060; font-style: normal; }
/* Round 20 — weight + progressive overload nudge */
.ex-last-session .ex-last-weight {
  color: var(--ink); font-weight: 500; font-style: normal;
  margin-right: 6px; letter-spacing: 0.01em;
}
.ex-progress-nudge {
  font-size: 11px; color: #c89060; letter-spacing: 0.04em;
  margin: -2px 0 8px; font-style: italic;
}
.ex-progress-nudge strong { color: #c89060; font-weight: 600; font-style: normal; }
/* Round 27 — quick weight pill: ± buttons for in-session weight tracking */
.ex-weight {
  display: flex; align-items: center; gap: 10px;
  margin: 6px 0 12px;
  padding: 5px 8px 5px 12px;
  background: var(--bg);
  border: 1px solid var(--border-soft);
  border-radius: 999px;
  width: fit-content;
}
.ex-weight-label {
  font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-faint); opacity: 0.8;
}
.ex-weight-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--ink-dim);
  font-size: 18px; font-weight: 600; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.12s, color 0.12s;
}
.ex-weight-btn:active { border-color: #c89060; color: #c89060; }
.ex-weight-value {
  font-size: 16px; font-weight: 600;
  color: #c89060; letter-spacing: 0.02em;
  min-width: 64px; text-align: center;
  font-variant-numeric: tabular-nums;
}
.ex-weight-value.empty { color: var(--ink-faint); font-weight: 400; font-style: italic; }
.ex-weight-value { cursor: pointer; }
/* Round 28 — tap value to type a weight directly (skip the dozens of taps for big jumps) */
.ex-weight-input {
  font-size: 16px; font-weight: 600;
  color: #c89060; background: var(--bg-card);
  border: 1px solid #c89060;
  border-radius: 8px;
  min-width: 64px; width: 80px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  padding: 5px 6px;
  outline: none;
  -moz-appearance: textfield;
}
.ex-weight-input::-webkit-outer-spin-button,
.ex-weight-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
/* Round 22 — Personal Records panel on home view */
.prs-panel { margin-top: 28px; }
.prs-list { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
.prs-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 12px;
  align-items: baseline;
  padding: 10px 14px;
  background: var(--bg-card);
  border-radius: var(--r-md);
  border: 1px solid var(--border-soft);
}
.prs-name { font-size: 14px; color: var(--ink); line-height: 1.3; }
.prs-weight { font-size: 15px; color: #c89060; font-weight: 500; letter-spacing: 0.02em; white-space: nowrap; }
.prs-date { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.08em; text-transform: lowercase; white-space: nowrap; }
/* Round 23 — notes history in exercise wiki view */
.detail-notes-history { margin-top: 20px; }
.notes-history-list {
  display: flex; flex-direction: column; gap: 8px; margin-top: 12px;
  max-height: 420px; overflow-y: auto; padding-right: 4px;
}
.nh-row {
  display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--bg-card);
  border-radius: var(--r-sm);
  border: 1px solid var(--border-soft);
  font-size: 13px;
  line-height: 1.4;
}
.nh-date {
  font-size: 10px; color: var(--ink-faint); letter-spacing: 0.1em;
  text-transform: lowercase; min-width: 70px; flex-shrink: 0;
}
.nh-weight { color: #c89060; font-weight: 500; letter-spacing: 0.02em; }
.nh-note { color: var(--ink-dim); font-style: italic; flex: 1; min-width: 200px; }
.notes-history-empty {
  font-size: 12px; color: var(--ink-faint); font-style: italic;
  padding: 14px; text-align: center;
}
.ex-cues { font-size: 12px; color: var(--ink-faint); font-style: italic; margin-bottom: 10px; line-height: 1.5; }
.ex-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.ex-action-btn {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-dim);
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 999px;
  transition: border-color 0.15s, color 0.15s;
}
.ex-action-btn:active { border-color: var(--ink); color: var(--ink); }
.ex-action-btn.accent { color: var(--emerald); border-color: var(--emerald-dim); }
.ex-notes, .ex-form { margin-top: 12px; display: none; }
.ex-notes.open, .ex-form.open { display: block; }
.ex-notes textarea { font-size: 14px; background: var(--bg); min-height: 70px; margin-bottom: 6px; }
.ex-notes-prompt { font-size: 11px; color: var(--ink-faint); font-style: italic; margin-bottom: 6px; }

/* FORM PANEL (in-session wiki) */
.ex-form {
  background: var(--bg-elev);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 14px 16px;
}
.form-section { margin-bottom: 12px; }
.form-section:last-child { margin-bottom: 0; }
.form-label {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 4px;
}
.form-text { font-size: 13.5px; color: var(--ink); line-height: 1.55; }
.form-text.muted { color: var(--ink-dim); }
.form-image-wrap {
  margin: 12px 0;
  border-radius: var(--r-sm);
  overflow: hidden;
  background: var(--bg);
  text-align: center;
}
.form-image-wrap img { max-width: 100%; max-height: 240px; display: block; margin: 0 auto; }
.form-no-image {
  padding: 24px 16px;
  border: 1px dashed var(--border);
  border-radius: var(--r-sm);
  color: var(--ink-faint);
  font-size: 12px;
  text-align: center;
  font-style: italic;
}
.form-no-image small { display: block; margin-top: 4px; font-style: normal; }

/* TIMER */
#timer-overlay {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-card);
  border: 1px solid var(--emerald);
  border-radius: 999px;
  padding: 12px 22px;
  display: none;
  align-items: center;
  gap: 14px;
  z-index: 40;
  box-shadow: var(--shadow);
}
#timer-overlay.active { display: flex; }
.timer-label {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.timer-display {
  font-variant-numeric: tabular-nums;
  font-size: 22px;
  font-weight: 300;
  color: var(--ink);
  min-width: 48px;
  text-align: center;
}
.timer-display.flash { color: var(--warning); }
.timer-stop {
  font-size: 11px; color: var(--ink-dim);
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 8px;
}

/* SESSION COMPLETE */
.session-complete {
  background: var(--bg-card);
  border: 1px solid var(--emerald-dim);
  border-radius: var(--r-lg);
  padding: 28px 24px;
  text-align: center;
  margin-top: 24px;
}
.session-complete-msg {
  font-size: 17px; color: var(--ink); margin-bottom: 8px;
  font-weight: 300; letter-spacing: 0.02em;
}
.session-complete-sub { font-size: 13px; color: var(--ink-dim); font-style: italic; margin-bottom: 22px; }
.session-final-notes textarea { background: var(--bg); }

/* PLANS LIBRARY */
.plans-list { display: flex; flex-direction: column; gap: 10px; }
.plan-row {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.plan-row-info { flex: 1; min-width: 0; }
.plan-row-name { font-size: 16px; margin-bottom: 2px; }
.plan-row-sub { font-size: 12px; color: var(--ink-faint); }
.plan-row-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-dim);
  font-size: 14px;
  transition: border-color 0.15s, color 0.15s;
}
.icon-btn:active { border-color: var(--ink); color: var(--ink); }

.section-header {
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-faint);
  margin: 24px 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-soft);
}

/* EDITOR */
.editor-field { margin-bottom: 16px; }
.editor-label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 6px;
}
.editor-list-block {
  background: var(--bg-elev);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 14px;
}
.editor-list-item {
  display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
}
.editor-list-item input { flex: 1; padding: 10px 12px; font-size: 14px; }
.editor-exercise {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 10px;
}
.editor-exercise.linked { border-left: 3px solid var(--emerald); }
.editor-ex-link-info {
  font-size: 11px;
  color: var(--emerald);
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}
.editor-ex-grid {
  display: grid;
  grid-template-columns: 1fr 80px 90px 80px;
  gap: 8px;
  margin-bottom: 8px;
}
.editor-ex-grid input { padding: 10px 10px; font-size: 13px; }
.editor-ex-grid input::placeholder { font-size: 11px; }
.editor-ex-controls {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 6px; padding-top: 8px;
  border-top: 1px solid var(--border-soft);
}
.move-btns { display: flex; gap: 4px; }
.editor-add-btn {
  width: 100%;
  padding: 12px;
  border: 1px dashed var(--border);
  border-radius: var(--r-md);
  color: var(--ink-dim);
  font-size: 13px;
  letter-spacing: 0.05em;
  transition: border-color 0.15s, color 0.15s;
  margin-bottom: 8px;
}
.editor-add-btn:active { border-color: var(--ink); color: var(--ink); border-style: solid; }

// ============================================================
// STATE + MIGRATION
// ============================================================
let state = loadState();
let currentView = 'home';
let activeSession = null;
let timerInterval = null;
let timerEnd = 0;
let modalContext = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_DATA));
    const parsed = JSON.parse(raw);
    return migrateState(parsed);
  } catch (e) {
    console.warn('state load failed, using defaults', e);
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function migrateState(s) {
  // v1 → v2: add library, link plan exercises by name, ensure schemaVersion
  if (!s.schemaVersion || s.schemaVersion < 2) {
    if (!s.library) s.library = JSON.parse(JSON.stringify(DEFAULT_LIBRARY));
    // Link plan exercises by name match
    s.plans.forEach(p => {
      p.exercises.forEach(ex => {
        if (!ex.libraryId) {
          const match = findLibraryMatch(ex.name, s.library);
          if (match) ex.libraryId = match.id;
        }
      });
    });
    s.schemaVersion = 2;
  }
  // Ensure library exists even on v2 data missing it
  if (!s.library) s.library = JSON.parse(JSON.stringify(DEFAULT_LIBRARY));
  // Add any new default-library entries that don't exist yet (non-destructive merge)
  const existingIds = new Set(s.library.map(e => e.id));
  DEFAULT_LIBRARY.forEach(e => {
    if (!existingIds.has(e.id)) s.library.push(JSON.parse(JSON.stringify(e)));
  });
  return s;
}

function findLibraryMatch(exName, library) {
  if (!exName) return null;
  const norm = s => String(s || '').toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
  const n = norm(exName);
  // exact match first
  let m = library.find(e => norm(e.name) === n);
  if (m) return m;
  // contains match (e.g., "Lat pulldown — wide grip" → "Lat pulldown")
  m = library.find(e => n.includes(norm(e.name)) || norm(e.name).includes(n.split(' ').slice(0, 2).join(' ')));
  return m || null;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { toast('could not save — storage full?'); }
}

function resetToDefaults() {
  if (!confirm('Reset all plans, library, and history to defaults? Custom edits will be lost.')) return;
  state = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveState();
  render();
  toast('reset');
}

// ============================================================

function formatDate(iso) {
  const d = new Date(iso + 'T00:00');
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}
function todayDayName() { return DAYS[new Date().getDay()]; }
function getPlan(id) { return state.plans.find(p => p.id === id); }
function getAlt(id) { return state.altModes.find(m => m.id === id); }
function getLibEntry(id) { return id ? state.library.find(e => e.id === id) : null; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function uid(prefix = 'x') { return prefix + '-' + Math.random().toString(36).slice(2, 9); }

function el(tag, className, text) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text !== undefined) e.textContent = text;
  return e;
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatRest(sec) {
  if (sec < 60) return sec + 's';
  if (sec % 60 === 0) return (sec / 60) + 'm';
  return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
}

function setHeaderDate() {
  const d = new Date();
  document.getElementById('header-date').textContent = d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' }).toLowerCase();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => setView(btn.dataset.view));
});

function setView(name) {
  currentView = name;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  render();
}

// ============================================================
// RENDER ROUTER
// ============================================================
function render() {
  const main = document.getElementById('app');
  main.innerHTML = '';
  const view = document.createElement('div');
  view.className = 'view active';

  if (activeSession && !activeSession.__paused) view.appendChild(renderSession());
  else if (currentView === 'home') view.appendChild(renderHome());
  else if (currentView === 'library') view.appendChild(renderLibraryView());
  else if (currentView === 'libdetail') view.appendChild(renderExerciseDetail());
  else if (currentView === 'plans') view.appendChild(renderPlans());
  else if (currentView === 'history') view.appendChild(renderHistory());
  else if (currentView === 'editor') view.appendChild(renderEditor());
  else if (currentView === 'altmode') view.appendChild(renderAltMode());
  else if (currentView === 'altpicker') view.appendChild(renderAltPicker());

  main.appendChild(view);
  window.scrollTo(0, 0);
}

  const wrap = document.createElement('div');

function filteredLibrary() {
  const q = libraryFilter.search.toLowerCase().trim();
  return state.library.filter(e => {
    if (libraryFilter.mechanic !== 'all' && e.mechanic !== libraryFilter.mechanic) return false;
    if (q) {
      const hay = (e.name + ' ' + (e.primary || []).join(' ') + ' ' + (e.equipment || []).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function updateLibraryGrid() {
  const grid = document.getElementById('lib-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const items = filteredLibrary();
  if (!items.length) {
    grid.innerHTML = `<div class="lib-empty">no exercises match — clear filters?</div>`;
    return;
  }
  items.forEach(ex => {
    const card = document.createElement('button');
    card.className = 'lib-card';
    const mechClass = 'lib-mech-' + (ex.mechanic || 'core');
    card.innerHTML = `
      <span class="lib-mech-tag ${mechClass}">${escapeHtml(ex.mechanic || '')}</span>
      <div class="lib-card-info">
        <div class="lib-card-name">${escapeHtml(ex.name)}</div>
        <div class="lib-card-muscles">${escapeHtml((ex.primary || []).join(', '))}</div>
      </div>`;
    card.addEventListener('click', () => openExerciseDetail(ex.id));
    grid.appendChild(card);
  });
}

      ${(ex.equipment||[]).map(e => `<span class="lib-mech-tag" style="background:rgba(255,255,255,0.04); color: var(--ink-faint)">${escapeHtml(e)}</span>`).join('')}
    </div>`;

  card.innerHTML = `

    <div class="detail-meta-row">
      <div class="form-section">
        <div class="form-label">primary</div>
        <div class="form-text">${escapeHtml((ex.primary||[]).join(', ') || '—')}</div>
      </div>
      ${(ex.secondary && ex.secondary.length) ? `<div class="form-section">
        <div class="form-label">secondary</div>
        <div class="form-text muted">${escapeHtml(ex.secondary.join(', '))}</div>
      </div>` : ''}
    </div>`;

  // Image / paste slot
  const imgWrap = document.createElement('div');
  if (ex.imageUrl) {
    imgWrap.className = 'detail-image';
    imgWrap.innerHTML = `<img src="${escapeHtml(ex.imageUrl)}" alt="${escapeHtml(ex.name)}">`;
  } else {
    imgWrap.className = 'detail-image-empty';
    imgWrap.innerHTML = `no demo yet<small class="detail-image-paste">tap "paste GIF link" below to add one (Imgur, Giphy, Tenor, etc.)</small>`;
  }
  card.appendChild(imgWrap);

  // Sections
  const sections = [
    { label: 'setup', value: ex.setup },
    { label: 'execution', value: ex.execution },
    { label: 'common mistakes', value: ex.mistakes },
    { label: 'breath', value: ex.breath },
    { label: 'integration', value: ex.integrations },
    { label: 'progressions', value: ex.progressions },
    { label: 'regressions', value: ex.regressions }
  ];
  sections.forEach(s => {
    if (!s.value) return;
    const div = document.createElement('div');
    div.className = 'detail-section';
    div.innerHTML = `<h3>${escapeHtml(s.label)}</h3><p>${escapeHtml(s.value)}</p>`;
    card.appendChild(div);
  });

  // Round 23 + 24 — Notes history: all past sessions where this exercise had notes.
  // Match by libraryId (ex.id from library entry) first, fall back to name.
  const noteHistory = findAllSessionsForExercise(ex.name, ex.id);
  if (noteHistory.length > 0) {
    const notesDiv = document.createElement('div');
    notesDiv.className = 'detail-section detail-notes-history';
    let html = '<h3>your notes · ' + noteHistory.length + ' session' + (noteHistory.length === 1 ? '' : 's') + '</h3>';
    html += '<div class="notes-history-list">';
    noteHistory.forEach(n => {
      const ageText = daysAgoFrom(n.date) || '';
      // Round 27 — n now carries both .notes and .weight; getWeightFor handles either source.
      const w = getWeightFor(n);
      // Only strip weight tokens from notes when the weight came from parsing them; if it
      // came from the structured pill, leave the notes prose untouched.
      const restNote = (w && w.source === 'notes') ? stripWeightFromNotes(n.notes) : (n.notes || '');
      const weightPart = w ? '<span class="nh-weight">' + w.value + w.unit + '</span>' : '';
      const notePart = restNote ? '<span class="nh-note">' + escapeHtml(restNote) + '</span>' : '';
      html += '<div class="nh-row"><span class="nh-date">' + escapeHtml(ageText) + '</span>' + weightPart + notePart + '</div>';
    });
    html += '</div>';
    notesDiv.innerHTML = html;
    card.appendChild(notesDiv);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'detail-actions';

  if (ex.videoUrl) {

  const pasteBtn = el('button', 'btn-secondary', ex.imageUrl ? 'replace GIF link' : 'paste GIF link');

  actions.appendChild(pasteBtn);

  const editBtn = el('button', 'btn-secondary', 'edit wiki');
  editBtn.addEventListener('click', () => openWikiEditModal(ex));
  actions.appendChild(editBtn);

  card.appendChild(actions);
  wrap.appendChild(card);
  return wrap;

      id: uid('lib'),
      name,
      primary: document.getElementById('cx-primary').value.split(',').map(s => s.trim()).filter(Boolean),
      secondary: [],
      equipment: document.getElementById('cx-equipment').value.split(',').map(s => s.trim()).filter(Boolean),
      mechanic: document.getElementById('cx-mech').value,
      type: 'custom',
      setup: document.getElementById('cx-setup').value.trim(),
      execution: document.getElementById('cx-execution').value.trim(),
      mistakes: document.getElementById('cx-mistakes').value.trim(),
      videoUrl: ytSearch(name),
      imageUrl: ''
    };
    state.library.push(newEx);
    saveState();
    closeModal();
    render();
    toast('added to library');
  };
}

function openSwapModal(ex, idx) {
  const lib = getLibEntry(ex.libraryId);
  const mech = lib ? lib.mechanic : null;
  const candidates = state.library.filter(e => (!mech || e.mechanic === mech) && e.id !== ex.libraryId);
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">swap${mech ? ' — same ' + escapeHtml(mech) : ''}</div>
      <button class="modal-close" id="modal-close-btn">×</button>
    </div>
    <div class="subtle" style="margin-bottom:14px; line-height:1.5;">
      pick an alternative${mech ? ' (same movement pattern)' : ''}. sets, reps, and rest stay the same — just the movement changes.
    </div>
    <div class="library-search-wrap"><input id="swap-search" placeholder="search…"></div>
    <div class="lib-grid" id="swap-grid"></div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-close-btn').onclick = closeModal;
  const fillGrid = (q) => {
    const grid = document.getElementById('swap-grid');
    grid.innerHTML = '';
    const qq = (q || '').toLowerCase().trim();
    candidates.forEach(c => {
      if (qq && !(c.name + ' ' + (c.primary || []).join(' ')).toLowerCase().includes(qq)) return;
      const card = document.createElement('button');
      card.className = 'lib-card';
      card.innerHTML = `
        <span class="lib-mech-tag lib-mech-${c.mechanic}">${escapeHtml(c.mechanic)}</span>
        <div class="lib-card-info">
          <div class="lib-card-name">${escapeHtml(c.name)}</div>
          <div class="lib-card-muscles">${escapeHtml((c.primary || []).join(', '))}</div>
        </div>`;
      card.addEventListener('click', () => {
        const target = activeSession.exercises[idx];
        target.libraryId = c.id;
        target.name = c.name;
        target.alt = '';
        // sets, reps, rest, cues, letter — preserved
        closeModal();
        render();
        toast('swapped to ' + c.name);
      });
      grid.appendChild(card);
    });
  };
  document.getElementById('swap-search').addEventListener('input', e => fillGrid(e.target.value));
  fillGrid('');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal').innerHTML = '';
  modalContext = null;
}

// click outside modal to close
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target.id === 'modal-overlay') closeModal();
});

// ============================================================
// SESSION
// ============================================================
// Round 17 — Bi-weekly exercise rotation for Push / Pull / Legs.
// Schoenfeld + Israetel: variation within movement patterns improves
// hypertrophy outcomes without sacrificing progressive overload.
// 2-week blocks = 2 sessions per exercise (enough to add weight or reps),
// then the slot rotates to the next exercise in its pool.
// ============================================================
const ROTATION_POOLS = {
  pull: {
    A: ['pullup', 'weighted_pullup', 'lat_pulldown', 'lat_pulldown_close'],    // vertical pull
    B: ['barbell_row', 'cable_row', 'db_row', 'pendlay_row', 'kb_renegade_row'], // horizontal pull (+ KB)
    C: ['conventional_deadlift', 'romanian_deadlift', 'trap_bar_deadlift', 'kb_single_arm_dl'], // hip hinge (+ KB)
    D: ['hammer_curl', 'incline_db_curl'],                                     // biceps
    E: ['face_pull', 'rear_delt_fly', 'straight_arm_pulldown']                 // rear delt + lat width
  },
  push: {
    A: ['bench_press', 'flat_db_press', 'incline_db_press'],                   // horizontal push
    B: ['overhead_press', 'db_shoulder_press', 'push_press', 'kb_strict_press', 'kb_bottoms_up_press'], // vertical push (+ KB)
    C: ['dips', 'tricep_pushdown', 'overhead_tricep_extension'],               // triceps
    D: ['lateral_raise'],                                                       // lateral delt (single)
    E: ['cable_fly', 'doorway_pec']                                            // chest fly
  },
  legs: {
    A: ['back_squat', 'front_squat', 'kb_front_squat', 'goblet_squat', 'leg_press'], // squat pattern (+ KB)
    B: ['walking_lunge', 'bulgarian_split_squat', 'pistol_squat'],             // lunge pattern
    C: ['lying_leg_curl', 'romanian_deadlift', 'kb_single_arm_dl'],            // hamstring (+ KB)
    D: ['hip_thrust'],                                                          // hip/glute
    E: ['standing_calf_raise']                                                  // calf (single)
  }
};

function getISOWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
}

// Bi-weekly cadence: block index = floor(ISO week / 2).
function getCurrentBlock() {
  return Math.floor(getISOWeekNumber(new Date()) / 2);
}

function getRotatedLibraryId(planId, slotLetter, fallbackId) {
  const pool = ROTATION_POOLS[planId] && ROTATION_POOLS[planId][slotLetter];
  if (!pool || pool.length === 0) return fallbackId;
  const idx = getCurrentBlock() % pool.length;
  return pool[idx];
}

// "Variation week 1 of 2" or "2 of 2" — tells Lek which session of the 2-week block this is.
function getVariationWeekOf2() {
  return (getISOWeekNumber(new Date()) % 2) + 1;
}

// Pull / Push / Legs are the only plans with rotation in V1. Returns boolean.
function planHasRotation(planId) {
  return !!ROTATION_POOLS[planId];
}

function startSession(planId) {
  const plan = getPlan(planId);
  if (!plan) return;
  activeSession = {
    date: TODAY(),
    planId: plan.id,
    planName: plan.name,
    exercises: plan.exercises.map(ex => {
      // Apply rotation if this plan + slot has a pool. Look up the rotated
      // library entry; if it exists in the user's library, swap libraryId + name.
      // If lookup fails (exercise deleted from library), fall back to the saved exercise.
      const rotatedId = getRotatedLibraryId(planId, ex.letter, ex.libraryId);
      const useRotated = rotatedId && rotatedId !== ex.libraryId;
      const libEntry = useRotated ? (state.library || []).find(l => l.id === rotatedId) : null;
      return {
        id: ex.id,
        libraryId: libEntry ? libEntry.id : ex.libraryId,
        name: libEntry ? libEntry.name : ex.name,
        letter: ex.letter,
        alt: ex.alt,
        sets: ex.sets,
        reps: ex.reps,
        rest: ex.rest,
        cues: ex.cues,
        done: false,
        notes: '',
        notesOpen: false,
        formOpen: false
      };
    }),
    warmup: plan.warmup || [],
    cooldown: plan.cooldown || [],
    duration: plan.duration,
    finalNotes: ''
  };
  render();
}

function renderSession() {
  const wrap = document.createElement('div');
  const s = activeSession;

  const exitRow = document.createElement('div');
  exitRow.className = 'row-spread';
  exitRow.style.marginBottom = '14px';
  const exitBtn = el('button', 'subtle', '← exit (progress saved)');
  exitBtn.style.cursor = 'pointer';
  exitBtn.addEventListener('click', () => { activeSession = null; render(); });
  exitRow.appendChild(exitBtn);
  wrap.appendChild(exitRow);

  const header = document.createElement('div');
  header.className = 'session-header';
  const done = s.exercises.filter(e => e.done).length;
  header.innerHTML = `<div class="session-title">${escapeHtml(s.planName)}</div><div class="session-progress">${done}/${s.exercises.length}</div>`;
  wrap.appendChild(header);
  wrap.appendChild(el('div', 'session-sub', formatDate(s.date) + (s.duration ? ' · ' + s.duration : '')));

  if (s.warmup && s.warmup.length) {
    const wu = document.createElement('details');
    wu.className = 'warmup-block';
    wu.innerHTML = `<summary>warm-up</summary>`;
    const ul = document.createElement('ul');
    s.warmup.forEach(item => { const li = document.createElement('li'); li.textContent = item; ul.appendChild(li); });
    wu.appendChild(ul);
    wrap.appendChild(wu);
  }

  s.exercises.forEach((ex, i) => wrap.appendChild(renderExerciseCard(ex, i)));

  if (s.cooldown && s.cooldown.length) {
    const cd = document.createElement('details');
    cd.className = 'cooldown-block';
    cd.innerHTML = `<summary>cool-down</summary>`;
    const ul = document.createElement('ul');
    s.cooldown.forEach(item => { const li = document.createElement('li'); li.textContent = item; ul.appendChild(li); });
    cd.appendChild(ul);
    wrap.appendChild(cd);
  }

  const allDone = s.exercises.every(e => e.done);
  const complete = document.createElement('div');
  complete.className = 'session-complete';
  complete.innerHTML = allDone
    ? `<div class="session-complete-msg">rest. integrate. the body showed up.</div><div class="session-complete-sub">how did it land?</div>`
    : `<div class="session-complete-msg">close the session when you're ready.</div><div class="session-complete-sub">finish the exercises above, or close it here — your call.</div>`;

  const finalField = document.createElement('div');
  finalField.className = 'session-final-notes';
  finalField.style.textAlign = 'left';
  finalField.style.marginBottom = '16px';
  finalField.innerHTML = `<div class="ex-notes-prompt">what moved? what blocked? where did the energy sit?</div>`;
  const finalTA = document.createElement('textarea');
  finalTA.value = s.finalNotes;
  finalTA.placeholder = 'session notes…';
  finalTA.addEventListener('input', e => { s.finalNotes = e.target.value; });
  finalField.appendChild(finalTA);
  complete.appendChild(finalField);

  const closeBtn = el('button', 'btn-primary', 'close session — keep');
  closeBtn.addEventListener('click', closeSession);
  complete.appendChild(closeBtn);
  wrap.appendChild(complete);

  return wrap;
}

// Round 19 — last-session progress surface helpers.
// Surfaces the most recent notes for the same exercise so Lek walks into
// the gym knowing what to beat. Plateau flag fires when last 3 sessions
// have identical notes (case-insensitive) — signal to vary or deload.
function findLastSessionExercise(name) {
  if (!name || !state.sessions) return null;
  for (let i = 0; i < state.sessions.length; i++) {
    const s = state.sessions[i];
    if (!s.exercises) continue;
    const ex = s.exercises.find(e => e.name === name);
    if (ex) return { exercise: ex, sessionDate: s.date };
  }
  return null;
}

function findRecentSessionsForExercise(name, max) {
  const out = [];
  if (!name || !state.sessions) return out;
  for (let i = 0; i < state.sessions.length && out.length < max; i++) {
    const s = state.sessions[i];
    if (!s.exercises) continue;
    const ex = s.exercises.find(e => e.name === name);
    if (ex) out.push({ exercise: ex, sessionDate: s.date });
  }
  return out;
}

function daysAgoFrom(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T12:00:00');
  if (isNaN(d.getTime())) return null;
  const today = new Date();
  today.setHours(12, 0, 0, 0);
  const diff = Math.round((today.getTime() - d.getTime()) / (24 * 3600 * 1000));
  if (diff <= 0) return 'today';
  if (diff === 1) return 'yesterday';
  return diff + 'd ago';
}

// Plateau detection: same notes across last 3 sessions = plateau flag.
// Requires non-empty notes on all three (otherwise can't tell).
function isPlateauFor(name) {
  const recent = findRecentSessionsForExercise(name, 3);
  if (recent.length < 3) return false;
  const norms = recent.map(r => (r.exercise.notes || '').trim().toLowerCase());
  if (norms.some(n => !n)) return false;
  return norms[0] === norms[1] && norms[1] === norms[2];
}

// Round 20 — extract weight from free-text notes.
// Recognises "70kg", "70 kg", "70.5 kg", "150lbs", "150 lb", with optional comma decimal.
function extractWeight(notes) {
  if (!notes) return null;
  const text = String(notes).trim();
  const kgMatch = text.match(/(\d+(?:[.,]\d+)?)\s*(?:kg|kilo(?:s|gram)?)/i);
  if (kgMatch) return { value: parseFloat(kgMatch[1].replace(',', '.')), unit: 'kg' };
  const lbMatch = text.match(/(\d+(?:[.,]\d+)?)\s*(?:lbs?|pound(?:s)?)/i);
  if (lbMatch) return { value: parseFloat(lbMatch[1].replace(',', '.')), unit: 'lbs' };
  return null;
}

// Strip the weight token from notes so the rest can render as a separate line.
function stripWeightFromNotes(notes) {
  if (!notes) return '';
  return String(notes).replace(/[\d.,]+\s*(?:kg|kilo(?:s|gram)?|lbs?|pound(?:s)?)\s*[,·\-]?\s*/i, '').trim();
}

// Round 27 — unified weight accessor. Prefers structured ex.weight (set by + / − buttons,
// always in kg), falls back to parsing ex.notes for backward compatibility with sessions
// logged before the weight pill existed. Returns { kg, value, unit, source } or null.
function getWeightFor(ex) {
  if (!ex) return null;
  if (typeof ex.weight === 'number' && ex.weight > 0) {
    return { kg: ex.weight, value: ex.weight, unit: 'kg', source: 'structured' };
  }
  const parsed = extractWeight(ex.notes);
  if (parsed) {
    const kg = parsed.unit === 'kg' ? parsed.value : parsed.value * 0.453592;
    return { kg, value: parsed.value, unit: parsed.unit, source: 'notes' };
  }
  return null;
}

// Format a kg number for display. Returns "—" if unset/zero; trims trailing .0.
function formatKg(w) {
  if (typeof w !== 'number' || w === 0) return '—';
  const r = Math.round(w * 10) / 10;
  return (r % 1 === 0 ? r.toFixed(0) : r.toFixed(1)) + ' kg';
}

// Progressive overload nudge: if last 2 sessions had the same weight, suggest +2.5kg / +5lbs.
// Returns null if no recent matched-weight pair, or if weight changed between sessions
// (user is already progressing, no nudge needed).
function progressiveOverloadFor(name) {
  const recent = findRecentSessionsForExercise(name, 2);
  if (recent.length < 2) return null;
  const w1 = getWeightFor(recent[0].exercise);
  const w2 = getWeightFor(recent[1].exercise);
  if (!w1 || !w2) return null;
  if (w1.unit !== w2.unit) return null;
  if (Math.abs(w1.value - w2.value) > 0.01) return null;
  // Round 29 — increment matches Round 28's ±1 kg pill (consistency: pill and nudge speak the same kilo).
  const increment = w1.unit === 'kg' ? 1 : 2;
  return { value: +(w1.value + increment).toFixed(2), unit: w1.unit };
}

// Round 21 — PR detection.
// Returns the highest detected weight (in kg, normalised across units) found in
// any prior session for this exercise. excludeSessionId lets the just-saved
// session skip itself when checking whether IT set a new PR.
function findPriorMaxWeight(name, excludeSessionId) {
  if (!name || !state.sessions) return null;
  let maxKg = null;
  for (const s of state.sessions) {
    if (excludeSessionId && s.id === excludeSessionId) continue;
    if (!s.exercises) continue;
    const ex = s.exercises.find(e => e.name === name);
    if (!ex) continue;
    const w = getWeightFor(ex);
    if (!w) continue;
    if (maxKg === null || w.kg > maxKg) maxKg = w.kg;
  }
  return maxKg;
}

// Scans a freshly-saved session for PRs. For each exercise with parseable weight,
// checks if it exceeds the prior all-time max (in kg). Returns one entry per PR
// with the original unit preserved for display.
function detectPRsInSession(session) {
  if (!session || !session.exercises) return [];
  const prs = [];
  session.exercises.forEach(ex => {
    const w = getWeightFor(ex);
    if (!w) return;
    const priorKg = findPriorMaxWeight(ex.name, session.id);
    if (priorKg === null) return; // no prior baseline yet — not a PR
    if (w.kg > priorKg + 0.01) {
      prs.push({ name: ex.name, value: w.value, unit: w.unit });
    }
  });
  return prs;
}

// Round 22 — All-time PRs across all sessions, one entry per exercise with parseable weight.
// Compares values in kg internally; preserves the original unit for display.
function getAllTimePRs() {
  if (!state.sessions || state.sessions.length === 0) return [];
  const byExercise = {};
  for (const s of state.sessions) {
    if (!s.exercises) continue;
    for (const ex of s.exercises) {
      const w = getWeightFor(ex);
      if (!w) continue;
      const existing = byExercise[ex.name];
      if (!existing || w.kg > existing.valueKg) {
        byExercise[ex.name] = {
          name: ex.name,
          value: w.value,
          unit: w.unit,
          valueKg: w.kg,
          date: s.date
        };
      }
    }
  }
  return Object.values(byExercise);
}

// Round 24 — robust name matching (case-insensitive, trimmed) so notes link
// even if the saved session's name differs in case/whitespace/hyphen from the
// library entry. Backward compatibility for sessions saved before libraryId was preserved.
function nameMatches(a, b) {
  if (!a || !b) return false;
  return String(a).trim().toLowerCase() === String(b).trim().toLowerCase();
}

// Round 23 + 24 — all sessions where this exercise has non-empty notes.
// Matches by libraryId first (added Round 24, most reliable), falls back to
// normalized name. Sessions in state.sessions are already newest-first.
function findAllSessionsForExercise(name, libraryId) {
  if (!state.sessions) return [];
  const out = [];
  state.sessions.forEach(s => {
    if (!s.exercises) return;
    const ex = s.exercises.find(e =>
      (libraryId && e.libraryId === libraryId) || nameMatches(e.name, name)
    );
    // Round 27 — include session if it has notes OR a structured weight (since the pill
    // can now produce log-worthy data with no notes typed).
    const hasNotes = ex && (ex.notes || '').trim();
    const hasWeight = ex && typeof ex.weight === 'number' && ex.weight > 0;
    if (ex && (hasNotes || hasWeight)) {
      out.push({
        date: s.date,
        notes: ex.notes,
        weight: ex.weight,
        planName: s.planName,
        sessionId: s.id
      });
    }
  });
  return out;
}

function renderPRsPanel() {
  const prs = getAllTimePRs();
  if (prs.length === 0) return null;
  // Sort by most-recent PR date first (motivation: see the freshest wins)
  prs.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const top = prs.slice(0, 8);

  const wrap = document.createElement('div');
  wrap.className = 'prs-panel';
  wrap.appendChild(el('div', 'today-eyebrow', '🏆 personal records'));

  const list = document.createElement('div');
  list.className = 'prs-list';
  top.forEach(pr => {
    const row = document.createElement('div');
    row.className = 'prs-row';
    const ageText = daysAgoFrom(pr.date) || '';
    row.innerHTML =
      '<div class="prs-name">' + escapeHtml(pr.name) + '</div>' +
      '<div class="prs-weight">' + pr.value + pr.unit + '</div>' +
      '<div class="prs-date">' + escapeHtml(ageText) + '</div>';
    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

function renderExerciseCard(ex, idx) {
  const card = document.createElement('div');
  card.className = 'exercise-card' + (ex.done ? ' done' : '');

  const row = document.createElement('div');
  row.className = 'ex-row';

  const check = document.createElement('button');
  check.className = 'ex-check' + (ex.done ? ' checked' : '');
  check.setAttribute('aria-label', ex.done ? 'mark not done' : 'mark done');
  check.addEventListener('click', () => {
    ex.done = !ex.done;
    if (ex.done && ex.rest > 0) startTimer(ex.rest);
    render();
  });
  row.appendChild(check);

  // Build last-session block (Round 19 + Round 20 + Round 27) — weight bolded, nudge if applicable
  const last = findLastSessionExercise(ex.name);
  let lastHtml = '';
  if (last) {
    const rawNotes = (last.exercise.notes || '').trim();
    const ageText = daysAgoFrom(last.sessionDate) || '';
    const plateauCls = isPlateauFor(ex.name) ? ' ex-last-plateau' : '';
    const w = getWeightFor(last.exercise);
    // Strip the weight token only if it came from notes-parsing (don't mutate prose if pill set the weight)
    const restNote = (w && w.source === 'notes') ? stripWeightFromNotes(rawNotes) : rawNotes;
    const weightPart = w ? `<span class="ex-last-weight">${w.value}${w.unit}</span>` : '';
    const notePart = restNote ? `<span class="ex-last-note">${escapeHtml(restNote)}</span>` : '';
    lastHtml = `<div class="ex-last-session${plateauCls}"><span class="ex-last-eyebrow">last · ${escapeHtml(ageText)}</span>${weightPart}${notePart}</div>`;
    // Progressive overload nudge — suggest next increment if last 2 weights matched
    // and we're not already in a plateau flag (plateau is its own signal).
    if (!isPlateauFor(ex.name)) {
      const nudge = progressiveOverloadFor(ex.name);
      if (nudge) {
        lastHtml += `<div class="ex-progress-nudge">try <strong>${nudge.value}${nudge.unit}</strong>?</div>`;
      }
    }
  }

  // Round 27 — prefill ex.weight from last session's weight (whichever path) on first render.
  // Once set, all +/− interactions persist via the active session's state.
  if (typeof ex.weight !== 'number') {
    if (last) {
      const lastWeight = getWeightFor(last.exercise);
      ex.weight = lastWeight ? Math.round(lastWeight.kg * 10) / 10 : 0;
    } else {
      ex.weight = 0;
    }
  }
  const weightDisplay = ex.weight > 0 ? formatKg(ex.weight) : '— kg';
  const weightEmptyCls = ex.weight > 0 ? '' : ' empty';
  const weightPillHtml = `
    <div class="ex-weight">
      <span class="ex-weight-label">weight</span>
      <button class="ex-weight-btn" data-delta="-1" type="button" aria-label="lower 1 kg">−</button>
      <span class="ex-weight-value${weightEmptyCls}" title="tap to type">${weightDisplay}</span>
      <button class="ex-weight-btn" data-delta="1" type="button" aria-label="raise 1 kg">+</button>
    </div>`;

  const body = document.createElement('div');
  body.className = 'ex-body';
  body.innerHTML = `
    ${ex.letter ? `<div class="ex-letter">${escapeHtml(ex.letter)}</div>` : ''}
    <div class="ex-name">${escapeHtml(ex.name)}</div>
    ${ex.alt ? `<div class="ex-alt">${escapeHtml(ex.alt)}</div>` : ''}
    ${lastHtml}
    <div class="ex-prescription">
      <span><strong>${ex.sets}</strong> × ${escapeHtml(String(ex.reps))}</span>
      ${ex.rest ? `<span>rest <strong>${formatRest(ex.rest)}</strong></span>` : ''}
    </div>
    ${weightPillHtml}
    ${ex.cues ? `<div class="ex-cues">${escapeHtml(ex.cues)}</div>` : ''}`;

  // Round 27 + 28 — wire up the weight pill. ± buttons step by 1 kg (Round 28),
  // tap the value to swap in a numeric input and type a weight directly (Round 28 — for
  // big jumps or starting from zero). Vibration cue on every change.
  const weightDiv = body.querySelector('.ex-weight');
  if (weightDiv) {
    const refreshDisplay = () => {
      const v = weightDiv.querySelector('.ex-weight-value');
      const i = weightDiv.querySelector('.ex-weight-input');
      if (v) {
        v.textContent = ex.weight > 0 ? formatKg(ex.weight) : '— kg';
        v.classList.toggle('empty', !(ex.weight > 0));
      } else if (i) {
        i.value = ex.weight > 0 ? ex.weight : '';
      }
    };
    const bindValueClick = span => {
      span.addEventListener('click', e => {
        e.stopPropagation();
        const input = document.createElement('input');
        input.type = 'number';
        input.step = '0.5';
        input.min = '0';
        input.inputMode = 'decimal';
        input.className = 'ex-weight-input';
        input.value = ex.weight > 0 ? ex.weight : '';
        input.placeholder = 'kg';
        span.replaceWith(input);
        input.focus();
        input.select();
        let committed = false;
        const commit = () => {
          if (committed) return;
          committed = true;
          const raw = String(input.value || '').replace(',', '.').trim();
          const v = parseFloat(raw);
          if (raw === '') ex.weight = 0;
          else if (!isNaN(v) && v >= 0) ex.weight = Math.round(v * 10) / 10;
          const newSpan = document.createElement('span');
          newSpan.className = 'ex-weight-value' + (ex.weight > 0 ? '' : ' empty');
          newSpan.setAttribute('title', 'tap to type');
          newSpan.textContent = ex.weight > 0 ? formatKg(ex.weight) : '— kg';
          input.replaceWith(newSpan);
          bindValueClick(newSpan);
          if (navigator.vibrate) navigator.vibrate(15);
        };
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', kev => {
          if (kev.key === 'Enter') { kev.preventDefault(); input.blur(); }
        });
      });
    };
    bindValueClick(weightDiv.querySelector('.ex-weight-value'));
    weightDiv.querySelectorAll('.ex-weight-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const delta = parseFloat(btn.dataset.delta);
        const next = Math.max(0, (typeof ex.weight === 'number' ? ex.weight : 0) + delta);
        ex.weight = Math.round(next * 10) / 10;
        refreshDisplay();
        if (navigator.vibrate) navigator.vibrate(15);
      });
    });
  }

  const actions = document.createElement('div');
  actions.className = 'ex-actions';

  const lib = getLibEntry(ex.libraryId);
  if (lib) {
    const formBtn = el('button', 'ex-action-btn accent', ex.formOpen ? 'hide form' : 'form');
    formBtn.addEventListener('click', () => { ex.formOpen = !ex.formOpen; render(); });
    actions.appendChild(formBtn);
  }

  if (lib && lib.videoUrl) {
    const watchBtn = el('button', 'ex-action-btn', 'watch ▶');
    watchBtn.addEventListener('click', () => window.open(lib.videoUrl, '_blank', 'noopener'));
    actions.appendChild(watchBtn);
  }

  if (ex.rest > 0) {
    const timerBtn = el('button', 'ex-action-btn', 'rest');
    timerBtn.addEventListener('click', () => startTimer(ex.rest));
    actions.appendChild(timerBtn);
  }

  const noteBtn = el('button', 'ex-action-btn', ex.notesOpen ? 'hide note' : 'note');
  noteBtn.addEventListener('click', () => { ex.notesOpen = !ex.notesOpen; render(); });
  actions.appendChild(noteBtn);

  if (lib) {
    const wikiBtn = el('button', 'ex-action-btn', 'wiki →');
    wikiBtn.addEventListener('click', () => {
      activeSession.__paused = true;
      window.__detailId = ex.libraryId;
      setView('libdetail');
    });
    actions.appendChild(wikiBtn);
  }

  const swapBtn = el('button', 'ex-action-btn', 'swap');
  swapBtn.addEventListener('click', () => openSwapModal(ex, idx));
  actions.appendChild(swapBtn);

  body.appendChild(actions);

  // Form panel (in-session wiki)
  if (ex.formOpen && lib) {
    const formPanel = document.createElement('div');
    formPanel.className = 'ex-form open';
    let html = '';
    if (lib.imageUrl) {
      html += `<div class="form-image-wrap"><img src="${escapeHtml(lib.imageUrl)}" alt="${escapeHtml(lib.name)}"></div>`;
    }
    if (lib.setup) html += `<div class="form-section"><div class="form-label">setup</div><div class="form-text">${escapeHtml(lib.setup)}</div></div>`;
    if (lib.execution) html += `<div class="form-section"><div class="form-label">execution</div><div class="form-text">${escapeHtml(lib.execution)}</div></div>`;
    if (lib.mistakes) html += `<div class="form-section"><div class="form-label">common mistakes</div><div class="form-text muted">${escapeHtml(lib.mistakes)}</div></div>`;
    if (lib.breath) html += `<div class="form-section"><div class="form-label">breath</div><div class="form-text muted">${escapeHtml(lib.breath)}</div></div>`;
    if (lib.integrations) html += `<div class="form-section"><div class="form-label">integration</div><div class="form-text">${escapeHtml(lib.integrations)}</div></div>`;
    formPanel.innerHTML = html;
    body.appendChild(formPanel);
  }

  // Notes panel
  const notes = document.createElement('div');
  notes.className = 'ex-notes' + (ex.notesOpen ? ' open' : '');
  notes.innerHTML = `<div class="ex-notes-prompt">weight, form, what landed</div>`;
  const ta = document.createElement('textarea');
  ta.value = ex.notes;
  ta.placeholder = '…';
  ta.addEventListener('input', e => { ex.notes = e.target.value; });
  notes.appendChild(ta);
  body.appendChild(notes);

  row.appendChild(body);
  card.appendChild(row);
  return card;
}

function closeSession() {
  const newSession = {
    id: uid('s'),
    date: activeSession.date,
    planId: activeSession.planId,
    planName: activeSession.planName,
    type: 'training',
    // Round 24 — also save libraryId so notes link reliably to the library entry
    // even if the exercise name later changes or differs slightly.
    // Round 27 — also persist structured weight (kg, from + / − pill) on each exercise.
    // Used by getWeightFor in subsequent sessions for PR detection, overload nudges, and history.
    exercises: activeSession.exercises.map(e => ({
      name: e.name,
      libraryId: e.libraryId,
      done: e.done,
      notes: e.notes,
      weight: typeof e.weight === 'number' && e.weight > 0 ? e.weight : undefined
    })),
    finalNotes: activeSession.finalNotes
  };
  state.sessions.unshift(newSession);
  saveState();
  activeSession = null;
  stopTimer();
  // Round 21 — PR detection
  const prs = detectPRsInSession(newSession);
  if (prs.length > 0) {
    const msg = prs.map(p => p.name + ' · ' + p.value + p.unit).join(' · ');
    toast('🏆 PR! ' + msg);
  } else {
    toast('session kept');
  }
  render();
}

function startTimer(seconds) {
  stopTimer();
  timerEnd = Date.now() + seconds * 1000;
  document.getElementById('timer-overlay').classList.add('active');
  updateTimer();
  timerInterval = setInterval(updateTimer, 250);
  if (window.__audioCtx === undefined) {
    try { window.__audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
}

function updateTimer() {
  const remaining = Math.max(0, Math.ceil((timerEnd - Date.now()) / 1000));
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  const display = document.getElementById('timer-display');
  display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  if (remaining <= 5 && remaining > 0) display.classList.add('flash');
  else display.classList.remove('flash');
  if (remaining === 0) {
    beep();
    setTimeout(stopTimer, 800);
  }
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer-overlay').classList.remove('active');
  document.getElementById('timer-display').classList.remove('flash');
}

function beep() {
  try {
    const ctx = window.__audioCtx;
    if (!ctx) return;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 660; o.type = 'sine';
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
    o.start(); o.stop(ctx.currentTime + 0.45);
  } catch (e) {}
}

document.getElementById('timer-stop').addEventListener('click', stopTimer);

function renderPlanRow(plan) {
  const row = document.createElement('div');
  row.className = 'plan-row';
  row.innerHTML = `<div class="plan-row-info"><div class="plan-row-name">${escapeHtml(plan.name)}</div><div class="plan-row-sub">${plan.exercises.length} movements${plan.duration ? ' · ' + escapeHtml(plan.duration) : ''}</div></div>`;

  actions.className = 'plan-row-actions';

  const edit = el('button', 'icon-btn', '✎');

  actions.appendChild(edit);

  dup.addEventListener('click', () => duplicatePlan(plan.id));
  actions.appendChild(dup);

  const start = el('button', 'icon-btn', '▶');
  start.style.color = 'var(--emerald)';

function duplicatePlan(id) {
  const plan = getPlan(id);
  if (!plan) return;
  const copy = JSON.parse(JSON.stringify(plan));
  copy.id = uid('plan');
  copy.name = plan.name + ' (copy)';
  copy.exercises.forEach(ex => ex.id = uid('ex'));
  state.plans.push(copy);
  saveState();
  toast('duplicated');
  render();
}

// EDITOR
// ============================================================
let editingPlan = null;

function openEditor(id) {
  if (id) editingPlan = JSON.parse(JSON.stringify(getPlan(id)));
  else editingPlan = { id: uid('plan'), name: 'New plan', subtitle: '', type: 'training', duration: '', warmup: [], exercises: [], cooldown: [] };
  currentView = 'editor';
  render();
}

function renderEditor() {
  const wrap = document.createElement('div');
  const p = editingPlan;
  if (!p) return wrap;

  const back = el('button', 'subtle', '← cancel');
  back.style.cursor = 'pointer';
  back.style.marginBottom = '12px';
  back.addEventListener('click', () => { editingPlan = null; setView('plans'); });
  wrap.appendChild(back);

  wrap.appendChild(el('div', 'today-eyebrow', 'edit plan'));

  const nameField = document.createElement('div');
  nameField.className = 'editor-field';
  nameField.innerHTML = '<div class="editor-label">name</div>';
  const nameIn = document.createElement('input');
  nameIn.value = p.name;
  nameIn.addEventListener('input', e => p.name = e.target.value);
  nameField.appendChild(nameIn);
  wrap.appendChild(nameField);

  const subField = document.createElement('div');
  subField.className = 'editor-field';
  subField.innerHTML = '<div class="editor-label">subtitle</div>';
  const subIn = document.createElement('input');
  subIn.value = p.subtitle || '';
  subIn.placeholder = 'e.g. back + biceps — V-taper foundation';
  subIn.addEventListener('input', e => p.subtitle = e.target.value);
  subField.appendChild(subIn);
  wrap.appendChild(subField);

  const durField = document.createElement('div');
  durField.className = 'editor-field';
  durField.innerHTML = '<div class="editor-label">duration (text)</div>';
  const durIn = document.createElement('input');
  durIn.value = p.duration || '';
  durIn.placeholder = '55–70 min';
  durIn.addEventListener('input', e => p.duration = e.target.value);
  durField.appendChild(durIn);
  wrap.appendChild(durField);

  // Warmup
  wrap.appendChild(el('div', 'editor-label', 'warm-up'));
  const wuBlock = document.createElement('div');
  wuBlock.className = 'editor-list-block';
  p.warmup.forEach((line, i) => wuBlock.appendChild(makeListItemEditor(line, v => p.warmup[i] = v, () => { p.warmup.splice(i, 1); render(); })));
  const addWU = el('button', 'editor-add-btn', '+ warm-up step');
  addWU.addEventListener('click', () => { p.warmup.push(''); render(); });
  wuBlock.appendChild(addWU);
  wrap.appendChild(wuBlock);

  // Exercises
  wrap.appendChild(el('div', 'editor-label', 'exercises'));
  p.exercises.forEach((ex, i) => wrap.appendChild(makeExerciseEditor(ex, i, p.exercises)));

  const fromLib = el('button', 'editor-add-btn accent', '+ pick from library');
  fromLib.addEventListener('click', () => openLibraryPickerModal(p));
  wrap.appendChild(fromLib);

  const addEx = el('button', 'editor-add-btn', '+ custom exercise');
  addEx.addEventListener('click', () => {
    p.exercises.push({ id: uid('ex'), letter: nextLetter(p.exercises.length), name: '', alt: '', sets: 3, reps: '8–12', rest: 90, cues: '' });
    render();
  });
  wrap.appendChild(addEx);

  // Cooldown
  wrap.appendChild(el('div', 'editor-label', 'cool-down'));
  const cdBlock = document.createElement('div');
  cdBlock.className = 'editor-list-block';
  (p.cooldown || []).forEach((line, i) => cdBlock.appendChild(makeListItemEditor(line, v => p.cooldown[i] = v, () => { p.cooldown.splice(i, 1); render(); })));
  const addCD = el('button', 'editor-add-btn', '+ cool-down step');
  addCD.addEventListener('click', () => { (p.cooldown ||= []).push(''); render(); });
  cdBlock.appendChild(addCD);
  wrap.appendChild(cdBlock);

  const actions = document.createElement('div');

  const save = el('button', 'btn-primary', 'keep');

  if (existing) {
    const del = el('button', 'btn-danger', 'delete');

      if (!confirm('Delete this plan?')) return;
      state.plans = state.plans.filter(pl => pl.id !== p.id);
      saveState();
      editingPlan = null;
      setView('plans');
      toast('deleted');
    });
    actions.appendChild(del);
  }
  wrap.appendChild(actions);

  return wrap;
}

function makeListItemEditor(value, onChange, onDelete) {
  const row = document.createElement('div');
  row.className = 'editor-list-item';
  const inp = document.createElement('input');
  inp.value = value;
  inp.placeholder = 'add a step…';
  inp.addEventListener('input', e => onChange(e.target.value));
  row.appendChild(inp);
  const del = el('button', 'icon-btn', '×');
  del.addEventListener('click', onDelete);
  row.appendChild(del);
  return row;
}

function makeExerciseEditor(ex, idx, list) {
  const wrap = document.createElement('div');
  wrap.className = 'editor-exercise' + (ex.libraryId ? ' linked' : '');

  const lib = getLibEntry(ex.libraryId);
  if (lib) {
    const linkInfo = el('div', 'editor-ex-link-info', `↳ linked: ${lib.name}`);
    wrap.appendChild(linkInfo);
  }

  const grid = document.createElement('div');
  grid.className = 'editor-ex-grid';
  const nameIn = document.createElement('input');
  nameIn.value = ex.name;
  nameIn.placeholder = 'exercise name';
  nameIn.addEventListener('input', e => ex.name = e.target.value);
  grid.appendChild(nameIn);

  const setsIn = document.createElement('input');
  setsIn.type = 'number'; setsIn.min = '1';
  setsIn.value = ex.sets; setsIn.placeholder = 'sets';
  setsIn.addEventListener('input', e => ex.sets = parseInt(e.target.value) || 1);
  grid.appendChild(setsIn);

  const repsIn = document.createElement('input');
  repsIn.value = ex.reps; repsIn.placeholder = 'reps';
  repsIn.addEventListener('input', e => ex.reps = e.target.value);
  grid.appendChild(repsIn);

  const restIn = document.createElement('input');
  restIn.type = 'number'; restIn.min = '0';
  restIn.value = ex.rest; restIn.placeholder = 'rest s';
  restIn.addEventListener('input', e => ex.rest = parseInt(e.target.value) || 0);
  grid.appendChild(restIn);

  wrap.appendChild(grid);

  const altIn = document.createElement('input');
  altIn.value = ex.alt || ''; altIn.placeholder = 'alternative (optional)';
  altIn.style.fontSize = '13px'; altIn.style.marginBottom = '6px';
  altIn.addEventListener('input', e => ex.alt = e.target.value);
  wrap.appendChild(altIn);

  const cuesIn = document.createElement('input');
  cuesIn.value = ex.cues || ''; cuesIn.placeholder = 'cues — what to remember mid-set';
  cuesIn.style.fontSize = '13px';
  cuesIn.addEventListener('input', e => ex.cues = e.target.value);
  wrap.appendChild(cuesIn);

  const ctrls = document.createElement('div');
  ctrls.className = 'editor-ex-controls';
  const moves = document.createElement('div');
  moves.className = 'move-btns';
  const up = el('button', 'icon-btn', '↑');
  up.addEventListener('click', () => { if (idx === 0) return; [list[idx-1], list[idx]] = [list[idx], list[idx-1]]; relabel(list); render(); });
  moves.appendChild(up);
  const down = el('button', 'icon-btn', '↓');
  down.addEventListener('click', () => { if (idx === list.length - 1) return; [list[idx+1], list[idx]] = [list[idx], list[idx+1]]; relabel(list); render(); });
  moves.appendChild(down);
  ctrls.appendChild(moves);

  const del = el('button', 'icon-btn', '×');
  del.style.color = 'var(--crimson)';
  del.addEventListener('click', () => { list.splice(idx, 1); relabel(list); render(); });
  ctrls.appendChild(del);

  wrap.appendChild(ctrls);
  return wrap;
}

function nextLetter(n) { return String.fromCharCode(65 + (n % 26)); }
function relabel(list) { list.forEach((ex, i) => ex.letter = nextLetter(i)); }

  const modal = document.getElementById('modal');

    <div class="modal-header">

function savePlan() {
  const p = editingPlan;
  if (!p.name.trim()) {
    toast('plan needs a name');
    return;
  }
  p.warmup = (p.warmup || []).map(s => s.trim()).filter(Boolean);
  p.cooldown = (p.cooldown || []).map(s => s.trim()).filter(Boolean);
  p.exercises = p.exercises.filter(ex => ex.name && ex.name.trim());
  const idx = state.plans.findIndex(pl => pl.id === p.id);
  if (idx >= 0) state.plans[idx] = p;
  else state.plans.push(p);
  saveState();
  editingPlan = null;
  toast('kept');
  setView('plans');
}

    wrap.appendChild(empty);

  }
  const list = document.createElement('div');
  list.className = 'history-list';
  state.sessions.slice(0, 50).forEach(s => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const doneCount = s.exercises ? s.exercises.filter(e => e.done).length : 0;

      <div class="history-date">${formatDate(s.date)}</div>

    list.appendChild(item);
  });
  wrap.appendChild(list);
  return wrap;
}
