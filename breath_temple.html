<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Breath &amp; Energy Temple</title>
<style>
:root {
  --bg: #08090a;
  --bg-elev: #0f1214;
  --bg-card: #13171a;
  --border: #21282c;
  --border-soft: #181d20;
  --ink: #e1e6e8;
  --ink-dim: #8a9499;
  --ink-faint: #545d61;
  --crimson: #5d93a6;
  --crimson-dim: #3d6675;
  --bronze: #a8895a;
  --bronze-dim: #7a6440;
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg); color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 16px; line-height: 1.55; min-height: 100vh;
  overscroll-behavior-y: contain; -webkit-font-smoothing: antialiased;
}
body {
  padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 40px) env(safe-area-inset-left);
  max-width: 720px; margin: 0 auto;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
textarea {
  font: inherit; color: inherit;
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 12px 14px; width: 100%;
  outline: none; transition: border-color 0.15s ease;
  resize: vertical; min-height: 70px; line-height: 1.5;
}
textarea:focus { border-color: var(--crimson); }
::placeholder { color: var(--ink-faint); }

header.shell-header {
  padding: 18px 22px 14px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border-soft);
}
.back-btn {
  font-size: 12px; letter-spacing: 0.1em; text-transform: lowercase;
  color: var(--ink-dim); padding: 8px 14px;
  border: 1px solid var(--border); border-radius: 999px;
  transition: all 0.15s;
}
.back-btn:active { color: var(--ink); border-color: var(--ink-dim); background: var(--bg-elev); }
.shell-title { flex: 1; text-align: center; font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--crimson); margin-right: 90px; }

.tab-bar { display: flex; gap: 6px; padding: 14px 22px 4px; border-bottom: 1px solid var(--border-soft); }
.tab-btn {
  flex: 1; padding: 10px 12px; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-faint); text-align: center;
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.tab-btn.active { color: var(--crimson); border-bottom-color: var(--crimson); }

main { padding: 22px; }

.declaration {
  background: var(--bg-elev); border: 1px solid var(--border-soft);
  border-left: 2px solid var(--crimson);
  border-radius: 0 var(--r-md) var(--r-md) 0;
  padding: 14px 18px; margin-bottom: 22px;
  font-size: 13px; color: var(--ink-dim); font-style: italic; line-height: 1.6;
}
.declaration strong { font-style: normal; color: var(--ink); font-weight: 500; }

.anchor-banner {
  background: linear-gradient(135deg, rgba(93,147,166,0.12), rgba(176,143,199,0.08));
  border: 1px solid var(--crimson-dim); border-radius: var(--r-md);
  padding: 14px 18px; margin-bottom: 22px;
}
.anchor-banner .ab-eyebrow { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--crimson); margin-bottom: 6px; }
.anchor-banner .ab-text { font-size: 13px; color: var(--ink); line-height: 1.6; }
.anchor-banner .ab-text em { color: var(--ink-dim); font-style: italic; }

.section-eyebrow {
  font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-faint); margin: 10px 0 14px;
}

.practice-list { display: flex; flex-direction: column; gap: 10px; }
.cat-group { margin-bottom: 9px; }
.cat-header {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; text-align: left;
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--r-md); transition: border-color 0.15s;
}
.cat-group.open .cat-header { border-color: var(--crimson-dim); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
.cat-label { flex: 1; font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 17px; color: var(--ink); letter-spacing: 0.01em; line-height: 1.2; }
.cat-count { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.08em; font-variant-numeric: tabular-nums; }
.cat-chevron { color: var(--ink-faint); font-size: 17px; transition: transform 0.2s; }
.cat-group.open .cat-chevron { transform: rotate(90deg); color: var(--crimson); }
.cat-body { display: none; flex-direction: column; gap: 10px; padding: 10px 0 4px; }
.cat-group.open .cat-body { display: flex; }
.practice-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-md); overflow: hidden;
  transition: border-color 0.15s;
}
.practice-card.open { border-color: var(--crimson-dim); }
.practice-summary {
  width: 100%; padding: 16px 18px;
  display: flex; align-items: flex-start; gap: 12px;
  text-align: left; cursor: pointer;
  position: relative;
}
.practice-num {
  flex: 0 0 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--bronze-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--bronze); margin-top: 2px;
}
.practice-info { flex: 1; min-width: 0; }
.practice-name { font-size: 16px; font-weight: 400; line-height: 1.3; margin-bottom: 6px; color: var(--ink); }
.practice-stack { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.practice-stack-chip {
  font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 999px; font-weight: 500;
}
.practice-meta { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.04em; }
.practice-meta span + span::before { content: '  ·  '; opacity: 0.5; }
.practice-toggle {
  position: absolute; right: 16px; top: 18px;
  color: var(--ink-faint); font-size: 18px; transition: transform 0.2s;
}
.practice-card.open .practice-toggle { transform: rotate(45deg); color: var(--crimson); }

.practice-detail {
  display: none; padding: 0 18px 18px;
  border-top: 1px solid var(--border-soft);
  background: linear-gradient(180deg, var(--bg-elev) 0%, var(--bg-card) 100%);
}
.practice-card.open .practice-detail { display: block; }
.detail-section { margin-top: 16px; }
.detail-section h4 {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--bronze); font-weight: 500; margin-bottom: 6px;
}
.detail-section p { font-size: 14px; color: var(--ink); line-height: 1.6; }
.detail-section ul { list-style: none; padding: 0; margin: 0; }
.detail-section li {
  font-size: 14px; color: var(--ink-dim); line-height: 1.55;
  padding: 5px 0 5px 18px; position: relative;
}
.detail-section li::before {
  content: '▸'; position: absolute; left: 2px; top: 5px;
  color: var(--crimson-dim); font-size: 11px;
}
.detail-watch {
  margin-top: 14px; padding: 12px 14px;
  background: rgba(93,147,166,0.08); border-left: 2px solid var(--crimson-dim);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  font-size: 13px; color: var(--ink-dim); font-style: italic; line-height: 1.55;
}
.detail-watch strong { font-style: normal; color: var(--crimson); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; font-size: 10px; }

.detail-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
.btn-begin {
  flex: 1; min-width: 140px;
  background: var(--crimson); color: #08090a;
  font-weight: 500; padding: 14px 18px; border-radius: var(--r-md);
  font-size: 14px; letter-spacing: 0.04em; transition: background 0.15s;
}
.btn-begin:active { background: var(--crimson-dim); }
.btn-log {
  flex: 1; min-width: 140px;
  background: transparent; color: var(--ink);
  border: 1px solid var(--border); padding: 14px 18px; border-radius: var(--r-md);
  font-size: 14px; letter-spacing: 0.04em; transition: all 0.15s;
}
.btn-log:active { border-color: var(--ink-dim); background: var(--bg-elev); }

#timer-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(8,9,10,0.96); backdrop-filter: blur(8px);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 22px;
}
#timer-overlay.active { display: flex; }
.timer-label { font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bronze); margin-bottom: 18px; text-align: center; }
.timer-display {
  font-variant-numeric: tabular-nums;
  font-size: 80px; font-weight: 200; color: var(--ink);
  letter-spacing: -0.02em; line-height: 1;
  margin-bottom: 30px;
}
.timer-display.flash { color: var(--crimson); }
.timer-controls { display: flex; gap: 12px; }
.timer-btn {
  font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  padding: 12px 22px; border-radius: 999px;
  border: 1px solid var(--border); color: var(--ink-dim);
  transition: all 0.15s;
}
.timer-btn:active { border-color: var(--ink); color: var(--ink); }
.timer-btn.primary { border-color: var(--crimson-dim); color: var(--crimson); }

.complete-card {
  background: var(--bg-card); border: 1px solid var(--crimson-dim);
  border-radius: var(--r-lg); padding: 24px;
  margin-top: 18px; text-align: center;
}
.complete-msg { font-size: 16px; color: var(--ink); margin-bottom: 8px; font-weight: 300; letter-spacing: 0.02em; }
.complete-sub { font-size: 13px; color: var(--ink-dim); font-style: italic; margin-bottom: 18px; }
.complete-card textarea { background: var(--bg); text-align: left; margin-bottom: 14px; }
.complete-card .btn-begin { width: 100%; flex: none; min-width: 0; }

.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 14px 16px;
}
.history-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.history-name { font-size: 14px; color: var(--ink); }
.history-date { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.04em; }
.history-stack { display: flex; gap: 4px; flex-wrap: wrap; margin: 4px 0; }
.history-stack .practice-stack-chip { font-size: 8px; padding: 2px 6px; }
.history-notes {
  font-size: 13px; color: var(--ink-dim); font-style: italic; line-height: 1.5;
  margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-soft);
}
.history-empty {
  text-align: center; padding: 48px 20px; color: var(--ink-faint);
  font-size: 14px; font-style: italic;
}

#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--ink); padding: 12px 20px; border-radius: 999px;
  font-size: 13px; letter-spacing: 0.04em;
  opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 90;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<script>
// ============================================================

const PRACTICES = [
  {

    stack: ['breath','energy','sexual'],
    durationSec: 1200, durationLabel: '20 min', frequency: 'daily — the one that matters',
    what: 'The single practice that trains everything at once: nasal-breathing default, breath capacity, pelvic-floor awareness, the deepened microcosmic orbit, and felt-sense of subtle current. If you do nothing else, do this. Twenty minutes of slow nasal breathing in orbit posture.',

  {

    how: [
      'Mouth closed. Breathe only through the nose.',
      'In for 5, out for 5 — roughly six breaths a minute. No strain, no holding.',
      'Let the belly move first, then the ribs. Shoulders stay quiet.',
      'This is the Solar Gate Phase I breath — the ground the whole architecture stands on.'
    ],
    watch: 'Mouth-breathing as the default. If the mouth drifts open, the advanced practices won’t take root. Mouth-tape at night if it drifts in sleep.'
  },
  {
    id: 'nasal_reset', name: 'Nasal Reset & Drift-Check',
    stack: ['breath'],
    durationSec: 0, durationLabel: 'anytime', frequency: 'throughout the day',
    what: 'The all-day micro-practice that makes Tier 1 stick. Catch yourself mouth-breathing or breathing fast and shallow, and reset — close the mouth, breathe through the nose, slow it down.',
    how: [
      'Notice: is the mouth open? Is the breath high in the chest? Is it fast?',

  {

  {

  {

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt !== undefined) e.textContent = txt;
  return e;
}
function uid(p) { return (p || 'x') + '-' + Math.random().toString(36).slice(2, 9); }
function fmtTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}
function fmtDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }).toLowerCase() +
    ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
function stackChipsHtml(stack) {
  if (!stack || !stack.length) return '';
  return stack.map(k => {
    const s = STACK_COLORS[k]; if (!s) return '';
    return '<span class="practice-stack-chip" style="color:' + s.c + ';background:' + s.bg + '">' + k + '</span>';
  }).join('');
}

let audioCtx = null;
function ensureAudio() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } }
function bell() {
  try { if (navigator.vibrate) navigator.vibrate([200, 100, 300, 100, 400]); } catch (e) {}
  if (!audioCtx) return;
  [440, 660].forEach(freq => {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);
    o.start(); o.stop(audioCtx.currentTime + 1.3);
  });
}
function softChime() {
  try { if (navigator.vibrate) navigator.vibrate(100); } catch (e) {}
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 660; o.type = 'sine';
  g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.08, audioCtx.currentTime + 0.04);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.7);
  o.start(); o.stop(audioCtx.currentTime + 0.75);
}
function minuteTick() {
  try { if (navigator.vibrate) navigator.vibrate(30); } catch (e) {}
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 880; o.type = 'sine';
  g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.04, audioCtx.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
  o.start(); o.stop(audioCtx.currentTime + 0.2);
}

let gvCues=[], gvIdx=0, gvTotal=0, gvWake=null, gvFull='';
function gvVoice(){ try{ var vs=speechSynthesis.getVoices()||[]; var en=vs.filter(function(v){return /^en[-_]?/i.test(v.lang);}); if(!en.length) return null; var male=en.filter(function(v){return /male/i.test(v.name)&&!/female/i.test(v.name);}); if(male.length) return male[0]; var named=en.filter(function(v){return /daniel|arthur|oliver|george|james|alex|fred|aaron|reed|tom/i.test(v.name);}); if(named.length) return named[0]; return en[0]; }catch(e){ return null; } }
function gvSpeak(t){ try{ if(!('speechSynthesis' in window)||!t) return; speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(t); u.rate=0.88; u.lang='en-US'; var v=gvVoice(); if(v){ u.voice=v; u.lang=v.lang; } speechSynthesis.speak(u); }catch(e){} }
function gvHowCues(how){ if(Array.isArray(how)) return how.slice(); return String(how||'').split(/(?<=[.!?])\s+/).filter(function(s){return s.trim().length;}); }
function gvWakeReq(){ try{ if('wakeLock' in navigator) navigator.wakeLock.request('screen').then(function(w){gvWake=w;}).catch(function(){}); }catch(e){} }
function gvWakeRel(){ try{ if(gvWake){ gvWake.release(); gvWake=null; } }catch(e){} }
function gvStart(p, durSec){ gvCues=[p.name].concat(gvHowCues(p.how)); gvFull=p.name+'. '+(p.what?p.what+'. ':'')+gvHowCues(p.how).join(' '); gvIdx=0; gvTotal=durSec||0; gvWakeReq(); gvSpeak(gvCues[0]); gvIdx=1; }
function gvTick(elapsed){ if(!gvCues.length||gvTotal<=0) return; var seg=gvTotal/gvCues.length; while(gvIdx<gvCues.length && elapsed>=gvIdx*seg){ gvSpeak(gvCues[gvIdx]); gvIdx++; } }
function gvSkip(){ if(gvIdx<gvCues.length){ gvSpeak(gvCues[gvIdx]); gvIdx++; } }
function gvWiki(){ gvSpeak(gvFull); }
function gvStop(){ try{ if('speechSynthesis' in window) speechSynthesis.cancel(); }catch(e){} gvWakeRel(); }

let timerStartMs = 0;
let timerDurationSec = 0;
let midpointFired = false;
let lastMinuteMark = 0;

function startTimer(practiceId) {
  ensureAudio();
  const p = PRACTICES.find(x => x.id === practiceId);
  if (!p) return;
  activeSession = { practiceId: p.id, name: p.name, stack: p.stack };
  timerEnd = Date.now() + (p.durationSec || 0) * 1000;
  timerStartMs = Date.now();
  timerDurationSec = p.durationSec || 0;
  gvStart(p, p.durationSec || 0);
  midpointFired = false;
  lastMinuteMark = 0;
  document.getElementById('timer-label').textContent = p.name;
  document.getElementById('timer-overlay').classList.add('active');
  tickTimer();
  timerInterval = setInterval(tickTimer, 250);
}
function tickTimer() {
  const remaining = Math.max(0, Math.ceil((timerEnd - Date.now()) / 1000));
  const display = document.getElementById('timer-display');
  display.textContent = fmtTime(remaining);
  display.classList.toggle('flash', remaining <= 5 && remaining > 0);

  if (timerDurationSec > 0) {
    const elapsed = (Date.now() - timerStartMs) / 1000;
    gvTick(elapsed);
    if (timerDurationSec > 60 && !midpointFired && elapsed >= timerDurationSec / 2 && remaining > 5) {
      midpointFired = true;
      softChime();
    }
    if (timerDurationSec > 180) {
      const minute = Math.floor(elapsed / 60);
      const totalMinutes = Math.floor(timerDurationSec / 60);
      if (minute > lastMinuteMark && minute < totalMinutes && remaining > 5) {
        lastMinuteMark = minute;
        minuteTick();
      }
    }
  }

  if (remaining === 0) {
    bell();
    clearInterval(timerInterval); timerInterval = null;
    setTimeout(() => stopTimer(true), 600);
  }
}
function stopTimer(finished) {
  gvStop();
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer-overlay').classList.remove('active');
  document.getElementById('timer-display').classList.remove('flash');
  if (finished && activeSession) {
    promptToLog();
  }
}
function cancelTimer() {
  gvStop();
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer-overlay').classList.remove('active');
  document.getElementById('timer-display').classList.remove('flash');
  activeSession = null;
}

function saveSession(practice, notes) {

    stack: practice.stack,
    at: new Date().toISOString(),
    notes: notes

  if (state.sessions.length > 200) state.sessions = state.sessions.slice(0, 200);
  saveState();
}

  const card = el('div', 'practice-card' + (openCardId === p.id ? ' open' : ''));
  card.setAttribute('data-practice', p.id);

  const summary = el('button', 'practice-summary');
  summary.innerHTML =
    '<div class="practice-num">' + num + '</div>' +
    '<div class="practice-info">' +
      '<div class="practice-name">' + escapeHtml(p.name) + '</div>' +
      '<div class="practice-stack">' + stackChipsHtml(p.stack) + '</div>' +
      '<div class="practice-meta">' +
        '<span>' + escapeHtml(p.durationLabel) + '</span>' +
        '<span>' + escapeHtml(p.frequency) + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="practice-toggle">+</div>';
  summary.addEventListener('click', () => {
    openCardId = (openCardId === p.id) ? null : p.id;
    render();
  });
  card.appendChild(summary);

  const detail = el('div', 'practice-detail');
  let detailHtml = '';
  detailHtml += '<div class="detail-section"><h4>what it is</h4><p>' + escapeHtml(p.what) + '</p></div>';
  detailHtml += '<div class="detail-section"><h4>how to do it</h4><ul>' +
    p.how.map(li => '<li>' + escapeHtml(li) + '</li>').join('') + '</ul></div>';
  detailHtml += '<div class="detail-watch"><strong>watch for</strong><br>' + escapeHtml(p.watch) + '</div>';
  detail.innerHTML = detailHtml;

  const actions = el('div', 'detail-actions');
  if (p.durationSec > 0) {
    const beginBtn = el('button', 'btn-begin', 'begin practice \u00b7 ' + p.durationLabel);
    beginBtn.addEventListener('click', () => startTimer(p.id));
    actions.appendChild(beginBtn);
  }
  const logBtn = el('button', 'btn-log', p.durationSec > 0 ? 'log without timer' : 'log this practice');
  logBtn.addEventListener('click', () => logSessionDirect(p.id));
  actions.appendChild(logBtn);
  detail.appendChild(actions);

  card.appendChild(detail);
  return card;
}

function renderHistory(mount) {
  mount.appendChild(el('div', 'section-eyebrow', 'recent sessions'));
  if (!state.sessions.length) {
    const empty = el('div', 'history-empty', 'nothing logged yet. open the library, hold a practice, save the breath.');
    mount.appendChild(empty);
    return;
  }
  const list = el('div', 'history-list');
  state.sessions.slice(0, 50).forEach(s => {
    const item = el('div', 'history-item');
    let html =
      '<div class="history-row">' +
        '<div class="history-name">' + escapeHtml(s.name) + '</div>' +
        '<div class="history-date">' + escapeHtml(fmtDateTime(s.at)) + '</div>' +
      '</div>' +
      '<div class="history-stack">' + stackChipsHtml(s.stack || []) + '</div>';
    if (s.notes) {
      html += '<div class="history-notes">' + escapeHtml(s.notes) + '</div>';
    }
    item.innerHTML = html;
    list.appendChild(item);
  });
  mount.appendChild(list);
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
});

document.getElementById('back-btn').addEventListener('click', () => {
  try { window.parent.postMessage('close-temple', '*'); } catch (e) {}
  try { window.location.href = 'index.html'; } catch (e) {}
});

document.getElementById('timer-wiki').addEventListener('click', gvWiki);
document.getElementById('timer-cancel').addEventListener('click', cancelTimer);
document.getElementById('timer-skip').addEventListener('click', gvSkip);
document.getElementById('timer-done').addEventListener('click', () => stopTimer(true));

// ============================================================
// BOOT
// ============================================================
render();

function checkPortalAutoStart() {
  try {
    const raw = localStorage.getItem('portal_auto_start_v1');
    if (!raw) return;
    const flag = JSON.parse(raw);
    if (flag.temple !== 'breath') return;
    if (!flag.timestamp || (Date.now() - flag.timestamp > 60000)) {
      localStorage.removeItem('portal_auto_start_v1');
      return;
    }
    localStorage.removeItem('portal_auto_start_v1');
    if (flag.practiceId) {
      const practice = PRACTICES.find(p => p.id === flag.practiceId);
      if (practice) {
        openCardId = practice.id;
        expandCatFor(practice.id);
        render();
        if (!flag.openOnly) setTimeout(() => startTimer(practice.id), 350);
      }
    }
  } catch (e) {}
}
checkPortalAutoStart();
